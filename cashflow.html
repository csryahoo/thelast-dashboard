<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>더라스트 현금흐름</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --navy:#0e3a53;--navy2:#155e75;--bg:#f4f6fa;--card:#fff;
  --ink:#1a2233;--muted:#6b7688;--line:#e3e8f0;
  --in:#1a9d6b;--out:#c0392b;--invest:#c77d12;--fin:#6366f1;--accent:#0891b2;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;padding:28px}
.wrap{max-width:1180px;margin:0 auto}
header{background:linear-gradient(120deg,var(--navy),var(--navy2));color:#fff;border-radius:16px;padding:26px 30px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:14px;box-shadow:0 6px 22px rgba(14,58,83,.18)}
header h1{font-size:23px;font-weight:700;letter-spacing:-.3px}
header .sub{opacity:.84;font-size:13px;margin-top:6px}
.grade{text-align:right}
.grade .lab{font-size:12px;opacity:.8}
.grade .val{font-size:30px;font-weight:800;line-height:1.1}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:16px 0}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
.kpi .t{font-size:12px;color:var(--muted)}
.kpi .v{font-size:21px;font-weight:800;margin-top:6px}
.kpi .d{font-size:11.5px;color:var(--muted);margin-top:4px}
section{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px 24px;margin:16px 0}
h2{font-size:16px;color:var(--navy);margin-bottom:4px;display:flex;align-items:center;gap:9px}
h2 .bar{width:5px;height:18px;background:var(--accent);border-radius:3px}
.h2sub{font-size:12px;color:var(--muted);margin-bottom:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.chartbox{position:relative;height:300px}
.chartbox.sm{height:270px}
table.cf{width:100%;border-collapse:collapse;font-size:13.5px}
table.cf th,table.cf td{padding:10px 12px;border-bottom:1px solid var(--line);text-align:right}
table.cf td:first-child,table.cf th:first-child{text-align:left}
table.cf thead th{background:#eef4f7;color:var(--navy);font-size:12px}
table.cf tr.act td{font-weight:700;background:#f6fafc}
table.cf tr.tot td{font-weight:800;background:var(--navy);color:#fff;font-size:15px}
table.cf tr.sub td{font-size:12.5px;color:var(--muted)}
table.cf .pos{color:var(--in)} table.cf .neg{color:var(--out)}
.tabs{display:flex;gap:8px;margin:16px 0 4px}
.tab{padding:9px 18px;border-radius:10px;border:1px solid var(--line);background:#fff;color:var(--muted);font-size:13.5px;font-weight:700;cursor:pointer}
.tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.pl-table{width:100%;border-collapse:collapse;font-size:13px}
.pl-table th{background:#eef4f7;color:var(--navy);font-size:12px;padding:9px 12px;text-align:right}
.pl-table th:first-child{text-align:left}
.pl-table td{padding:9px 12px;border-bottom:1px solid var(--line);text-align:right}
.pl-table td:first-child{text-align:left}
.pl-table tr.bold td{font-weight:800;background:#f6fafc}
.pl-table tr.sep td{background:#f0f5f8;color:var(--muted);font-size:11.5px;font-style:italic}
.pl-table .pos{color:var(--in)} .pl-table .neg{color:var(--out)}
.bridge{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:14px 0}
.bridge-item{background:var(--bg);border-radius:10px;padding:12px;text-align:center;border:1px solid var(--line)}
.bridge-item .bl{font-size:11px;color:var(--muted);margin-bottom:4px}
.bridge-item .bv{font-size:16px;font-weight:800}
.bridge-item.hl{background:var(--navy);color:#fff;border-color:var(--navy)}
.bridge-item.hl .bl{color:rgba(255,255,255,.7)}
.note{font-size:11.5px;color:var(--muted);margin-top:14px;padding-top:12px;border-top:1px dashed var(--line)}
.no-data{padding:60px;text-align:center;color:var(--muted);font-size:14px}
@media(max-width:820px){.kpis,.grid2,.bridge{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<script>window.__PD__={"month":"2026-05","month_ko":"2026년 5월","begin_cash":0,"end_cash":0,"op_cf":0,"non_op_cf":0,"fx_effect":0,"net_cf":0,"sales":1652280299,"cogs":-1453894696,"gross_profit":0,"sga":-561986903,"card":0,"op_profit":-389770112,"net_profit":-393845660,"loan_out":-135344405,"asset_out":-3380000,"internal":-466450,"sales_channels":[{"name":"자사몰 매출","val":914016970},{"name":"마켓플레이스 매출","val":482955608},{"name":"한남 오프라인 스토어","val":118151261},{"name":"현대백화점","val":84795665},{"name":"해외매출","val":52360795}],"top_outflows":[{"name":"원재료 등","val":852013102},{"name":"제품","val":284573304},{"name":"주얼리","val":195174210},{"name":"지급수수료","val":161965118},{"name":"세금과공과","val":116790880},{"name":"오리지널 샘플","val":108381222},{"name":"광고선전비","val":106672784},{"name":"임차료","val":50425385},{"name":"운반비","val":39019355},{"name":"급여","val":28177632}],"pl_rows":[{"label":"매출","val":1652280299,"lv":0,"bold":true},{"label":"매출원가","val":-1453894696,"lv":1},{"label":"매출총이익","val":0,"lv":0,"bold":true},{"label":"판매비와관리비","val":-561986903,"lv":1},{"label":"법인카드 대금","val":0,"lv":1},{"label":"영업이익","val":-389770112,"lv":0,"bold":true},{"label":"영업외수익","val":632921,"lv":1},{"label":"영업외비용","val":-4708469,"lv":1},{"label":"당기순이익","val":-393845660,"lv":0,"bold":true},{"label":"── 비영업활동 ──","val":null,"lv":0},{"label":"대출 상환·집행","val":-135344405,"lv":1},{"label":"자산 취득 및 처분","val":-3380000,"lv":1}]};</script>
<div class="wrap">
  <header id="hdr">
    <div>
      <h1 id="hdr-title">더라스트 현금흐름 분석</h1>
      <div class="sub" id="hdr-sub">통장내역 폴더의 월별현금흐름 Excel 기준</div>
    </div>
    <div class="grade">
      <div class="lab" id="hdr-lab">순현금흐름</div>
      <div class="val" id="hdr-val" style="color:#ffd5cf">-</div>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab(0,this)">📊 요약</button>
    <button class="tab" onclick="switchTab(1,this)">📋 P&amp;L 상세</button>
  </div>

  <!-- TAB 0: 요약 -->
  <div id="tab0">
    <div class="kpis" id="kpi-row"></div>

    <!-- 현금 Bridge -->
    <section>
      <h2><span class="bar"></span>현금 증감 구조</h2>
      <div class="bridge" id="bridge-row"></div>
    </section>

    <!-- 활동별 차트 + CF 테이블 -->
    <section>
      <h2><span class="bar"></span>1. 활동별 현금흐름</h2>
      <div class="grid2">
        <div class="chartbox"><canvas id="actChart"></canvas></div>
        <table class="cf" id="act-table">
          <thead><tr><th>구분</th><th>순현금흐름</th><th>비고</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <!-- 매출 채널 + 지출 항목 -->
    <section>
      <h2><span class="bar"></span>2. 매출 유입 채널 &amp; 주요 지출</h2>
      <div class="grid2">
        <div>
          <div class="h2sub" style="text-align:center">매출 유입 채널 (억원)</div>
          <div class="chartbox sm"><canvas id="inChart"></canvas></div>
        </div>
        <div>
          <div class="h2sub" style="text-align:center">주요 지출 항목 (억원)</div>
          <div class="chartbox sm"><canvas id="outChart"></canvas></div>
        </div>
      </div>
    </section>
  </div>

  <!-- TAB 1: P&L 상세 -->
  <div id="tab1" style="display:none">
    <section>
      <h2><span class="bar"></span>손익 및 현금흐름 상세</h2>
      <div class="h2sub" id="pl-sub">현금흐름 Excel 직접법 기준</div>
      <div style="overflow:auto">
        <table class="pl-table" id="pl-table">
          <thead><tr><th>항목</th><th>금액 (원)</th><th>억원</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
      <p class="note" id="pl-note"></p>
    </section>
  </div>
</div>

<script>
const D = window.__PD__ || null;
Chart.defaults.font.family = "'Malgun Gothic','Apple SD Gothic Neo',sans-serif";
Chart.defaults.font.size = 12;

const KRW = v => Math.round(v||0).toLocaleString('ko-KR');
const 억  = v => ((v||0)/1e8).toFixed(2);
const fmt억 = v => {
  const a = (v||0)/1e8;
  const s = a >= 0 ? '+' : '';
  return (a >= 0 ? '' : '−') + Math.abs(a).toFixed(2) + '억';
};
const colorCF = v => v >= 0 ? 'var(--in)' : 'var(--out)';

function switchTab(i, el) {
  ['tab0','tab1'].forEach((id,j)=>document.getElementById(id).style.display=j===i?'':'none');
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',j===i));
}

function render() {
  if (!D) {
    document.getElementById('hdr-sub').textContent = '⚠️ 데이터 없음 — 배포.py 실행 후 갱신하세요';
    return;
  }

  const {
    month_ko, op_cf, non_op_cf, fx_effect, net_cf,
    begin_cash, end_cash,
    sales, cogs, gross_profit, sga, card, op_profit, net_profit,
    loan_out, asset_out, internal,
    sales_channels, top_outflows, pl_rows,
  } = D;

  // ── Header ──
  document.title = `더라스트 ${month_ko} 현금흐름`;
  document.getElementById('hdr-title').textContent = `주식회사 더라스트 — ${month_ko} 현금흐름 분석`;
  document.getElementById('hdr-sub').textContent = `통장 거래내역 직접법 기준 · 단위: 원`;
  document.getElementById('hdr-lab').textContent = `${month_ko} 순현금흐름`;
  const ncEl = document.getElementById('hdr-val');
  ncEl.textContent = (net_cf >= 0 ? '+' : '−') + Math.abs(net_cf/1e8).toFixed(2) + '억';
  ncEl.style.color = net_cf >= 0 ? '#b7f7d5' : '#ffd5cf';

  // ── KPI 카드 ──
  const kpis = [
    { t: '월초 현금 잔고',     v: begin_cash, color: 'var(--accent)' },
    { t: '영업활동 현금흐름',   v: op_cf,      color: colorCF(op_cf) },
    { t: '비영업활동 현금흐름', v: non_op_cf,  color: colorCF(non_op_cf) },
    { t: '월말 현금 잔고',     v: end_cash,   color: colorCF(end_cash) },
  ];
  document.getElementById('kpi-row').innerHTML = kpis.map(k => `
    <div class="kpi">
      <div class="t">${k.t}</div>
      <div class="v" style="color:${k.color}">${(k.v<0?'−':'')+(Math.abs(k.v)/1e8).toFixed(2)}억</div>
      <div class="d">${KRW(k.v)}원</div>
    </div>`).join('');

  // ── Bridge ──
  const bridge = [
    { l: '월초 잔고',   v: begin_cash, hl: true },
    { l: '영업활동 CF', v: op_cf },
    { l: '비영업 CF',   v: non_op_cf },
    { l: '환율효과',    v: fx_effect },
    { l: '월말 잔고',   v: end_cash, hl: true },
  ];
  document.getElementById('bridge-row').innerHTML = bridge.map(b => `
    <div class="bridge-item${b.hl?' hl':''}">
      <div class="bl">${b.l}</div>
      <div class="bv" style="${b.hl?'':'color:'+colorCF(b.v)}">${fmt억(b.v)}</div>
      <div style="font-size:10px;opacity:.7;margin-top:2px">${KRW(b.v)}원</div>
    </div>`).join('');

  // ── 활동별 차트 ──
  const actLabels = ['영업활동', '비영업활동(대출·자산)', '환율효과', '순현금흐름'];
  const actVals   = [op_cf, non_op_cf, fx_effect, net_cf].map(v=>v/1e8);
  new Chart(document.getElementById('actChart'), {
    type: 'bar',
    data: {
      labels: actLabels,
      datasets: [{
        data: actVals,
        backgroundColor: actVals.map(v => v >= 0 ? '#1a9d6b' : '#c0392b'),
      }]
    },
    options: {
      plugins: { legend: { display: false }, title: { display: true, text: '활동별 순현금흐름 (억원)' },
        tooltip: { callbacks: { label: c => KRW([op_cf,non_op_cf,fx_effect,net_cf][c.dataIndex]) + '원' } } },
      scales: { y: { ticks: { callback: v => v + '억' } } }
    }
  });

  // ── 활동별 테이블 ──
  const actTbody = document.querySelector('#act-table tbody');
  const rows = [
    { label: '영업활동', val: op_cf, note: `매출유입 − 원가·판관비` },
    { label: '대출 집행·상환', val: loan_out, note: '재무활동' },
    { label: '자산 취득', val: asset_out, note: '투자활동' },
    { label: '내부 자금이동', val: internal, note: '계좌간 이체' },
    { label: '환율변동효과', val: fx_effect, note: '외화계좌 환산' },
  ];
  actTbody.innerHTML = rows.map(r => `
    <tr class="act">
      <td>${r.label}</td>
      <td class="${r.val>=0?'pos':'neg'}">${r.val>=0?'+':'−'}${KRW(Math.abs(r.val))}</td>
      <td style="font-size:11.5px;color:var(--muted)">${r.note}</td>
    </tr>`).join('') + `
    <tr class="tot">
      <td>순현금흐름</td>
      <td>${net_cf>=0?'+':'−'}${KRW(Math.abs(net_cf))}</td>
      <td></td>
    </tr>`;

  // ── 매출 채널 차트 ──
  if (sales_channels && sales_channels.length) {
    new Chart(document.getElementById('inChart'), {
      type: 'bar',
      data: {
        labels: sales_channels.map(c=>c.name),
        datasets: [{ data: sales_channels.map(c=>c.val/1e8), backgroundColor: '#1a9d6b' }]
      },
      options: {
        indexAxis: 'y',
        plugins: { legend: { display: false },
          tooltip: { callbacks: { label: c => KRW(sales_channels[c.dataIndex].val) + '원' } } },
        scales: { x: { ticks: { callback: v => v + '억' } } }
      }
    });
  }

  // ── 주요 지출 차트 ──
  if (top_outflows && top_outflows.length) {
    const top8 = top_outflows.slice(0, 8);
    new Chart(document.getElementById('outChart'), {
      type: 'bar',
      data: {
        labels: top8.map(o=>o.name),
        datasets: [{ data: top8.map(o=>o.val/1e8), backgroundColor: '#c0392b' }]
      },
      options: {
        indexAxis: 'y',
        plugins: { legend: { display: false },
          tooltip: { callbacks: { label: c => KRW(top8[c.dataIndex].val) + '원' } } },
        scales: { x: { ticks: { callback: v => v + '억' } } }
      }
    });
  }

  // ── P&L 테이블 ──
  document.getElementById('pl-sub').textContent = `${month_ko} 현금흐름 Excel 직접법 기준 · 단위: 원`;
  const plTbody = document.querySelector('#pl-table tbody');
  if (pl_rows) {
    plTbody.innerHTML = pl_rows.map(r => {
      if (r.val === null) {
        return `<tr class="sep"><td colspan="3">${r.label}</td></tr>`;
      }
      const vc = r.val >= 0 ? 'pos' : 'neg';
      const sign = r.val >= 0 ? '' : '−';
      return `<tr${r.bold?' class="bold"':''}>
        <td style="padding-left:${r.lv*18+12}px">${r.label}</td>
        <td class="${vc}">${sign}${KRW(Math.abs(r.val))}</td>
        <td class="${vc}">${sign}${Math.abs(r.val/1e8).toFixed(2)}억</td>
      </tr>`;
    }).join('');
  }
  document.getElementById('pl-note').textContent =
    `* 외화계좌 KRW 환산 포함. 법인카드는 카드 결제일 기준 현금 유출로 반영됩니다.`;
}

render();
</script>
</body>
</html>
