<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>입출고 현황 대시보드 | 더라스트</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif; background:#f0f2f7; color:#1a202c; font-size:13px; }

.header { background:linear-gradient(135deg,#fff 0%,#ecfdf5 100%); padding:18px 28px; border-bottom:1px solid #dde1f0; display:flex; align-items:center; justify-content:space-between; box-shadow:0 1px 4px rgba(0,0,0,.06); position:sticky; top:0; z-index:100; }
.header h1 { font-size:18px; font-weight:700; color:#1a202c; letter-spacing:-.5px; }
.header .sub { font-size:11px; color:#64748b; margin-top:3px; }
.header-right { display:flex; align-items:center; gap:10px; }

.load-btn { display:inline-flex; align-items:center; gap:6px; padding:7px 16px; background:#059669; color:#fff; border-radius:7px; font-size:12px; font-weight:600; cursor:pointer; transition:all .15s; white-space:nowrap; }
.load-btn:hover { background:#047857; box-shadow:0 2px 8px rgba(5,150,105,.4); }
.load-btn input { display:none; }
.badge { background:#d1fae5; color:#065f46; font-size:11px; padding:4px 12px; border-radius:20px; font-weight:600; white-space:nowrap; }
.badge.wait { background:#f1f5f9; color:#94a3b8; }

.tabs { display:flex; background:#fff; border-bottom:1px solid #dde1f0; padding:0 28px; position:sticky; top:73px; z-index:99; }
.tab { padding:12px 20px; font-size:12px; cursor:pointer; border-bottom:2px solid transparent; color:#94a3b8; transition:all .2s; user-select:none; font-weight:500; }
.tab.active { color:#059669; border-bottom-color:#059669; font-weight:700; }
.tab:hover:not(.active) { color:#475569; }

.content { padding:22px 28px; }
.section { display:none; }
.section.active { display:block; }

/* KPI */
.kpi-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:20px; }
.kpi-card { background:#fff; border:1px solid #dde1f0; border-radius:12px; padding:18px 20px; box-shadow:0 1px 4px rgba(0,0,0,.05); }
.kpi-label { font-size:10px; color:#64748b; letter-spacing:.5px; margin-bottom:6px; font-weight:700; text-transform:uppercase; }
.kpi-value { font-size:22px; font-weight:700; color:#1a202c; letter-spacing:-.5px; line-height:1.2; }
.kpi-unit { font-size:12px; font-weight:400; color:#94a3b8; margin-left:2px; }
.kpi-change { font-size:11px; margin-top:5px; color:#64748b; }

/* Chart */
.chart-card { background:#fff; border:1px solid #dde1f0; border-radius:12px; padding:18px; margin-bottom:16px; box-shadow:0 1px 4px rgba(0,0,0,.05); }
.chart-title { font-size:12px; font-weight:700; color:#374151; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
.chart-wrap { position:relative; }
.chart-wrap canvas { max-height:300px; }

/* Table */
table { width:100%; border-collapse:collapse; font-size:12px; }
th { text-align:right; padding:9px 10px; font-size:10px; font-weight:700; color:#64748b; border-bottom:2px solid #e2e8f0; white-space:nowrap; background:#f8fafc; }
th:first-child, th:nth-child(2) { text-align:left; }
td { text-align:right; padding:8px 10px; border-bottom:1px solid #f1f5f9; color:#374151; white-space:nowrap; font-variant-numeric:tabular-nums; }
td:first-child { text-align:center; }
td:nth-child(2) { text-align:left; font-weight:500; color:#1a202c; }
td:nth-child(3) { text-align:left; color:#64748b; }
tr:hover td { background:#f8fafc; }

/* 상품 필터 */
.rank-filter-bar { display:flex; align-items:center; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
.rank-search { flex:1; min-width:180px; max-width:300px; padding:7px 12px; border:1px solid #dde1f0; border-radius:8px; font-size:12px; font-family:inherit; outline:none; }
.rank-search:focus { border-color:#059669; box-shadow:0 0 0 2px rgba(5,150,105,.15); }
.rank-filter-group { display:flex; gap:4px; }
.rank-filter-btn { padding:5px 11px; border:1px solid #dde1f0; border-radius:6px; font-size:11px; font-weight:600; cursor:pointer; background:#fff; color:#64748b; transition:all .15s; font-family:inherit; }
.rank-filter-btn.active { background:#059669; color:#fff; border-color:#059669; }
.rank-filter-btn:hover:not(.active) { background:#f0fdf4; border-color:#94a3b8; }
.rank-count { font-size:11px; color:#94a3b8; }

.sort-th { cursor:pointer; user-select:none; }
.sort-th:hover { color:#059669; background:#f0fdf4!important; }
.sort-arrow { display:inline-block; margin-left:3px; opacity:.5; font-size:10px; }
.sort-arrow.active { opacity:1; color:#059669; }

/* 테이블 헤더 고정 */
#t-rank thead th {
  position: sticky;
  top: 0;
  z-index: 3;
  background: #f8fafc;
  box-shadow: 0 1px 0 #e2e8f0;
}

/* Empty */
#empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; height:55vh; gap:16px; color:#94a3b8; }
#empty-state .es-icon { font-size:48px; opacity:.5; }

/* Month btns */
.month-btns { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
.month-btn { padding:6px 16px; border-radius:6px; border:1px solid #dde1f0; background:#fff; color:#64748b; font-size:12px; cursor:pointer; transition:all .15s; font-family:inherit; }
.month-btn.active { background:#059669; border-color:#059669; color:#fff; font-weight:600; }

/* 피벗 테이블 */
.pivot-wrap { overflow:auto; max-height:68vh; border-radius:8px; border:1px solid #e2e8f0; }
#t-pivot { border-collapse:collapse; font-size:12px; min-width:100%; }
#t-pivot th, #t-pivot td { border:1px solid #e8edf3; padding:6px 9px; white-space:nowrap; }
#t-pivot thead th { position:sticky; background:#f1f5f9; z-index:2; font-size:10px; font-weight:700; color:#475569; }
#t-pivot thead tr:first-child th { top:0; }
#t-pivot thead tr:nth-child(2) th { top:30px; }
#t-pivot .s0 { position:sticky; left:0; z-index:1; background:#fff; min-width:36px; text-align:center; }
#t-pivot .s1 { position:sticky; left:36px; z-index:1; background:#fff; min-width:190px; max-width:190px; overflow:hidden; text-overflow:ellipsis; }
#t-pivot .s2 { position:sticky; left:226px; z-index:1; background:#fff; min-width:110px; max-width:110px; overflow:hidden; text-overflow:ellipsis; }
#t-pivot thead .s0,#t-pivot thead .s1,#t-pivot thead .s2 { z-index:5; background:#f1f5f9; }
#t-pivot tbody tr:hover td { background:#f0fdf4!important; }
#t-pivot .sum-row td { background:#e8fdf4!important; font-weight:700; border-top:2px solid #6ee7b7; border-bottom:2px solid #6ee7b7; }
#t-pivot .sum-row .s0,#t-pivot .sum-row .s1,#t-pivot .sum-row .s2 { background:#e8fdf4!important; }
.date-hd { text-align:center!important; background:#eff6ff!important; color:#1d4ed8!important; border-left:2px solid #93c5fd!important; }
.col-in  { color:#1d4ed8; min-width:56px; text-align:right!important; border-left:2px solid #93c5fd!important; }
.col-out { color:#b91c1c; min-width:56px; text-align:right!important; border-right:1px solid #e8edf3; }
.col-prev,.col-stk { min-width:65px; text-align:right!important; }
.col-tot { min-width:65px; text-align:right!important; border-left:2px solid #6ee7b7!important; }
.col-tot.col-in { border-left:2px solid #6ee7b7!important; color:#1d4ed8; }
.col-tot.col-out { border-left:none!important; color:#b91c1c; }

@media(max-width:768px){
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
  .content{padding:14px 16px;}
  .header{padding:14px 16px;}
}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>📦 입출고 현황</h1>
    <div class="sub" id="period-sub">CSV 파일을 불러와 주세요</div>
  </div>
  <div class="header-right">
    <div class="month-btns" id="month-btns" style="margin-bottom:0"></div>
    <span class="badge wait" id="status-badge">데이터 없음</span>
    <label class="load-btn">
      📂 CSV 불러오기
      <input type="file" accept=".csv" multiple onchange="handleFiles(this.files)">
    </label>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab(0,this)">일별 입출고 차트</div>
  <div class="tab" onclick="showTab(1,this)">상품별 순위</div>
  <div class="tab" onclick="showTab(2,this)">일별 피벗</div>
</div>

<div class="content">

  <!-- KPI -->
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-label">총 입고수량</div>
      <div class="kpi-value" id="kpi-in">-<span class="kpi-unit">개</span></div>
      <div class="kpi-change" id="kpi-in-sub">-</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">총 출고수량</div>
      <div class="kpi-value" id="kpi-out">-<span class="kpi-unit">개</span></div>
      <div class="kpi-change" id="kpi-out-sub">-</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">현재 재고수량</div>
      <div class="kpi-value" id="kpi-stock">-<span class="kpi-unit">개</span></div>
      <div class="kpi-change" id="kpi-stock-sub">-</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">상품 종류</div>
      <div class="kpi-value" id="kpi-prods">-<span class="kpi-unit">개</span></div>
      <div class="kpi-change" id="kpi-prods-sub">-</div>
    </div>
  </div>

  <!-- TAB 0: 일별 차트 -->
  <div class="section active" id="tab-0">
    <div id="empty-state">
      <div class="es-icon">📦</div>
      <div style="font-size:14px;font-weight:600">CSV 파일을 불러오세요</div>
      <div style="font-size:12px">셀메이트 stk_inoutList_*.csv 파일을 업로드하면<br>일별 입출고 차트가 표시됩니다</div>
      <div id="dbg-pd" style="margin-top:12px;font-size:11px;padding:6px 14px;border-radius:6px;font-weight:700"></div>
    </div>
    <div id="chart-section" style="display:none">
      <div class="chart-card">
        <div class="chart-title">📅 일별 입고 현황</div>
        <div class="chart-wrap"><canvas id="chart-in"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">📤 일별 출고 현황</div>
        <div class="chart-wrap"><canvas id="chart-out"></canvas></div>
      </div>
    </div>
  </div>

  <!-- TAB 1: 상품별 순위 -->
  <div class="section" id="tab-1">
    <div class="rank-filter-bar">
      <input class="rank-search" id="rank-search" type="text" placeholder="🔍 상품명 / 공급처 검색..." oninput="renderRank()" autocomplete="off">
      <div class="rank-filter-group">
        <button class="rank-filter-btn active" onclick="setRankMode('out',this)">출고 기준</button>
        <button class="rank-filter-btn" onclick="setRankMode('in',this)">입고 기준</button>
        <button class="rank-filter-btn" onclick="setRankMode('stock',this)">현재재고 기준</button>
      </div>
      <span class="rank-count" id="rank-count"></span>
    </div>
    <div class="chart-card" style="padding:0;overflow:hidden">
      <div style="overflow:auto;max-height:600px">
        <table id="t-rank"><tr><td style="padding:30px;color:#94a3b8;text-align:center">CSV 파일을 불러오세요</td></tr></table>
      </div>
    </div>
  </div>

  <!-- TAB 2: 일별 피벗 -->
  <div class="section" id="tab-2">
    <div class="rank-filter-bar">
      <input class="rank-search" id="pivot-search" type="text" placeholder="🔍 상품명 / 공급처 검색..." oninput="renderPivot()" autocomplete="off">
      <label style="display:flex;align-items:center;gap:5px;font-size:12px;color:#64748b;cursor:pointer;user-select:none">
        <input type="checkbox" id="pivot-show-zero" onchange="renderPivot()">
        재고이동 없는 상품 포함
      </label>
      <span class="rank-count" id="pivot-count"></span>
    </div>
    <div class="pivot-wrap">
      <table id="t-pivot">
        <tr><td style="padding:30px;color:#94a3b8;text-align:center">데이터를 불러오세요</td></tr>
      </table>
    </div>
  </div>

</div>

function renderMonthBtns(months, activeLabel) {
  const container = document.getElementById('month-btns');
  if (!container || !months) return;
  const labels = Object.keys(months);
  if (labels.length <= 1) { container.style.display = 'none'; return; }
  container.innerHTML = labels.map(lbl =>
    `<button class="month-btn${lbl === activeLabel ? ' active' : ''}"
      onclick="selectMonth('${lbl}')">${lbl}</button>`
  ).join('');
}

function selectMonth(label) {
  if (!G.months || !G.months[label]) return;
  G.data = G.months[label];
  renderMonthBtns(G.months, label);
  render();
}

// ── CSV 파일 업로드 ──────────────────────────────────────────
function handleFiles(files) {
  const allRows = [];
  let loaded = 0;
  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      const rows = parseCSV(e.target.result);
      allRows.push(...rows);
      loaded++;
      if (loaded === files.length) {
        G.data = processData(allRows);
        render();
      }
    };
    reader.readAsText(file, 'UTF-8');
  });
}

function parseCSV(text) {
  // BOM 제거
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  // 큰따옴표 안의 콤마 처리
  const lines = text.split('\n').filter(l => l.trim());
  if (!lines.length) return [];
  const headers = splitCSVLine(lines[0]);
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = splitCSVLine(lines[i]);
    if (vals.length < headers.length) continue;
    const obj = {};
    headers.forEach((h, idx) => { obj[h.replace(/"/g,'')] = (vals[idx]||'').replace(/^="(.+)"$/, '$1').replace(/"/g,''); });
    rows.push(obj);
  }
  return rows;
}

function splitCSVLine(line) {
  const result = []; let cur = ''; let inQ = false;
  for (let c of line) {
    if (c === '"') inQ = !inQ;
    else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
    else cur += c;
  }
  result.push(cur);
  return result;
}

function processData(rows) {
  // 5월 필터
  const thisMonth = rows.filter(r => {
    const d = r['입출고일자']?.slice(0,10);
    return d && d >= '2026-05-01' && d <= '2026-12-31';
  });
  if (!thisMonth.length) return null;

  // 날짜별 집계
  const dateMap = {};
  const prodMap = {};

  thisMonth.forEach(r => {
    const date = r['입출고일자']?.slice(5,10).replace('-','/');  // MM/DD
    const name = r['상품명']||'';
    const supplier = r['공급처명']||'';
    const inQty  = parseInt(r['입고수량'])||0;
    const outQty = parseInt(r['출고수량'])||0;
    const stock  = parseInt(r['현재재고'])||0;
    const serial = parseInt(r['일련번호'])||0;
    const barcode = r['바코드번호']||'';
    const warehouse = r['창고명']||'';

    if (!dateMap[date]) dateMap[date] = {date, in:0, out:0};
    dateMap[date].in  += inQty;
    dateMap[date].out += outQty;

    if (!prodMap[name]) prodMap[name] = {name, supplier, in:0, out:0, stock:0, lastSerial:{}, prev:0};
    prodMap[name].in  += inQty;
    prodMap[name].out += outQty;

    // 최신 현재재고 (바코드+창고 기준 최신 serial)
    const key = `${barcode}|${warehouse}`;
    if (!prodMap[name].lastSerial[key] || serial > prodMap[name].lastSerial[key].serial) {
      prodMap[name].lastSerial[key] = {serial, stock};
    }
  });

  // 상품별 현재재고 합산
  Object.values(prodMap).forEach(p => {
    p.stock = Object.values(p.lastSerial).reduce((s,v)=>s+v.stock,0);
    p.prev  = p.stock - p.in + p.out;   // 전월재고 역산
    delete p.lastSerial;
  });

  const dates   = Object.keys(dateMap).sort();
  const daily   = dates.map(d => dateMap[d]);
  const products = Object.values(prodMap);

  const totIn  = products.reduce((s,p)=>s+p.in,0);
  const totOut = products.reduce((s,p)=>s+p.out,0);
  const totStk = products.reduce((s,p)=>s+p.stock,0);

  // 기간 표시
  const period = dates.length ? `${dates[0]} ~ ${dates[dates.length-1]}` : '-';

  return { period, dates, daily, products, totals:{in:totIn, out:totOut, stock:totStk, products:products.length} };
}

function render() {

  const fmt = v => v == null ? '-' : v.toLocaleString();
  document.getElementById('kpi-in').innerHTML      = `${fmt(d.totals.in)}<span class="kpi-unit">개</span>`;
  document.getElementById('kpi-out').innerHTML     = `${fmt(d.totals.out)}<span class="kpi-unit">개</span>`;
  document.getElementById('kpi-stock').innerHTML   = `${fmt(d.totals.stock)}<span class="kpi-unit">개</span>`;

  document.getElementById('kpi-in-sub').textContent  = `${d.dates.length}일 기준`;
  document.getElementById('kpi-out-sub').textContent = `${d.dates.length}일 기준`;
  document.getElementById('kpi-stock-sub').textContent = '최신 현재재고 합산';
  document.getElementById('kpi-prods-sub').textContent = `입출고 발생 상품`;

  // 빈 상태 숨김
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('chart-section').style.display = 'block';

  renderCharts();
  renderRank();

function renderCharts() {
  const d = G.data;
  const labels = d.dates;

  if (typeof Chart === 'undefined') {
    document.getElementById('chart-section').innerHTML = '<div style="padding:24px;text-align:center;color:#94a3b8">차트 라이브러리 로드 실패 (새로고침 해주세요)</div>';
    return;
  }

  const chartCfgBase = (label, data, color) => ({
    type: 'bar',
    data: {
      labels,
      datasets: [{ label, data, backgroundColor: color+'99', borderColor: color, borderWidth: 1, borderRadius: 4 }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => `${ctx.parsed.y.toLocaleString()}개` } }
      },
      scales: {
        x: { grid: { display: false } },
        y: { grid: { color: '#f1f5f9' }, ticks: { callback: v => v >= 1000 ? (v/1000)+'k' : v } }
      }
    }
  });

  try {
    if (charts.in) charts.in.destroy();
    charts.in = new Chart(document.getElementById('chart-in'), chartCfgBase('입고수량', d.daily.map(r=>r.in), '#059669'));
    if (charts.out) charts.out.destroy();
    charts.out = new Chart(document.getElementById('chart-out'), chartCfgBase('출고수량', d.daily.map(r=>r.out), '#dc2626'));
  } catch(e) {
    console.error('차트 렌더 오류:', e);
  }
}

function renderRank() {
  const d = G.data;
  if (!d) return;

  const search = (document.getElementById('rank-search')?.value||'').trim().toLowerCase();
  const { col, dir } = G.rankSort;

  let prods = d.products.filter(p => !search ||
    p.name.toLowerCase().includes(search) ||
    (p.supplier||'').toLowerCase().includes(search));
  prods = [...prods].sort((a,b) => {
    if (col === 'name') return a.name.localeCompare(b.name,'ko') * dir;
    return ((a[col]??-Infinity) - (b[col]??-Infinity)) * dir;
  });

  document.getElementById('rank-count').textContent = search ? `${prods.length} / ${d.products.length}개` : `총 ${d.products.length}개`;

  const arr = s => s === col ? (dir===-1?'▼':'▲') : '⇅';
  const cls = s => s === col ? ' active' : '';
  const sth = (label, key, align='right', w='') => `<th class="sort-th" onclick="setRankSort('${key}')" style="text-align:${align};${w?'width:'+w+';':''}background:#f8fafc">${label}<span class="sort-arrow${cls(key)}">${arr(key)}</span></th>`;

    <th style="text-align:center;width:36px;background:#f8fafc">#</th>
    ${sth('상품명','name','left','220px')}
    <th style="text-align:left;width:140px;background:#f8fafc">공급처</th>
    ${sth('전월재고','prev','right','70px')}
    ${sth('입고','in','right','70px')}
    ${sth('출고','out','right','70px')}
    ${sth('현재재고','stock','right','70px')}
  </tr></thead><tbody>`;

  // 합계행
  const totIn  = prods.reduce((s,p)=>s+p.in,0);
  const totOut = prods.reduce((s,p)=>s+p.out,0);
  const totStk = prods.reduce((s,p)=>s+p.stock,0);
  const totPrev= prods.reduce((s,p)=>s+p.prev,0);
  html += `<tr style="background:#f0fdf4;font-weight:700;border-top:2px solid #a7f3d0;border-bottom:2px solid #a7f3d0">
    <td style="color:#059669;font-size:11px">합계</td>
    <td style="color:#059669;font-size:12px">총 ${prods.length}개 상품</td>
    <td></td>
    <td style="color:#6d28d9;font-size:12px">${totPrev.toLocaleString()}</td>
    <td style="color:#1d4ed8;font-size:12px;font-weight:700">${totIn.toLocaleString()}</td>
    <td style="color:#b91c1c;font-size:12px;font-weight:700">${totOut.toLocaleString()}</td>
    <td style="color:#059669;font-size:12px;font-weight:700">${totStk.toLocaleString()}</td>
  </tr>`;

  if (!prods.length) {
    html += `<tr><td colspan="7" style="padding:24px;text-align:center;color:#94a3b8">검색 결과 없음</td></tr>`;
  } else {
    prods.forEach((p,i) => {
      const bg = i%2===0?'#fff':'#f8fafc';
      const nm = hl(p.name);
      const sp = hl(p.supplier||'-');
      html += `<tr style="border-bottom:1px solid #f1f5f9;background:${bg}">
        <td style="color:#94a3b8;font-size:11px">${i+1}</td>
        <td style="font-size:12px;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${p.name}">${nm}</td>
        <td style="font-size:11px;color:#64748b;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${sp}</td>
        <td style="font-size:12px;color:${p.prev?'#6d28d9':'#94a3b8'}">${p.prev?p.prev.toLocaleString():'-'}</td>
        <td style="font-size:12px;color:${p.in?'#1d4ed8':'#94a3b8'};font-weight:${p.in?'600':'400'}">${p.in?p.in.toLocaleString():'-'}</td>
        <td style="font-size:12px;color:${p.out?'#b91c1c':'#94a3b8'};font-weight:${p.out?'600':'400'}">${p.out?p.out.toLocaleString():'-'}</td>
        <td style="font-size:12px;color:${p.stock?'#059669':'#94a3b8'};font-weight:${p.stock?'600':'400'}">${p.stock?p.stock.toLocaleString():'-'}</td>
      </tr>`;
    });
  }
  html += '</tbody>';
  document.getElementById('t-rank').innerHTML = html;
}

function setPivotSort(col) {
  if (G.pivotSort.col === col) G.pivotSort.dir *= -1;
  else { G.pivotSort.col = col; G.pivotSort.dir = -1; }
  renderPivot();
}

function renderPivot() {
  const d = G.data;
  if (!d) return;
  const search    = (document.getElementById('pivot-search')?.value || '').trim().toLowerCase();
  const showZero  = document.getElementById('pivot-show-zero')?.checked;
  const dates     = d.dates;
  const { col, dir } = G.pivotSort;

  let prods = d.products.filter(p => (showZero || p.in > 0 || p.out > 0) &&
                                      (!search || p.name.toLowerCase().includes(search) ||
                                       (p.supplier||'').toLowerCase().includes(search)));

  // 정렬
  function pval(p, key) {
    if (key === 'name') return p.name;
    if (key === 'supplier') return p.supplier || '';
    if (key.startsWith('di:')) return p.d?.[key.slice(3)]?.i || 0;
    if (key.startsWith('do:')) return p.d?.[key.slice(3)]?.o || 0;
    return p[key] ?? 0;
  }
  prods = [...prods].sort((a, b) => {
    if (col === 'name') return a.name.localeCompare(b.name, 'ko') * dir;
    if (col === 'supplier') return (a.supplier||'').localeCompare(b.supplier||'','ko') * dir;
    return (pval(a,col) - pval(b,col)) * dir;
  });

  document.getElementById('pivot-count').textContent = `총 ${prods.length}개 상품`;

  // 정렬 화살표 헬퍼
  const arr = k => col===k ? (dir===-1?'▼':'▲') : '⇅';
  const ac  = k => col===k ? 'color:#059669;' : 'color:#94a3b8;';
  // rowspan=2 포함 헤더 (고정 컬럼용)
  const sth2 = (label, key, cls='', extra='') =>
    `<th class="${cls} sort-th" rowspan="2" onclick="setPivotSort('${key}')" style="cursor:pointer;${extra}">
      ${label}<span style="font-size:9px;margin-left:2px;${ac(key)}">${arr(key)}</span></th>`;
  // 일반 헤더 (날짜 서브헤더용)
  const sth = (label, key, cls='') =>
    `<th class="${cls} sort-th" onclick="setPivotSort('${key}')" style="cursor:pointer">
      ${label}<span style="font-size:9px;margin-left:2px;${ac(key)}">${arr(key)}</span></th>`;

  // ── 헤더 1행: 날짜 colspan ──
  let h1 = `<tr>
    <th class="s0" rowspan="2" style="text-align:center">#</th>
    ${sth2('상품명','name','s1')}
    ${sth2('공급처','supplier','s2')}
    ${sth2('전월재고','prev','col-prev')}`;
  let h2 = `<tr>`;
  for (const dt of dates) {
    h1 += `<th class="date-hd" colspan="2">${dt}</th>`;
    const ki=`di:${dt}`, ko=`do:${dt}`;
    h2 += `<th class="col-in sort-th" onclick="setPivotSort('${ki}')" style="cursor:pointer">입<span style="font-size:9px;${ac(ki)}">${arr(ki)}</span></th>
            <th class="col-out sort-th" onclick="setPivotSort('${ko}')" style="cursor:pointer">출<span style="font-size:9px;${ac(ko)}">${arr(ko)}</span></th>`;
  }
  h1 += `<th class="date-hd" colspan="2" style="border-left:2px solid #6ee7b7!important;background:#ecfdf5!important;color:#059669!important">합계</th>
    <th class="col-stk sort-th" rowspan="2" onclick="setPivotSort('stock')" style="cursor:pointer;border-left:2px solid #a7f3d0!important;background:#ecfdf5!important">현재재고<span style="font-size:9px;${ac('stock')}">${arr('stock')}</span></th></tr>`;
  h2 += `${sth('입','in','col-in col-tot')}${sth('출','out','col-out col-tot')}</tr>`;

  // ── 합계행 ──
  const fmt = v => v ? v.toLocaleString() : '-';
  let sumRow = `<tr class="sum-row">
    <td class="s0">합</td>
    <td class="s1" style="color:#059669">총 ${prods.length}개 상품</td>
    <td class="s2"></td>
    <td class="col-prev" style="color:#6d28d9">${fmt(prods.reduce((s,p)=>s+p.prev,0))}</td>`;
  for (const dt of dates) {
    const si = prods.reduce((s,p)=>s+(p.d?.[dt]?.i||0),0);
    const so = prods.reduce((s,p)=>s+(p.d?.[dt]?.o||0),0);
    sumRow += `<td class="col-in">${fmt(si)}</td><td class="col-out">${fmt(so)}</td>`;
  }
  sumRow += `<td class="col-in col-tot">${fmt(prods.reduce((s,p)=>s+p.in,0))}</td>
    <td class="col-out col-tot">${fmt(prods.reduce((s,p)=>s+p.out,0))}</td>
    <td class="col-stk" style="color:#059669;border-left:2px solid #a7f3d0!important">${fmt(prods.reduce((s,p)=>s+p.stock,0))}</td>
  </tr>`;

  // ── 데이터행 ──
  const hlP = t => search ? t.replace(new RegExp(search.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'), m=>`<mark style="background:#fef08a;border-radius:2px">${m}</mark>`) : t;

  let rows = '';
  prods.forEach((p, i) => {
    const nm = hlP(p.name);
    const sp = hlP(p.supplier||'-');
    const bg = i % 2 === 0 ? '' : 'background:#fafafa';
    rows += `<tr style="${bg}">
      <td class="s0" style="color:#94a3b8;font-size:11px;${bg}">${i+1}</td>
      <td class="s1" title="${p.name}" style="${bg}">${nm}</td>
      <td class="s2" style="color:#64748b;font-size:11px;${bg}">${sp}</td>
      <td class="col-prev" style="color:${p.prev?'#6d28d9':'#cbd5e1'}">${fmt(p.prev)}</td>`;
    for (const dt of dates) {
      const di = p.d?.[dt]?.i || 0;
      const doo = p.d?.[dt]?.o || 0;
      rows += `<td class="col-in" style="opacity:${di?1:0.25}">${fmt(di)}</td>
        <td class="col-out" style="opacity:${doo?1:0.25}">${fmt(doo)}</td>`;
    }
    rows += `<td class="col-in col-tot" style="font-weight:${p.in?700:400}">${fmt(p.in)}</td>
      <td class="col-out col-tot" style="font-weight:${p.out?700:400}">${fmt(p.out)}</td>
      <td class="col-stk" style="color:${p.stock?'#059669':'#94a3b8'};font-weight:${p.stock?700:400};border-left:2px solid #a7f3d0!important">${fmt(p.stock)}</td>
    </tr>`;
  });

  document.getElementById('t-pivot').innerHTML =
    `<thead>${h1}${h2}</thead><tbody>${sumRow}${rows}</tbody>`;
}

function showTab(i, el) {
  document.querySelectorAll('.section').forEach((s,j)=>s.classList.toggle('active',j===i));
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',j===i));
  if (i===0 && G.data) { setTimeout(()=>{ Object.values(charts).forEach(c=>c&&c.resize()); },50); }
  if (i===2 && G.data) renderPivot();
}
</script>
