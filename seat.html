<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>본사 자리 배치도</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background: #f8f8f8; padding: 30px; }
  h1 { font-size: 18px; font-weight: bold; margin-bottom: 20px; color: #222; }

  /* 전체 세로 레이아웃 */
  .layout { display: flex; flex-direction: column; gap: 0; }

  /* 경영진 영역 */
  .mgmt-section {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px;
    border-radius: 10px 10px 0 0;
  }

  /* 구분선 */
  .divider {
    height: 3px;
    background: repeating-linear-gradient(90deg, #aaa 0, #aaa 8px, transparent 8px, transparent 14px);
    margin: 0;
    opacity: 0.5;
  }

  /* 팀 영역 */
  .team-section {
    display: flex;
    flex-direction: row;
    gap: 10px;
    align-items: flex-start;
    padding: 10px;
    border-radius: 0 0 10px 10px;
  }

  .team-block {
    border-radius: 8px;
    padding: 8px;
  }

  .team-header {
    text-align: center;
    font-size: 12px;
    font-weight: bold;
    padding: 5px 6px;
    border-radius: 4px;
    margin-bottom: 6px;
    color: #333;
  }

  .sub-header {
    text-align: center;
    font-size: 11px;
    font-weight: bold;
    padding: 4px;
    border-radius: 4px;
    margin-bottom: 5px;
    color: #333;
    margin-top: 6px;
  }

  /* 개인 책상 */
  .desk {
    background: #fff;
    border-radius: 5px;
    padding: 6px 8px;
    margin-bottom: 5px;
    text-align: center;
    cursor: pointer;
    transition: box-shadow 0.15s;
    min-height: 44px;
    min-width: 90px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .desk:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
  .desk .name { font-size: 12px; font-weight: bold; color: #222; }
  .desk .role { font-size: 10px; color: #666; margin-top: 2px; }

  /* 나란히 배치 */
  .desk-row { display: flex; gap: 5px; margin-bottom: 5px; }
  .desk-row .desk { flex: 1; margin-bottom: 0; min-width: 70px; }

  /* 섹션 라벨 */
  .section-label {
    writing-mode: vertical-rl;
    text-orientation: mixed;
    font-size: 11px;
    font-weight: bold;
    color: #555;
    padding: 6px 4px;
    border-radius: 4px;
    letter-spacing: 2px;
    align-self: stretch;
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 22px;
    opacity: 0.6;
  }

  /* 범례 */
  .legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 24px; font-size: 11px; color: #444; }
  .legend-item { display: flex; align-items: center; gap: 5px; cursor: pointer; padding: 3px 6px; border-radius: 4px; transition: background 0.15s; }
  .legend-item:hover { background: rgba(0,0,0,0.06); }
  .legend-dot { width: 13px; height: 13px; border-radius: 3px; flex-shrink: 0; }

  /* 편집 모달 */
  .modal-overlay {
    display: none; position: fixed; top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.3); z-index: 100; align-items: center; justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal { background: #fff; border-radius: 10px; padding: 24px; min-width: 260px; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
  .modal h3 { font-size: 14px; margin-bottom: 14px; color: #333; }
  .modal input[type="text"] { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; margin-bottom: 8px; font-family: inherit; }
  .modal input[type="text"]:focus { outline: none; border-color: #888; }
  .color-row { display: none; align-items: center; gap: 10px; margin-bottom: 10px; }
  .color-row label { font-size: 12px; color: #555; white-space: nowrap; }
  .color-row input[type="color"] { width: 48px; height: 32px; border: 1px solid #ddd; border-radius: 5px; padding: 2px; cursor: pointer; }
  .color-preview { flex: 1; height: 32px; border-radius: 5px; border: 1px solid #ddd; transition: background 0.2s; }
  .modal-btns { display: flex; gap: 8px; margin-top: 6px; }
  .btn { flex: 1; padding: 8px; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; font-family: inherit; }
  .btn-save { background: #444; color: #fff; }
  .btn-save:hover { background: #222; }
  .btn-cancel { background: #eee; color: #444; }
  .btn-cancel:hover { background: #ddd; }

  @media print {
    body { padding: 15px; background: #fff; }
    .modal-overlay, .no-print { display: none !important; }
    .desk { cursor: default; }
  }
</style>
<style id="colorStyle"></style>
</head>
<body>

<h1>본사 자리 배치도</h1>

<div class="layout">

  <!-- ════════════ 경영진 영역 ════════════ -->
  <div class="mgmt-section c-mgmt">
    <div class="section-label">경영진</div>
    <div class="team-block c-mgmt" style="display:flex; flex-direction:column; gap:0; padding:4px;">
      <div class="team-header c-mgmt" onclick="editHeader(this)" style="cursor:pointer;">경영진</div>
      <div style="display:flex; gap:6px;">

      <div class="desk-row">

      <div class="desk b-md" onclick="editDesk(this)">

      <div class="desk-row">
        <div class="desk b-md" onclick="editDesk(this)">
          <div class="name">김지홍</div>
          <div class="role"></div>
        </div>
        <div class="desk b-md" onclick="editDesk(this)">
          <div class="name">김서정</div>
          <div class="role"></div>
        </div>
      </div>
      <div class="desk-row">
        <div class="desk b-md" onclick="editDesk(this)">
          <div class="name">한니래</div>

        </div>
        <div class="desk b-md" onclick="editDesk(this)">
          <div class="name">공석</div>

        </div>
      </div>
    </div>

    <!-- 웹디자인 -->
    <div class="team-block c-web" style="min-width:110px;">
      <div class="team-header c-web" onclick="editHeader(this)" style="cursor:pointer;">웹디자인</div>
      <div class="desk b-web" onclick="editDesk(this)">

    <!-- 생산관리팀 + 생산 -->

    <!-- 독립 자리 -->
    <div class="team-block c-design" style="min-width:90px;">
      <div class="desk b-d
