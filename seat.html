<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>본사 자리 배치도</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');

  :root {
    --bg:          #f0f2f7;
    --card-bg:     #ffffff;
    --border:      rgba(0,0,0,0.08);
    --card-border: rgba(0,0,0,0.06);
    --accent:      #2563eb;
    --text:        #1a202c;
    --muted:       #64748b;
    --hover:       rgba(37,99,235,0.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    min-height: 100vh;
  }

  /* ── 상단 바 ── */
  .topbar {
    height: 52px;
    background: var(--card-bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 12px;
    position: sticky; top: 0; z-index: 50;
  }
  .topbar-icon { font-size: 18px; }
  .topbar-title {
    font-size: 14px; font-weight: 700;
    color: #1e293b; flex: 1;
  }
  .topbar-hint {
    font-size: 11px; color: var(--muted);
    background: var(--bg);
    padding: 4px 10px; border-radius: 6px;
    border: 1px solid var(--border);
  }

  /* ── 본문 ── */
  .page { padding: 20px 24px 32px; }

  /* ── 섹션 라벨 ── */
  .sec-label {
    font-size: 9.5px; font-weight: 700; color: var(--muted);
    letter-spacing: 1px; text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* ── 경영진 행 ── */
  .mgmt-row { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 0; }

  /* ── 구분선 ── */
  .divider {
    display: flex; align-items: center; gap: 10px;
    margin: 16px 0;
    color: var(--muted); font-size: 10px; font-weight: 700;
    letter-spacing: 1.5px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* ── 팀 행 ── */
  .team-row { display: flex; gap: 10px; align-items: flex-start; flex-wrap: wrap; }

  /* ── 팀 블록 (카드) ── */
  .team-block {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-top: 3px solid #e2e8f0;
    border-radius: 12px;
    padding: 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    transition: box-shadow 0.2s;
  }
  .team-block:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.08); }

  /* ── 팀 헤더 ── */
  .team-header {
    font-size: 11px; font-weight: 700;
    padding: 4px 10px; border-radius: 20px;
    margin-bottom: 8px; text-align: center;
    color: #1e293b; display: block; width: 100%;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .team-header:hover { opacity: 0.8; }

  .sub-header {
    font-size: 10px; font-weight: 700;
    padding: 3px 8px; border-radius: 20px;
    margin: 8px 0 6px; text-align: center;
    color: #1e293b; display: block; width: 100%;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .sub-header:hover { opacity: 0.8; }

  /* ── 책상 ── */
  .desk {
    background: var(--bg);
    border-radius: 8px;
    padding: 7px 10px;
    margin-bottom: 6px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    min-height: 46px;
    min-width: 90px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    border: 1.5px solid transparent;
  }
  .desk:hover {
    background: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.10);
    border-color: rgba(0,0,0,0.08);
  }
  .desk .name { font-size: 12px; font-weight: 600; color: #1e293b; }
  .desk .role { font-size: 10px; color: var(--muted); margin-top: 2px; }

  /* ── 나란히 ── */
  .desk-row { display: flex; gap: 6px; margin-bottom: 6px; }
  .desk-row .desk { flex: 1; margin-bottom: 0; min-width: 72px; }

  /* ── 범례 ── */
  .legend {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-top: 18px; padding: 12px 14px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .legend-item {
    display: flex; align-items: center; gap: 6px;
    cursor: pointer; padding: 5px 10px;
    border-radius: 20px; font-size: 11px; font-weight: 500;
    color: var(--text); transition: background 0.15s;
    border: 1px solid transparent;
  }
  .legend-item:hover { background: var(--bg); border-color: var(--border); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* ── 액션 버튼 ── */
  .action-row { display: flex; gap: 8px; margin-top: 14px; }
  .btn {
    padding: 8px 20px; border: none; border-radius: 8px;
    font-size: 12px; cursor: pointer; font-family: inherit;
    font-weight: 600; transition: all 0.15s;
  }
  .btn-primary { background: #1e293b; color: #fff; }
  .btn-primary:hover { background: #0f172a; }
  .btn-secondary {
    background: var(--card-bg); color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--bg); }

  /* ── 편집 모달 ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(15,23,42,0.35); z-index: 200;
    align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--card-bg); border-radius: 14px;
    padding: 24px; min-width: 280px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.18);
    border: 1px solid var(--border);
  }
  .modal h3 { font-size: 14px; font-weight: 700; margin-bottom: 16px; color: #1e293b; }
  .modal input[type="text"] {
    width: 100%; padding: 9px 12px;
    border: 1px solid #e2e8f0; border-radius: 8px;
    font-size: 13px; margin-bottom: 10px; font-family: inherit;
    color: var(--text); background: var(--bg); transition: border 0.15s;
  }
  .modal input[type="text"]:focus { outline: none; border-color: var(--accent); background: #fff; }
  .color-row { display: none; align-items: center; gap: 10px; margin-bottom: 12px; }
  .color-row label { font-size: 12px; color: var(--muted); white-space: nowrap; font-weight: 500; }
  .color-row input[type="color"] { width: 44px; height: 32px; border: 1px solid #e2e8f0; border-radius: 6px; padding: 2px; cursor: pointer; }
  .color-preview { flex: 1; height: 32px; border-radius: 6px; border: 1px solid #e2e8f0; }
  .modal-btns { display: flex; gap: 8px; margin-top: 8px; }
  .modal-btns .btn { flex: 1; padding: 9px; font-size: 13px; }

  @media print {
    body { background: #fff; }
    .topbar { box-shadow: none; }
    .modal-overlay, .no-print { display: none !important; }
    .desk { cursor: default; background: #f8fafc; }
    .desk:hover { box-shadow: none; }
    .team-block { box-shadow: none; }
  }
</style>
<style id="colorStyle"></style>
</head>
<body>

<!-- 상단 바 -->
<div class="topbar">
  <span class="topbar-icon">🪑</span>
  <div class="topbar-title">본사 자리 배치도</div>
  <span class="topbar-hint no-print">클릭하면 수정 · 자동저장</span>

      </div>
      <div class="desk-row">
        <div class="desk b-md" onclick="editDesk(this)">
          <div class="name">김지홍</div>

        </div>
        <div class="desk b-md" onclick="editDesk(this)">

        <div class="desk b-md" onclick="editDesk(this)">
          <div class="name">공석</div>

    </div>

    <!-- 웹디자인 -->
    <div class="team-block" id="tb-web" style="min-width:110px;">
      <div class="team-header c-web" onclick="editHeader(this)">웹디자인</div>
      <div class="desk b-web" onclick="editDesk(this)">
        <div class="name">박미연</div>

    <div class="team-block" id="tb-smgmt" style="min-width:165px;">
