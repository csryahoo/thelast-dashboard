<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>본사 자리 배치도</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap');
:root{--bg:#f0f2f7;--card:#fff;--border:rgba(0,0,0,.08);--cb:rgba(0,0,0,.06);--ac:#2563eb;--tx:#1a202c;--mu:#64748b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR','Malgun Gothic',sans-serif;background:var(--bg);color:var(--tx);font-size:13px;}
.topbar{height:52px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;position:sticky;top:0;z-index:50;}
.topbar-title{font-size:14px;font-weight:700;color:#1e293b;flex:1;}
.topbar-hint{font-size:11px;color:var(--mu);background:var(--bg);padding:4px 10px;border-radius:6px;border:1px solid var(--border);}
.btn-share{padding:6px 14px;background:#059669;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;display:none;}
.btn-share:hover{background:#047857;}
.btn-share.on{display:inline-block;}
.page{padding:20px 24px 32px;}
.sec-label{font-size:9.5px;font-weight:700;color:var(--mu);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}
.mgmt-row{display:flex;gap:10px;align-items:flex-start;}
.divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--mu);font-size:10px;font-weight:700;letter-spacing:1.5px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.team-row{display:flex;gap:10px;align-items:flex-start;overflow-x:auto;padding-bottom:6px;}
.team-row::-webkit-scrollbar{height:4px;}
.team-row::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px;}
.team-block{background:var(--card);border:1px solid var(--cb);border-top:3px solid #e2e8f0;border-radius:12px;padding:10px;box-shadow:0 1px 4px rgba(0,0,0,.05);flex-shrink:0;transition:box-shadow .2s;}
.team-block:hover{box-shadow:0 3px 12px rgba(0,0,0,.08);}
.team-header{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;margin-bottom:8px;text-align:center;color:#1e293b;display:block;width:100%;cursor:pointer;transition:opacity .15s;}
.team-header:hover{opacity:.8;}
.desk{background:var(--bg);border-radius:8px;padding:7px 10px;margin-bottom:6px;text-align:center;cursor:pointer;transition:all .15s;min-height:46px;min-width:90px;display:flex;flex-direction:column;justify-content:center;border:1.5px solid transparent;}
.desk:hover{background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.1);border-color:rgba(0,0,0,.08);}
.desk .name{font-size:12px;font-weight:600;color:#1e293b;}
.desk .role{font-size:10px;color:var(--mu);margin-top:2px;}
.desk-row{display:flex;gap:6px;margin-bottom:6px;}
.desk-row .desk{flex:1;margin-bottom:0;min-width:72px;}
.btn-add{width:100%;margin-top:4px;padding:5px 0;border:1.5px dashed #cbd5e1;border-radius:8px;background:transparent;color:#94a3b8;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;letter-spacing:0.3px;}
.btn-add:hover{border-color:#94a3b8;color:#475569;background:var(--bg);}
.legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:18px;padding:12px 14px;background:var(--card);border:1px solid var(--cb);border-radius:10px;}
.legend-item{display:flex;align-items:center;gap:6px;cursor:pointer;padding:5px 10px;border-radius:20px;font-size:11px;font-weight:500;transition:background .15s;border:1px solid transparent;}
.legend-item:hover{background:var(--bg);border-color:var(--border);}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.action-row{display:flex;gap:8px;margin-top:14px;}
.btn{padding:8px 20px;border:none;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s;}
.btn-p{background:#1e293b;color:#fff;}
.btn-p:hover{background:#0f172a;}
.btn-s{background:var(--card);color:var(--mu);border:1px solid var(--border);}
.btn-s:hover{background:var(--bg);}
.mo{display:none;position:fixed;inset:0;background:rgba(15,23,42,.35);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.mo.on{display:flex;}
.md{background:var(--card);border-radius:14px;padding:24px;min-width:280px;box-shadow:0 20px 60px rgba(0,0,0,.18);border:1px solid var(--border);}
.md h3{font-size:14px;font-weight:700;margin-bottom:16px;color:#1e293b;}
.md input[type=text]{width:100%;padding:9px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;margin-bottom:10px;font-family:inherit;background:var(--bg);}
.md input[type=text]:focus{outline:none;border-color:var(--ac);background:#fff;}
.cr{display:none;align-items:center;gap:10px;margin-bottom:12px;}
.cr label{font-size:12px;color:var(--mu);white-space:nowrap;font-weight:500;}
.cr input[type=color]{width:44px;height:32px;border:1px solid #e2e8f0;border-radius:6px;padding:2px;cursor:pointer;}
.cp{flex:1;height:32px;border-radius:6px;border:1px solid #e2e8f0;}
.mb{display:flex;gap:8px;margin-top:8px;}
.mb .btn{flex:1;padding:9px;font-size:13px;}
.del-btn{width:100%;margin-top:6px;padding:7px;border:1px solid #fecaca;border-radius:8px;background:transparent;color:#ef4444;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;}
.del-btn:hover{background:#fef2f2;}
@media print{body{background:#fff;}.mo,.no-print{display:none!important;}}
</style><style id="cs"></style></head>
<body>
<div class="topbar">

    <div class="team-header c-mkt" onclick="eH(this)">마케팅</div>
    <div class="desk-row">
      <div class="desk b-mkt" onclick="eD(this)"><div class="name">박하은</div><div class="role"></div></div>
      <div class="desk b-mkt" onclick="eD(this)"><div class="name">서수민</div><div class="role">팀장</div></div>

    <div class="desk-row">
      <div class="desk b-mkt" onclick="eD(this)"><div class="name">이진주</div><div class="role"></div></div>

  <div class="team-block" id="tb-md" style="min-width:165px">

    <div class="desk b-md" onclick="eD(this)"><div class="name">오혜린</div><div class="role">팀장</div></div>
    <div class="desk-row">
      <div class="desk b-md" onclick="eD(this)"><div class="name">김지홍</div><div class="role"></div></div>
      <div class="desk b-md" onclick="eD(this)"><div class="name">김서정</div><div class="role"></div></div>
    </div>
    <div class="desk-row">
      <div class="desk b-md" onclick="eD(this)"><div class="name">한니래</div><div class="role"></div></div>

  <div class="team-block" id="tb-web" style="min-width:110px">

    <div class="desk b-web" onclick="eD(this)"><div class="name">박미연</div><div class="role">팀장</div></div>

      <div class="desk b-smgmt" onclick="eD(this)"><div class="name">공석</div><div class="role"></div></div>

  <div class="team-block" id="tb-design" style="min-width:280px">

    <div style="display:flex;gap:10px;align-items:flex-start;">
      <div style="flex:1;">
        <div class="desk b-design" onclick="eD(this)"><div class="name">안혜미</div><div class="role">이패럼팀장</div></div>
        <div class="desk-row">
          <div class="desk b-design" onclick="eD(this)"><div class="name">조성원</div><div class="role"></div></div>

        </div>

</div>
<div class="legend no-print">
  <div class="legend-item" onclick="eLg(this)"><div class="legend-dot c-mgmt" data-cls="c-mgmt"></div><span class="ll">경영진</span></div>
  <div class="legend-item" onclick="eLg(this)"><div class="legend-dot c-sup" data-cls="c-sup"></div><span class="ll">경영지원</span></div>
  <div class="legend-item" onclick="eLg(this)"><div class="legend-dot c-mkt" data-cls="c-mkt"></div><span class="ll">마케팅</span></div>
  <div class="legend-item" onclick="eLg(this)"><div class="legend-dot c-md" data-cls="c-md"></div><span class="ll">MD</span></div>
  <div class="legend-item" onclick="eLg(this)"><div class="legend-dot c-web" data-cls="c-web"></div><span class="ll">웹디자인</span></div>
  <div class="legend-item" onclick="eLg(this)"><div class="legend-dot c-smgmt" data-cls="c-smgmt"></div><span class="ll">생산관리팀</span></div>
  <div class="legend-item" onclick="eLg(this)"><div class="legend-dot c-design" data-cls="c-design"></div><span class="ll">어패럴디자인팀</span></div>

</div>
<div class="mo" id="mo">
  <div class="md">
    <h3 id="mT">수정</h3>
    <input type="text" id="mN" placeholder="이름"/>
    <input type="text" id="mR" placeholder="직책"/>
    <div class="cr" id="cR">
      <label>색상</label>
      <input type="color" id="mC" oninput="document.getElementById('mP').style.background=this.value"/>
      <div class="cp" id="mP"></div>
    </div>
    <div class="mb">
      <button class="btn btn-s" onclick="cls()">취소</button>
      <button class="btn btn-p" onclick="sav()">저장</button>

<script>
// GitHub 설정 (배포.py에서 주입)
window.__GH__={"user":"csryahoo","repo":"thelast-dashboard","branch":"main"};

const CM={'c-mgmt':'#c9b8e8','c-sup':'#a8d4b4','c-mkt':'#f4b8c8','c-md':'#f5ce80','c-web':'#88d4a0','c-design':'#f4a898','c-smgmt':'#80ccd8'};
const BM={'tb-mgmt':'c-mgmt','tb-sup':'c-sup','tb-mkt':'c-mkt','tb-md':'c-md','tb-web':'c-web','tb-smgmt':'c-smgmt','tb-design':'c-design'};

function apC(){
  let c='';
  for(const[k,v]of Object.entries(CM)){
    c+=`.team-header.${k}{background:${v}28;color:#1e293b;}`;
    c+=`.legend-dot.${k}{background-color:${v};}`;
    c+=`.b-${k.slice(2)}{border-color:${v}66;}`;
  }
  document.getElementById('cs').textContent=c;
  for(const[id,k]of Object.entries(BM)){
    const el=document.getElementById(id);
    if(el)el.style.borderTopColor=CM[k]||'#e2e8f0';
  }
}

function initAddBtns(){
  document.querySelectorAll('.team-block').forEach(block=>{
    const btn=document.createElement('button');
    btn.className='btn-add no-print';
    btn.textContent='+ 자리 추가';
    btn.onclick=()=>openAdd(block);
    block.appendChild(btn);
  });
}

function getBCls(block){
  const d=block.querySelector('.desk');
  if(!d)return'mgmt';
  for(const c of d.classList)if(c.startsWith('b-'))return c.slice(2);
  return'mgmt';
}

// ── 상태 스냅샷 / 복원 ─────────────────────────────────────────
function snapshot(){
  const s={d:[],h:[],l:[],c:{...CM}};
  document.querySelectorAll('.desk').forEach(e=>s.d.push({n:e.querySelector('.name').textContent,r:e.querySelector('.role').textContent}));
  document.querySelectorAll('.team-header').forEach(e=>s.h.push(e.textContent.trim()));
  document.querySelectorAll('.ll').forEach(e=>s.l.push(e.textContent.trim()));
  return s;
}
function applyState(s){
  const ds=document.querySelectorAll('.desk');
  (s.d||[]).forEach((d,i)=>{if(!ds[i])return;ds[i].querySelector('.name').textContent=d.n;ds[i].querySelector('.role').textContent=d.r;});
  const hs=document.querySelectorAll('.team-header');
  (s.h||[]).forEach((h,i)=>{if(hs[i])hs[i].textContent=h;});
  const ls=document.querySelectorAll('.ll');
  (s.l||[]).forEach((l,i)=>{if(ls[i])ls[i].textContent=l;});
  if(s.c){Object.assign(CM,s.c);apC();}
}

// ── 로컬 자동저장 ───────────────────────────────────────────────
function sst(){
  localStorage.setItem('sv1',JSON.stringify(snapshot()));
}

// ── GitHub에서 로드 ─────────────────────────────────────────────
async function lst(){
  const hint=document.getElementById('sync-hint');
  const shareBtn=document.getElementById('btn-share');

  if(window.__GH__){
    shareBtn.classList.add('on');
    const{user,repo,branch}=window.__GH__;
    try{
      const r=await fetch(
        `https://raw.githubusercontent.com/${user}/${repo}/${branch}/seat_data.json?t=${Date.now()}`,
        {cache:'no-store'}
      );
      if(r.ok){
        const s=await r.json();
        applyState(s);
        localStorage.setItem('sv1',JSON.stringify(s));
        const ts=s._ts?new Date(s._ts).toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}):'';
        hint.textContent=ts?`GitHub 동기화 · ${ts}`:'GitHub 동기화 완료';
        hint.style.color='#059669';
        return;
      }
    }catch(e){console.warn('GitHub 로드 실패, 로컬 사용',e);}
    hint.textContent='로컬 데이터 (GitHub 연결 필요)';
  } else {
    hint.textContent='클릭하면 수정';
    hint.style.color='';
  }

  // fallback: localStorage
  const r=localStorage.getItem('sv1');
  if(!r)return;
  try{applyState(JSON.parse(r));}catch(e){}
}

// ── GitHub 토큰 설정 (브라우저 localStorage에 보관) ───────────────
function getToken(){return localStorage.getItem('__GH_TOKEN__');}
function setToken(t){localStorage.setItem('__GH_TOKEN__',t.trim());}
function promptToken(cb){
  const v=prompt('GitHub Personal Access Token을 입력하세요.\n(Settings → Developer settings → Personal access tokens)\n한 번만 입력하면 이 브라우저에 저장됩니다.');
  if(v&&v.trim()){setToken(v);cb(v.trim());}
}

// ── GitHub 공유 저장 ────────────────────────────────────────────
async function shareSave(){
  if(!window.__GH__){toast('GitHub 설정 없음 (배포.py 재실행 필요)');return;}
  const token=getToken();
  if(!token){promptToken(t=>{ if(t) shareSave(); }); return;}

  const btn=document.getElementById('btn-share');
  btn.textContent='저장 중...';btn.disabled=true;

  const s=snapshot();
  s._ts=new Date().toISOString();
  localStorage.setItem('sv1',JSON.stringify(s));

  const{user,repo,branch}=window.__GH__;
  const path='seat_data.json';
  const content=btoa(unescape(encodeURIComponent(JSON.stringify(s,null,2))));

  try{
    // 현재 SHA 조회
    const r1=await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${path}`,{
      headers:{Authorization:`token ${token}`,Accept:'application/vnd.github.v3+json'}
    });
    const sha=r1.ok?(await r1.json()).sha:null;

    // 파일 PUT
    const body={message:`자리배치도 업데이트 ${s._ts.slice(0,16)}`,content,branch};
    if(sha)body.sha=sha;
    const r2=await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${path}`,{
      method:'PUT',
      headers:{Authorization:`token ${token}`,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify(body)
    });

    if(r2.ok){
      toast('🌐 공유 저장됨 — 모두에게 반영됩니다');
      const hint=document.getElementById('sync-hint');
      const ts=new Date(s._ts).toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
      hint.textContent=`GitHub 동기화 · ${ts}`;
      hint.style.color='#059669';
    }else if(r2.status===401){
      localStorage.removeItem('__GH_TOKEN__');
      toast('토큰 만료 — 다시 클릭해서 새 토큰 입력');
    }else{
      const err=await r2.text();
      console.error('GitHub 저장 실패',r2.status,err);
      toast('저장 실패 ✗ (콘솔 확인)');
    }
  }catch(e){
    console.error(e);
    toast('네트워크 오류 ✗');
  }finally{
    btn.textContent='🌐 공유 저장';btn.disabled=false;
  }
}

function rst(){if(!confirm('초기화할까요?'))return;localStorage.removeItem('sv1');location.reload();}

function toast(m){
  let t=document.getElementById('_t');
  if(!t){t=document.createElement('div');t.id='_t';t.style.cssText='position:fixed;bottom:20px;right:20px;background:#1e293b;color:#fff;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;opacity:0;transition:opacity .3s;z-index:999;pointer-events:none';document.body.appendChild(t);}
  t.textContent=m;t.style.opacity='1';clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity='0',2200);
}

let cE=null,cT=null,cBlock=null;

function eD(el){
  cE=el;cT='d';
  document.getElementById('mT').textContent='자리 수정';
  document.getElementById('mN').value=el.querySelector('.name').textContent;
  document.getElementById('mR').value=el.querySelector('.role').textContent;
  document.getElementById('mR').style.display='';
  document.getElementById('cR').style.display='none';
  document.getElementById('delBtn').style.display='';
  document.getElementById('mo').classList.add('on');
  setTimeout(()=>document.getElementById('mN').focus(),80);
}
function eH(el){
  cE=el;cT='h';
  document.getElementById('mT').textContent='부서명 수정';
  document.getElementById('mN').value=el.textContent.trim();
  document.getElementById('mR').style.display='none';
  document.getElementById('cR').style.display='none';
  document.getElementById('delBtn').style.display='none';
  document.getElementById('mo').classList.add('on');
  setTimeout(()=>document.getElementById('mN').focus(),80);
}
function eLg(el){
  cE=el;cT='l';
  const d=el.querySelector('.legend-dot');const k=d.dataset.cls;const v=CM[k]||'#ccc';
  document.getElementById('mT').textContent='범례 수정';
  document.getElementById('mN').value=el.querySelector('.ll').textContent.trim();
  document.getElementById('mR').style.display='none';
  document.getElementById('mC').value=v;
  document.getElementById('mP').style.background=v;
  document.getElementById('cR').style.display='flex';
  document.getElementById('delBtn').style.display='none';
  document.getElementById('mo').classList.add('on');
  setTimeout(()=>document.getElementById('mN').focus(),80);
}
function openAdd(block){
  cBlock=block;cT='add';
  document.getElementById('mT').textContent='자리 추가';
  document.getElementById('mN').value='';
  document.getElementById('mR').value='';
  document.getElementById('mR').style.display='';
  document.getElementById('cR').style.display='none';
  document.getElementById('delBtn').style.display='none';
  document.getElementById('mo').classList.add('on');
  setTimeout(()=>document.getElementById('mN').focus(),80);
}
function delDesk(){
  if(!cE||cT!=='d')return;
  if(!confirm('이 자리를 삭제할까요?'))return;
  const row=cE.parentElement;
  cE.remove();
  if(row&&row.classList.contains('desk-row')&&row.querySelectorAll('.desk').length===0)row.remove();
  sst();cls();
}
function sav(){
  if(cT==='d'){
    cE.querySelector('.name').textContent=document.getElementById('mN').value||'공석';
    cE.querySelector('.role').textContent=document.getElementById('mR').value;
  }else if(cT==='h'){
    cE.textContent=document.getElementById('mN').value;
  }else if(cT==='l'){
    const k=cE.querySelector('.legend-dot').dataset.cls;
    CM[k]=document.getElementById('mC').value;
    cE.querySelector('.ll').textContent=document.getElementById('mN').value;
    apC();
  }else if(cT==='add'&&cBlock){
    const bcls=getBCls(cBlock);
    const desk=document.createElement('div');
    desk.className=`desk b-${bcls}`;
    desk.onclick=function(){eD(this);};
    desk.innerHTML=`<div class="name">${document.getElementById('mN').value||'공석'}</div><div class="role">${document.getElementById('mR').value}</div>`;
    const addBtn=cBlock.querySelector('.btn-add');
    cBlock.insertBefore(desk,addBtn||null);
    apC();
  }
  sst();cls();
}
function cls(){
  document.getElementById('mo').classList.remove('on');
  document.getElementById('mR').style.display='';
  document.getElementById('cR').style.display='none';
  document.getElementById('delBtn').style.display='none';
  cE=null;cT=null;cBlock=null;
}
document.getElementById('mo').addEventListener('click',e=>{if(e.target===document.getElementById('mo'))cls();});
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('mo').classList.contains('on'))sav();if(e.key==='Escape')cls();});

apC();
initAddBtns();
lst();
</script></body></html>
