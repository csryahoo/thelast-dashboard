<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>더라스트 | 대출현황</title>
<script>window.__PD__=null;/*NETLIFY_INJECT*/</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'맑은 고딕',sans-serif;background:#f0f4f8;color:#1e293b;font-size:14px}
.page-wrap{max-width:1280px;margin:0 auto;padding:20px 16px}

/* 헤더 */
.page-header{background:linear-gradient(135deg,#1e3a5f,#2563eb);border-radius:12px;padding:20px 28px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.page-header h1{color:#fff;font-size:18px;font-weight:700}
.page-header .sub{color:#93c5fd;font-size:12px;margin-top:3px}
.updated-badge{background:rgba(255,255,255,.15);color:#fff;font-size:11px;padding:4px 12px;border-radius:20px}

/* 상태 배지 */
#dbg-pd{font-size:11px;padding:4px 10px;border-radius:6px;margin-bottom:12px;display:inline-block}

/* KPI 카드 */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi{background:#fff;border-radius:10px;padding:16px 20px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-left:4px solid #2563eb}
.kpi.warn{border-left-color:#ef4444}
.kpi.green{border-left-color:#10b981}
.kpi.orange{border-left-color:#f59e0b}
.kpi-label{font-size:11px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.kpi-val{font-size:22px;font-weight:700;color:#1e293b}
.kpi-sub{font-size:11px;color:#94a3b8;margin-top:3px}

/* 탭 */
.tab-bar{display:flex;gap:4px;margin-bottom:16px;border-bottom:2px solid #e2e8f0}
.tab{padding:8px 18px;cursor:pointer;border-radius:8px 8px 0 0;font-weight:600;font-size:13px;color:#64748b;border:none;background:none;transition:.15s}
.tab:hover{background:#f1f5f9;color:#1e293b}
.tab.active{background:#2563eb;color:#fff}
.section{display:none}
.section.active{display:block}

/* 카드 */
.card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden;margin-bottom:20px}
.card-head{padding:14px 20px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:8px}
.card-head h2{font-size:14px;font-weight:700;color:#1e293b}
.card-body{padding:0}

/* 테이블 */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #e2e8f0;padding:9px 12px;white-space:nowrap;font-size:13px}
thead th{background:#f8fafc;font-weight:700;color:#475569;position:sticky;top:0;z-index:2;box-shadow:0 1px 0 #e2e8f0}
tbody tr:hover{background:#f8faff}
.txt-r{text-align:right}
.txt-c{text-align:center}

/* D-day 칩 */
.dday-chip{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700}
.dday-urgent{background:#fee2e2;color:#b91c1c}
.dday-warn{background:#fef3c7;color:#92400e}
.dday-ok{background:#d1fae5;color:#065f46}
.dday-over{background:#f1f5f9;color:#94a3b8}

/* 진행률 바 */
.prog-wrap{width:160px;background:#e2e8f0;border-radius:4px;height:8px;overflow:hidden;display:inline-block;vertical-align:middle}
.prog-bar{height:100%;border-radius:4px;transition:.3s}

/* D-day 타임라인 카드 */
.loan-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:16px 20px;margin-bottom:12px;display:flex;align-items:flex-start;gap:20px}
.loan-card.urgent{border-left:4px solid #ef4444}
.loan-card.warn{border-left:4px solid #f59e0b}
.loan-card.ok{border-left:4px solid #10b981}
.loan-code{font-size:11px;font-weight:700;color:#fff;background:#2563eb;padding:2px 8px;border-radius:6px;min-width:36px;text-align:center}
.loan-info{flex:1}
.loan-name{font-weight:700;font-size:14px;margin-bottom:3px}
.loan-meta{font-size:12px;color:#64748b}
.loan-right{text-align:right;min-width:140px}
.loan-balance{font-size:18px;font-weight:700;color:#1e293b}
.loan-int{font-size:12px;color:#64748b;margin-top:2px}

/* 요약 바 */
.sum-row td{background:#f1f5f9!important;font-weight:700}

@media(max-width:768px){
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .page-header{flex-direction:column;gap:8px;align-items:flex-start}
}
</style>
</head>
<body>
<div class="page-wrap">

  <div class="page-header">
    <div>
      <h1>📋 대출 현황</h1>
      <div class="sub">법인 대출 관리대장 | 대출잔액·만기·이자 현황</div>
    </div>
    <div class="updated-badge" id="hdr-date">—</div>
  </div>

  <div id="dbg-pd"></div>

  <!-- KPI -->
  <div class="kpi-row">
    <div class="kpi">
      <div class="kpi-label">총 대출잔액</div>
      <div class="kpi-val" id="k-balance">—</div>
      <div class="kpi-sub" id="k-principal-sub">—</div>
    </div>
    <div class="kpi warn">
      <div class="kpi-label">월 이자 추정</div>
      <div class="kpi-val" id="k-int">—</div>
      <div class="kpi-sub">전 대출 합산</div>
    </div>
    <div class="kpi orange">
      <div class="kpi-label">만기 임박 (D-30)</div>
      <div class="kpi-val" id="k-urgent">—</div>
      <div class="kpi-sub">건</div>
    </div>
    <div class="kpi green">
      <div class="kpi-label">대출 건수</div>
      <div class="kpi-val" id="k-count">—</div>
      <div class="kpi-sub">건</div>
    </div>
  </div>

  <!-- 탭 -->
  <div class="tab-bar">
    <button class="tab active" onclick="showTab(0,this)">대출 현황</button>
    <button class="tab" onclick="showTab(1,this)">만기 타임라인</button>
    <button class="tab" onclick="showTab(2,this)">상환 원장</button>
  </div>

  <!-- TAB 0: 대출현황 테이블 -->
  <div class="section active" id="tab-0">
    <div class="card">
      <div class="card-head"><h2>📊 대출 현황 목록</h2></div>
      <div class="card-body tbl-wrap">
        <table id="t-loans">
          <thead>
            <tr>
              <th>코드</th><th>금융기관</th><th>대출명 / 용도</th>
              <th>상환방식</th><th class="txt-r">대출원금</th>
              <th class="txt-r">대출잔액</th><th class="txt-r">금리(%)</th>
              <th class="txt-r">월이자 추정</th>
              <th>대출일</th><th>만기일</th>
              <th class="txt-c">만기 D-day</th>
              <th class="txt-c">이자납입일</th>
              <th>비고</th>
            </tr>
          </thead>
          <tbody id="tb-loans"></tbody>
          <tfoot id="tf-loans"></tfoot>
        </table>
      </div>
    </div>
  </div>

  <!-- TAB 1: 만기 타임라인 -->
  <div class="section" id="tab-1">
    <div id="timeline-wrap"></div>
  </div>

  <!-- TAB 2: 상환 원장 -->
  <div class="section" id="tab-2">
    <div class="card">
      <div class="card-head"><h2>📑 상환 원장</h2></div>
      <div class="card-body tbl-wrap">
        <table id="t-repay">
          <thead>
            <tr>
              <th>No.</th><th>대출코드</th><th>금융기관</th>
              <th>납입일</th><th class="txt-r">원금상환</th>
              <th class="txt-r">이자납입</th><th class="txt-r">합계납입</th><th>비고</th>
            </tr>
          </thead>
          <tbody id="tb-repay"></tbody>
          <tfoot id="tf-repay"></tfoot>
        </table>
      </div>
    </div>
  </div>

</div>

<script>
const G = { data: null };

function showTab(n, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-' + n).classList.add('active');
}

function fmt(n) {
  if (!n && n !== 0) return '—';
  return Number(n).toLocaleString('ko-KR');
}
function fmtM(n) {
  if (!n && n !== 0) return '—';
  const m = Math.round(n / 1000000);
  return m.toLocaleString('ko-KR') + '백만';
}

function ddayChip(d) {
  if (d === null || d === undefined || d === '') return '<span class="dday-chip dday-over">—</span>';
  const v = Number(d);
  if (isNaN(v)) return `<span class="dday-chip dday-over">${d}</span>`;
  if (v < 0)  return `<span class="dday-chip dday-over">만기 경과</span>`;
  if (v <= 30) return `<span class="dday-chip dday-urgent">D-${v}</span>`;
  if (v <= 90) return `<span class="dday-chip dday-warn">D-${v}</span>`;
  return `<span class="dday-chip dday-ok">D-${v}</span>`;
}

function render() {
  const D = G.data;
  if (!D) return;

  // 날짜
  const now = new Date();
  document.getElementById('hdr-date').textContent =
    now.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'}) + ' 기준';

  // KPI
  const t = D.totals || {};
  document.getElementById('k-balance').textContent   = fmtM(t.balance);
  document.getElementById('k-int').textContent       = fmtM(t.int_est);
  document.getElementById('k-urgent').textContent    = t.urgent ?? '—';
  document.getElementById('k-count').textContent     = t.count  ?? '—';
  document.getElementById('k-principal-sub').textContent =
    '원금 ' + fmtM(t.principal);

  // 대출 테이블
  const tb = document.getElementById('tb-loans');
  tb.innerHTML = (D.loans || []).map(l => {
    const dv = Number(l.dday);
    const urgCls = (!isNaN(dv) && dv >= 0 && dv <= 30) ? 'style="background:#fff5f5"' : '';
    return `<tr ${urgCls}>
      <td class="txt-c"><b>${l.code}</b></td>
      <td>${l.bank}</td>
      <td>${l.name}</td>
      <td class="txt-c">${l.method}</td>
      <td class="txt-r">${fmt(l.principal)}</td>
      <td class="txt-r"><b>${fmt(l.balance)}</b></td>
      <td class="txt-r">${l.rate ? Number(l.rate).toFixed(3) : '—'}%</td>
      <td class="txt-r">${fmt(Math.round(l.int_est))}</td>
      <td class="txt-c">${l.start || '—'}</td>
      <td class="txt-c">${l.maturity || '—'}</td>
      <td class="txt-c">${ddayChip(l.dday)}</td>
      <td class="txt-c">${l.int_day || '—'}</td>
      <td style="max-width:180px;white-space:normal;font-size:12px;color:#64748b">${l.note || ''}</td>
    </tr>`;
  }).join('');

  // 합계행
  const totB = (D.loans||[]).reduce((s,l)=>s+(l.balance||0),0);
  const totP = (D.loans||[]).reduce((s,l)=>s+(l.principal||0),0);
  const totI = (D.loans||[]).reduce((s,l)=>s+(l.int_est||0),0);
  document.getElementById('tf-loans').innerHTML = `
    <tr class="sum-row">
      <td colspan="4" class="txt-c">합 계</td>
      <td class="txt-r">${fmt(totP)}</td>
      <td class="txt-r">${fmt(totB)}</td>
      <td></td>
      <td class="txt-r">${fmt(Math.round(totI))}</td>
      <td colspan="5"></td>
    </tr>`;

  // 타임라인
  renderTimeline(D.loans || []);

  // 상환원장
  const tb2 = document.getElementById('tb-repay');
  const reps = (D.repayments || []).slice().reverse();
  tb2.innerHTML = reps.map(r => `<tr>
    <td class="txt-c">${r.no}</td>
    <td class="txt-c"><b>${r.code}</b></td>
    <td>${r.bank}</td>
    <td class="txt-c">${r.date || '—'}</td>
    <td class="txt-r">${r.principal ? fmt(r.principal) : '—'}</td>
    <td class="txt-r">${r.interest  ? fmt(r.interest)  : '—'}</td>
    <td class="txt-r"><b>${fmt(r.total)}</b></td>
    <td style="font-size:12px;color:#64748b">${r.note||''}</td>
  </tr>`).join('');

  const totRep = reps.reduce((s,r)=>s+(r.total||0),0);
  const totRPrin = reps.reduce((s,r)=>s+(r.principal||0),0);
  const totRInt  = reps.reduce((s,r)=>s+(r.interest||0),0);
  document.getElementById('tf-repay').innerHTML = `
    <tr class="sum-row">
      <td colspan="4" class="txt-c">합 계</td>
      <td class="txt-r">${fmt(totRPrin)}</td>
      <td class="txt-r">${fmt(totRInt)}</td>
      <td class="txt-r">${fmt(totRep)}</td>
      <td></td>
    </tr>`;
}

function renderTimeline(loans) {
  const wrap = document.getElementById('timeline-wrap');
  if (!loans.length) { wrap.innerHTML = '<p style="padding:20px;color:#94a3b8">데이터 없음</p>'; return; }

  const sorted = [...loans].sort((a,b) => (Number(a.dday)||9999) - (Number(b.dday)||9999));
  wrap.innerHTML = sorted.map(l => {
    const dv = Number(l.dday);
    const cls = isNaN(dv) || dv < 0 ? 'ok' : dv <= 30 ? 'urgent' : dv <= 90 ? 'warn' : 'ok';

    // 대출기간 대비 경과 비율
    let progPct = 0, progColor = '#10b981';
    if (l.start && l.maturity) {
      const s = new Date(l.start), e = new Date(l.maturity), n = new Date();
      const total = e - s;
      const elapsed = n - s;
      progPct = Math.min(100, Math.max(0, Math.round(elapsed / total * 100)));
      progColor = progPct >= 90 ? '#ef4444' : progPct >= 70 ? '#f59e0b' : '#10b981';
    }

    return `<div class="loan-card ${cls}">
      <span class="loan-code">${l.code}</span>
      <div class="loan-info">
        <div class="loan-name">${l.bank} · ${l.name || l.method}</div>
        <div class="loan-meta">
          ${l.start||'—'} ~ ${l.maturity||'만기 미정'} &nbsp;|&nbsp;
          금리 ${l.rate ? Number(l.rate).toFixed(3)+'%' : '—'} &nbsp;|&nbsp;
          ${l.method}
          ${l.note ? ' &nbsp;|&nbsp; <span style="color:#94a3b8">'+l.note+'</span>' : ''}
        </div>
        <div style="margin-top:8px;display:flex;align-items:center;gap:8px">
          <div class="prog-wrap">
            <div class="prog-bar" style="width:${progPct}%;background:${progColor}"></div>
          </div>
          <span style="font-size:11px;color:#64748b">${progPct}% 경과</span>
        </div>
      </div>
      <div class="loan-right">
        <div class="loan-balance">${fmtM(l.balance)}</div>
        <div class="loan-int">월이자 ${fmt(Math.round(l.int_est))}원</div>
        <div style="margin-top:6px">${ddayChip(l.dday)}</div>
      </div>
    </div>`;
  }).join('');
}

function _showDbg() {
  const el = document.getElementById('dbg-pd');
  if (window.__PD__) {
    el.style.cssText = 'background:#d1fae5;color:#065f46;padding:4px 10px;border-radius:6px;font-size:11px;display:inline-block;margin-bottom:12px';
    el.textContent = '✓ 서버 데이터 있음 (' + (window.__PD__.totals?.count || '?') + '건)';
  } else {
    el.style.cssText = 'background:#fee2e2;color:#991b1b;padding:4px 10px;border-radius:6px;font-size:11px;display:inline-block;margin-bottom:12px';
    el.textContent = '✗ __PD__ = null (데이터 미주입)';
  }
}

if (window.__PD__) {
  G.data = window.__PD__;
  _showDbg();
  render();
} else {
  document.addEventListener('DOMContentLoaded', _showDbg);
}
</script>
</body>
</html>
