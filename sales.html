<title>월별 매출추이 대시보드 | 더라스트</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Apple SD Gothic Neo','Noto Sans KR',sans-serif; background: #f0f2f7; color: #1a202c; min-height: 100vh; font-size: 13px; }

.header { background: linear-gradient(135deg,#fff 0%,#eef2ff 100%); padding: 18px 28px; border-bottom: 1px solid #dde1f0; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 1px 4px rgba(0,0,0,0.06); position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 18px; font-weight: 700; color: #1a202c; letter-spacing: -0.5px; }
.header .sub { font-size: 11px; color: #64748b; margin-top: 3px; }
.header-right { display: flex; align-items: center; gap: 10px; }

.load-btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 16px; background: #2563eb; color: #fff; border-radius: 7px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; white-space: nowrap; }
.load-btn:hover { background: #1d4ed8; box-shadow: 0 2px 8px rgba(37,99,235,.4); }
.load-btn input { display: none; }
.badge { background: #d1fae5; color: #065f46; font-size: 11px; padding: 4px 12px; border-radius: 20px; font-weight: 600; white-space: nowrap; }
.badge.wait { background: #f1f5f9; color: #94a3b8; }

.tabs { display: flex; background: #fff; border-bottom: 1px solid #dde1f0; padding: 0 28px; position: sticky; top: 73px; z-index: 99; }
.tab { padding: 12px 20px; font-size: 12px; cursor: pointer; border-bottom: 2px solid transparent; color: #94a3b8; transition: all .2s; user-select: none; font-weight: 500; }
.tab.active { color: #2563eb; border-bottom-color: #2563eb; font-weight: 700; }
.tab:hover:not(.active) { color: #475569; }

.content { padding: 22px 28px; }
.section { display: none; }
.section.active { display: block; }

/* KPI */
.kpi-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 20px; }
.kpi-card { background: #fff; border: 1px solid #dde1f0; border-radius: 12px; padding: 18px 20px; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
.kpi-label { font-size: 10px; color: #64748b; letter-spacing: .5px; margin-bottom: 6px; font-weight: 700; text-transform: uppercase; }
.kpi-value { font-size: 22px; font-weight: 700; color: #1a202c; letter-spacing: -0.5px; line-height: 1.2; }
.kpi-unit { font-size: 12px; font-weight: 400; color: #94a3b8; margin-left: 2px; }
.kpi-change { font-size: 11px; margin-top: 5px; color: #64748b; }
.pos { color: #16a34a; } .neg-val { color: #dc2626; }

/* Charts */
.chart-card { background: #fff; border: 1px solid #dde1f0; border-radius: 12px; padding: 18px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
.chart-title { font-size: 12px; font-weight: 700; color: #374151; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.chart-wrap { position: relative; }
.chart-wrap canvas { max-height: 280px; }
.chart-wrap.h220 canvas { max-height: 220px; }

/* Table */
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { text-align: right; padding: 9px 12px; font-size: 10px; font-weight: 700; color: #64748b; border-bottom: 2px solid #e2e8f0; white-space: nowrap; background: #f8fafc; }
th:first-child { text-align: left; }
td { text-align: right; padding: 9px 12px; border-bottom: 1px solid #f1f5f9; color: #374151; white-space: nowrap; font-variant-numeric: tabular-nums; }
td:first-child { text-align: left; font-weight: 600; color: #1a202c; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #f8fafc; }
tr.total-row td { color: #1a202c; font-weight: 700; background: #eef2ff; border-top: 2px solid #c7d2fe; }
tr.sub-row td { color: #64748b; font-size: 11px; }
tr.sub-row td:first-child { padding-left: 20px; }

/* Month buttons */
.month-btns { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.month-btn { padding: 6px 16px; border-radius: 6px; border: 1px solid #dde1f0; background: #fff; color: #64748b; font-size: 12px; cursor: pointer; transition: all .15s; font-family: inherit; }
.month-btn.active { background: #2563eb; border-color: #2563eb; color: #fff; font-weight: 600; }
.month-btn:hover:not(.active) { border-color: #94a3b8; color: #374151; }

/* Sticky thead */
#t-daily thead th { position: sticky; top: 0; z-index: 3; }
#t-rank thead th  { position: sticky; top: 0; z-index: 3; }

/* Rank table */
.rank-no { font-weight: 700; color: #94a3b8; }
tr:nth-child(1) .rank-no { color: #f59e0b; }
tr:nth-child(2) .rank-no { color: #94a3b8; }
tr:nth-child(3) .rank-no { color: #b45309; }

/* Empty state */
#empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; gap: 16px; color: #94a3b8; }
#empty-state .es-icon { font-size: 48px; opacity: .5; }
#empty-state .es-title { font-size: 18px; font-weight: 700; color: #475569; }
#empty-state .es-desc { font-size: 13px; color: #94a3b8; text-align: center; line-height: 1.8; }
.es-btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 22px; background: #2563eb; color: #fff; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 8px; }
.es-btn:hover { background: #1d4ed8; }
.es-btn input { display: none; }

::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
</style>

  if (!v && v!==0) return '<span style="color:#94a3b8">-</span>';
  const cls = v>=0?'pos':'neg-val';
  return `<span class="${cls}">${v>=0?'+':''}${K(v)}</span>`;
};

// ─── 파일 로드 ────────────────────────────────────────────
function loadFile(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  document.getElementById('badge').textContent = '⏳ 로딩중...';
  document.getElementById('badge').className = 'badge wait';
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, { type:'array', cellDates:true });
      parseWorkbook(wb);
      renderAll();
      document.getElementById('empty-state').style.display = 'none';
      document.getElementById('main-content').style.display = 'block';
      const latest = G.months[G.months.length-1];
      document.getElementById('badge').textContent = `● ${latest?.name} 기준`;
      document.getElementById('badge').className = 'badge';
      document.getElementById('sub-txt').textContent =
        `주식회사 더라스트 · ${file.name} · ${new Date().toLocaleDateString('ko-KR')} 업데이트`;
    } catch(err) {
      alert('파일 파싱 오류: ' + err.message);
      document.getElementById('badge').textContent = '오류';
    }
  };
  reader.readAsArrayBuffer(file);
}

// ─── 파싱 ─────────────────────────────────────────────────
function parseWorkbook(wb) {
  const ws = wb.Sheets['전체'];
  if (!ws) throw new Error("'전체' 시트를 찾을 수 없습니다");
  const data = XLSX.utils.sheet_to_json(ws, { header:1, defval:null });

  G.months = [];
  let curMonth = null;
  let pendingTotal = null;

  // 동적 컬럼 매핑 (기본값 – 스마트스토어 없는 구형 월 대비)
  let colMap = { 쇼룸:1, 자사몰:2, 자사채널:3, 팝업:4, 압구정:5, 컬리:6, SSF:7, 외부채널:8, 전채널:9 };

  const buildColMap = row => {
    const m = {};
    row.forEach((v, ci) => {
      if (!v || typeof v !== 'string') return;
      const s = v.trim();
      if (s.includes('쇼룸'))             m['쇼룸'] = ci;
      else if (s.includes('스마트스토어'))  m['스마트스토어'] = ci;
      else if (s.includes('자사몰') || s.includes('카페24')) m['자사몰'] = ci;
      else if (s.includes('자사채널'))     m['자사채널'] = ci;
      else if (s.includes('팝업'))         m['팝업'] = ci;
      else if (s.includes('압구정'))       m['압구정'] = ci;
      else if (s.includes('컬리'))         m['컬리'] = ci;
      else if (s.includes('SSF') || s.includes('ssf')) m['SSF'] = ci;
      else if (s.includes('외부채널'))     m['외부채널'] = ci;
      else if (s.includes('전채널'))       m['전채널'] = ci;
    });
    return Object.keys(m).length >= 4 ? m : null;
  };

  const getVals = row => {
    const g = k => colMap[k] != null ? (row[colMap[k]] || 0) : 0;
    const 쇼룸 = g('쇼룸'), 자사몰 = g('자사몰'), 스마트스토어 = g('스마트스토어');
    const 팝업 = g('팝업'), 압구정 = g('압구정'), 컬리 = g('컬리'), SSF = g('SSF');
    const 자사채널_raw = colMap['자사채널'] != null ? row[colMap['자사채널']] : null;
    const 자사채널 = typeof 자사채널_raw === 'number' ? 자사채널_raw : (쇼룸 + 자사몰 + 스마트스토어);
    const 외부채널_raw = colMap['외부채널'] != null ? row[colMap['외부채널']] : null;
    const 외부채널 = typeof 외부채널_raw === 'number' ? 외부채널_raw : (팝업 + 압구정 + 컬리 + SSF);
    const 전채널_raw = colMap['전채널'] != null ? row[colMap['전채널']] : null;
    const 전채널 = typeof 전채널_raw === 'number' ? 전채널_raw : (자사채널 + 외부채널);
    return { 쇼룸, 자사몰, 스마트스토어, 자사채널, 팝업, 압구정, 컬리, SSF, 외부채널, 전채널 };
  };

  for (let i=0; i<data.length; i++) {
    const row = data[i];
    if (!row || row.length===0) continue;
    const c0 = row[0], c1 = row[1];

    // 컬럼 헤더 행 감지 (A열=null, B열이 문자열 '쇼룸' 등)
    if (c0===null && typeof c1==='string') {
      const newMap = buildColMap(row);
      if (newMap) colMap = newMap;
      continue;
    }
    // 월합계 행: c0가 null이고 c1이 숫자
    if (c0===null && typeof c1==='number' && c1!==0) {
      pendingTotal = getVals(row);
      continue;
    }
    // 월 헤더 행: c0가 '1월','2월' 등
    if (typeof c0==='string' && /^\d+월$/.test(c0)) {
      curMonth = { name:c0, total:pendingTotal||null, daily:[] };
      G.months.push(curMonth);
      pendingTotal = null;
      continue;
    }
    // 일별 행: c0가 Date 객체
    if (curMonth && c0 instanceof Date) {
      curMonth.daily.push({ day:c0.getDate(), ...getVals(row) });
    }
  }

  G.months = G.months.filter(m => m.total || m.daily.length>0);
  G.curMonth = G.months.length - 1;

  // 판매순위 시트 파싱 - 전체 월
  G.rankMonths = {};
  G.rankMonth  = '';
  wb.SheetNames.filter(n => n.includes('판매순위')).forEach(rankName => {
    const mLabel = rankName.match(/^(\d+월)/)?.[1] || rankName;
    G.rankMonth  = mLabel;
    const ws2 = wb.Sheets[rankName];
    const rd  = XLSX.utils.sheet_to_json(ws2, { header:1, defval:null });
    const hIdx = rd.findIndex(r => r && r.some(v => v==='상품명'));
    const data = [];
    if (hIdx >= 0) {
      for (let i=hIdx+1; i<rd.length; i++) {
        const r=rd[i];
        if (!r || !r[1] || typeof r[1]!=='string') continue;
        const qty = typeof r[5]==='number' ? r[5] : 0;
        const tot = typeof r[6]==='number' ? r[6] : 0;
        const cost = typeof r[8]==='number' ? r[8] : null;
        const ctotal = cost && qty>0 ? Math.round(cost*qty) : null;
        const profit = ctotal!=null ? tot-ctotal : null;
        const margin = profit!=null && tot>0 ? Math.round(profit/tot*1000)/10 : null;
        data.push({ code:r[0]||'', name:r[1], price:r[2]||0, qty, total:tot,
                    cost, ctotal, profit, margin });
      }
      data.sort((a,b) => b.total - a.total);
    }
    G.rankMonths[mLabel] = data;
  });
}

// ─── 렌더링 ───────────────────────────────────────────────
function renderAll() {
  renderKPIs();
  renderMonthlyChart();
  renderMonthlyTable();
  renderMonthBtns();
  renderDailyChart();
  renderDailyTable();
  renderRankMonthBtns();
  renderRankTable(G.rankMonth);
}

function renderKPIs() {
  const latest = G.months[G.months.length-1];
  const prev   = G.months.length>=2 ? G.months[G.months.length-2] : null;
  if (!latest?.total) { document.getElementById('kpi-grid').innerHTML=''; return; }
  const t=latest.total, p=prev?.total;
  const chgPct = p ? ((t.전채널-p.전채널)/Math.abs(p.전채널)*100) : null;
  const cumul = G.months.reduce((s,m)=>s+(m.total?.전채널||0),0);

  document.getElementById('kpi-grid').innerHTML = `
    <div class="kpi-card">
      <div class="kpi-label">전채널 합계 (${latest.name})</div>
      <div class="kpi-value">${K(t.전채널)}<span class="kpi-unit">원</span></div>
      <div class="kpi-change">${chgPct!==null?`<span class="${chgPct>=0?'pos':'neg-val'}">${chgPct>=0?'▲':'▼'}${Math.abs(chgPct).toFixed(1)}% MoM</span>` : '전월 데이터 없음'}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">자사채널 합계</div>
      <div class="kpi-value">${K(t.자사채널)}<span class="kpi-unit">원</span></div>
      <div class="kpi-change">쇼룸 ${K(t.쇼룸)} · 자사몰 ${K(t.자사몰)} · 스마트스토어 ${K(t.스마트스토어||0)}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">외부채널 합계</div>
      <div class="kpi-value">${K(t.외부채널)}<span class="kpi-unit">원</span></div>
      <div class="kpi-change">압구정 ${K(t.압구정)} · SSF ${K(t.SSF)} · 컬리 ${K(t.컬리)}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">${G.months.length}개월 누계</div>
      <div class="kpi-value">${K(cumul)}<span class="kpi-unit">원</span></div>
      <div class="kpi-change">${G.months[0]?.name} ~ ${latest.name}</div>
    </div>`;
}

function renderMonthlyChart() {
  if (charts.monthly) { charts.monthly.destroy(); }
  const labels = G.months.map(m=>m.name);
  const DEFS = [
    {key:'자사몰',color:'#3b82f6'},{key:'쇼룸',color:'#10b981'},
    {key:'스마트스토어',color:'#22d3ee'},
    {key:'압구정',color:'#f59e0b'},{key:'SSF',color:'#8b5cf6'},
    {key:'컬리',color:'#06b6d4'},{key:'팝업',color:'#ec4899'},
  ];
  const ctx = document.getElementById('c-monthly').getContext('2d');
  charts.monthly = new Chart(ctx, {
    type:'line',
    data:{ labels, datasets: DEFS.map(d=>({
      label:d.key, data:G.months.map(m=>m.total?.[d.key]||0),
      borderColor:d.color, backgroundColor:d.color+'22',
      fill:false, tension:0.3,
      pointBackgroundColor:d.color, pointBorderColor:'#fff',
      pointBorderWidth:2, pointRadius:6, pointHoverRadius:8, borderWidth:2.5,
    }))},
    options:{
      plugins:{
        legend:{labels:{color:'#475569',boxWidth:12,padding:14}},
        tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${K(c.raw)}`}}
      },
      scales:{
        x:{grid:{display:false},ticks:{color:'#94a3b8'}},
        y:{grid:{color:'rgba(0,0,0,0.06)'},ticks:{callback:v=>K(v),color:'#94a3b8'}}
      }
    }
  });
}

function renderMonthlyTable() {
  const ROWS = [
    {key:'전채널', label:'전채널 통합', bold:true},
    {key:'자사채널', label:'자사채널 합계', bold:true},
    {key:'쇼룸', label:'  └ 쇼룸', sub:true},
    {key:'자사몰', label:'  └ 자사몰(카페24)', sub:true},
    {key:'스마트스토어', label:'  └ 스마트스토어', sub:true},
    {key:'외부채널', label:'외부채널 합계', bold:true},
    {key:'압구정', label:'  └ 압구정 현대백화점', sub:true},
    {key:'SSF', label:'  └ SSF', sub:true},
    {key:'컬리', label:'  └ 컬리', sub:true},
    {key:'팝업', label:'  └ 팝업', sub:true},
  ];
  let html = `<thead><tr><th>채널</th>${G.months.map(m=>`<th>${m.name}</th>`).join('')}<th>MoM 증감</th></tr></thead><tbody>`;
  ROWS.forEach(r => {
    const vals = G.months.map(m=>m.total?.[r.key]||0);
    const n = vals.length;
    const diff = n>=2 ? vals[n-1]-vals[n-2] : null;
    const rowCls = r.bold ? ' class="total-row"' : r.sub ? ' class="sub-row"' : '';
    html += `<tr${rowCls}><td>${r.label}</td>${vals.map(v=>`<td>${K(v)}</td>`).join('')}<td>${diff!==null?chgHtml(diff):'-'}</td></tr>`;
  });
  html += '</tbody>';
  document.getElementById('t-monthly').innerHTML = html;
}

function renderMonthBtns() {
  document.getElementById('month-btns').innerHTML =
    G.months.map((m,i)=>
      `<button class="month-btn${i===G.curMonth?' active':''}" onclick="selectMonth(${i})">${m.name}</button>`
    ).join('');
}

function selectMonth(i) {
  G.curMonth = i;
  document.querySelectorAll('#month-btns .month-btn').forEach((b,j)=>b.classList.toggle('active',j===i));
  renderDailyChart();
  renderDailyTable();
}

function renderDailyChart() {
  if (charts.daily) { charts.daily.destroy(); }
  const m = G.months[G.curMonth];
  if (!m) return;
  document.getElementById('daily-title').textContent = `📅 ${m.name} 일별 매출 추이`;
  const labels = m.daily.map(d=>`${d.day}일`);
  const ctx = document.getElementById('c-daily').getContext('2d');
  charts.daily = new Chart(ctx, {
    type:'bar',
    data:{ labels, datasets:[
      { label:'전채널', type:'line', data:m.daily.map(d=>d.전채널), borderColor:'#1e40af', backgroundColor:'transparent', fill:false, tension:0.3, pointRadius:2, pointHoverRadius:5, borderWidth:2, yAxisID:'y' },
      { label:'자사몰', data:m.daily.map(d=>d.자사몰), backgroundColor:'#3b82f699', borderColor:'#3b82f6', borderWidth:1 },
      { label:'쇼룸',   data:m.daily.map(d=>d.쇼룸),   backgroundColor:'#10b98199', borderColor:'#10b981', borderWidth:1 },
      { label:'스마트스토어', data:m.daily.map(d=>d.스마트스토어||0), backgroundColor:'#22d3ee99', borderColor:'#22d3ee', borderWidth:1 },
      { label:'외부채널', data:m.daily.map(d=>d.외부채널), backgroundColor:'#f59e0b99', borderColor:'#f59e0b', borderWidth:1 },
    ]},
    options:{
      plugins:{
        legend:{labels:{color:'#475569',boxWidth:12,padding:12}},
        tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${K(c.raw)}`}}
      },
      scales:{
        x:{grid:{display:false},ticks:{color:'#94a3b8',maxRotation:45,font:{size:9}}},
        y:{grid:{color:'rgba(0,0,0,0.06)'},ticks:{callback:v=>K(v),color:'#94a3b8'}}
      }
    }
  });
}

function renderDailyTable() {
  const m = G.months[G.curMonth];
  if (!m) return;
  const DCOLS = ['쇼룸','자사몰','스마트스토어','자사채널','팝업','압구정','컬리','SSF','외부채널','전채널'];
  let html = `<thead><tr><th>일</th>${DCOLS.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>`;
  let totals = {};
  DCOLS.forEach(c => { totals[c]=0; });
  m.daily.forEach(d => {
    html += `<tr><td>${d.day}일</td>${DCOLS.map(c=>{totals[c]+=(d[c]||0);return`<td>${K(d[c])}</td>`;}).join('')}</tr>`;
  });
  html += `<tr class="total-row"><td>합계</td>${DCOLS.map(c=>`<td>${K(totals[c])}</td>`).join('')}</tr>`;
  html += '</tbody>';
  document.getElementById('t-daily').innerHTML = html;
}

function renderRankMonthBtns() {
  const keys = Object.keys(G.rankMonths)
    .sort((a,b) => parseInt(a) - parseInt(b));  // 4월→5월 오름차순
  const el = document.getElementById('rank-month-btns');
  if (!el) return;
  if (keys.length <= 1) { el.innerHTML = ''; return; }
  el.innerHTML = keys.map(k =>
    `<button class="month-btn${k===G.rankMonth?' active':''}" onclick="switchRankMonth('${k}',this)">${k}</button>`
  ).join('');
}

function switchRankMonth(month, el) {
  G.rankMonth = month;
  document.querySelectorAll('#rank-month-btns .month-btn').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  renderRankTable(month);
}

function renderRankTable(month) {
  const rankData = G.rankMonths[month || G.rankMonth] || [];
  if (!rankData.length) {
    document.getElementById('t-rank').innerHTML = '<tr><td style="padding:20px;color:#94a3b8">판매순위 시트를 찾을 수 없습니다. 시트명에 "판매순위"가 포함되어야 합니다.</td></tr>';
    return;
  }
  document.getElementById('rank-title').textContent = `🏆 ${month || G.rankMonth} 자사몰 판매순위 (금액 기준)`;
  const fmt = v => v == null ? '-' : (v < 0 ? '-' : '') + Math.abs(Math.round(v)).toLocaleString();
  const fmtC = (v, pos) => v == null ? '<span style="color:#94a3b8">-</span>'
    : `<span style="color:${v < 0 ? '#dc2626' : pos ? '#1a202c' : '#374151'}">${fmt(v)}</span>`;
  const badge = m => m == null
    ? '<span style="color:#94a3b8;font-size:10px">-</span>'
    : `<span style="background:${m>=70?'#dcfce7':m>=50?'#fef9c3':'#fee2e2'};color:${m>=70?'#15803d':m>=50?'#854d0e':'#dc2626'};font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px">${m}%</span>`;
  let html = `<thead><tr style="background:#f8fafc;font-size:11px;color:#64748b">
    <th style="padding:8px 6px;text-align:center;width:36px">#</th>
    <th style="padding:8px 10px;text-align:left;width:260px">상품명</th>
    <th style="padding:8px 8px;text-align:right;width:60px">수량</th>
    <th style="padding:8px 8px;text-align:right;width:80px">판매가</th>
    <th style="padding:8px 8px;text-align:right;width:90px">판매합계</th>
    <th style="padding:8px 8px;text-align:right;width:70px">원가</th>
    <th style="padding:8px 8px;text-align:right;width:90px">원가합계</th>
    <th style="padding:8px 8px;text-align:right;width:90px">이익액</th>
    <th style="padding:8px 8px;text-align:center;width:60px">마진율</th>
  </tr></thead><tbody>`;
  // ─── 합계 행 ───
  const totQty    = rankData.reduce((s,r)=>s+(r.qty||0),0);
  const totSales  = rankData.reduce((s,r)=>s+(r.total||0),0);
  const totCtotal = rankData.reduce((s,r)=>r.ctotal!=null?s+r.ctotal:s,0);
  const totProfit = rankData.reduce((s,r)=>r.profit!=null?s+r.profit:s,0);
  const totMargin = totSales>0 ? Math.round(totProfit/totSales*100) : null;
  const hasC = rankData.some(r=>r.ctotal!=null);
  html += `<tr style="background:#eef2ff;font-weight:700;border-top:2px solid #c7d2fe;border-bottom:2px solid #c7d2fe">
    <td style="padding:8px 6px;text-align:center;font-size:11px;color:#6366f1">합계</td>
    <td style="padding:8px 10px;font-size:12px;color:#4f46e5">총 ${rankData.length}개 상품</td>
    <td style="padding:8px 8px;text-align:right;font-size:12px;color:#4f46e5">${totQty.toLocaleString()}</td>
    <td style="padding:8px 8px;text-align:right;font-size:12px;color:#94a3b8">-</td>
    <td style="padding:8px 8px;text-align:right;font-size:12px;color:#4f46e5">${totSales.toLocaleString()}</td>
    <td style="padding:8px 8px;text-align:right;font-size:12px;color:#94a3b8">-</td>
    <td style="padding:8px 8px;text-align:right;font-size:12px;color:${hasC?'#4f46e5':'#94a3b8'}">${hasC?totCtotal.toLocaleString():'-'}</td>
    <td style="padding:8px 8px;text-align:right;font-size:12px;color:${hasC?(totProfit>=0?'#16a34a':'#dc2626'):'#94a3b8'}">${hasC?totProfit.toLocaleString():'-'}</td>
    <td style="padding:8px 8px;text-align:center">${totMargin!=null&&hasC?`<span style="background:${totMargin>=70?'#dcfce7':totMargin>=50?'#fef9c3':'#fee2e2'};color:${totMargin>=70?'#15803d':totMargin>=50?'#854d0e':'#dc2626'};font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px">${totMargin}%</span>`:'<span style="color:#94a3b8;font-size:10px">-</span>'}</td>
  </tr>`;
  rankData.forEach((r,i) => {
    const pos = r.total > 0;
    const profitColor = r.profit == null ? '#94a3b8' : r.profit > 0 ? '#16a34a' : r.profit < 0 ? '#dc2626' : '#374151';
    html += `<tr style="border-bottom:1px solid #f1f5f9;${!pos?'background:#fff8f8':''}">
      <td style="padding:7px 6px;text-align:center;font-size:11px;color:#94a3b8">${i+1}</td>
      <td style="padding:7px 10px;font-size:12px;text-align:left;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r.name}">${r.name}</td>
      <td style="padding:7px 8px;text-align:right;font-size:12px;color:${r.qty<0?'#dc2626':'#374151'}">${r.qty.toLocaleString()}</td>
      <td style="padding:7px 8px;text-align:right;font-size:12px;color:#64748b">${fmt(r.price)}</td>
      <td style="padding:7px 8px;text-align:right;font-size:12px;font-weight:600">${fmtC(r.total, pos)}</td>
      <td style="padding:7px 8px;text-align:right;font-size:12px;color:#64748b">${fmt(r.cost)}</td>
      <td style="padding:7px 8px;text-align:right;font-size:12px;color:#64748b">${fmt(r.ctotal)}</td>
      <td style="padding:7px 8px;text-align:right;font-size:12px;font-weight:600;color:${profitColor}">${fmt(r.profit)}</td>
      <td style="padding:7px 8px;text-align:center">${badge(r.margin)}</td>
    </tr>`;
  });
  html += '</tbody>';
  document.getElementById('t-rank').innerHTML = html;
}

// ─── 탭 전환 ──────────────────────────────────────────────
function showTab(i, el) {
  document.querySelectorAll('.section').forEach((s,j)=>s.classList.toggle('active',j===i));
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',j===i));
  // 일별 탭 진입 시 차트 재렌더 (캔버스 크기 이슈 방지)
  if (i===1) { setTimeout(()=>{ if(charts.daily){charts.daily.resize();} },50); }
}

// ─── 자동 렌더 (Netlify 배포 환경) ──────────────────────────
if (window.__PD__) {
  Object.assign(G, window.__PD__);
  G.curMonth = G.months.length - 1;
  renderAll();
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';
  const _l = G.months[G.months.length-1];
  if (_l) {
    document.getElementById('badge').textContent = '● ' + _l.name + ' 기준';
    document.getElementById('badge').className = 'badge';
  }
  document.getElementById('sub-txt').textContent = '주식회사 더라스트 · 자동 업데이트됨';
}
</script>
