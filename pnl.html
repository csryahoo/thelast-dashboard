<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>손익 대시보드 | 더라스트</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');
:root{--bg:#f8fafc;--card:#fff;--border:rgba(0,0,0,0.08);--text:#1e293b;--muted:#64748b;
  --ind:#6366f1;--grn:#10b981;--amb:#f59e0b;--red:#ef4444;--pur:#8b5cf6;--cyn:#06b6d4;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;line-height:1.6;min-height:100vh;}

/* Header */
.hd{background:var(--card);border-bottom:2px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;}
.hd-title{font-size:1rem;font-weight:700;letter-spacing:-.02em;}
.hd-right{display:flex;align-items:center;gap:10px;}
.load-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;background:var(--ind);color:#fff;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
.load-btn:hover{background:#4f46e5;}
.load-btn input{display:none;}
.nav-period{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);background:rgba(99,102,241,0.08);border:1px solid rgba(99,102,241,0.2);padding:3px 10px;border-radius:4px;}

/* Tabs */
.tabs{display:flex;gap:4px;padding:12px 24px;background:var(--card);border-bottom:1px solid var(--border);}
.tab{padding:7px 18px;font-size:12px;font-family:'Noto Sans KR',sans-serif;border-radius:6px;cursor:pointer;border:1px solid var(--border);color:var(--muted);background:#fff;transition:all .2s;white-space:nowrap;font-weight:500;}
.tab.active{background:var(--ind);border-color:var(--ind);color:#fff;}
.tab:hover:not(.active){border-color:rgba(99,102,241,.35);color:var(--ind);}
.panel{display:none;padding:1.5rem 1.5rem;}.panel.active{display:block;}

/* KPI */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1rem;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1rem;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.2rem 1.4rem;position:relative;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.kpi.ind::before{background:var(--ind);}.kpi.grn::before{background:var(--grn);}
.kpi.amb::before{background:var(--amb);}.kpi.red::before{background:var(--red);}
.kpi .klabel{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;}
.kpi .kval{font-family:'DM Mono',monospace;font-size:1.4rem;font-weight:500;}
.kpi.ind .kval{color:var(--ind);}.kpi.grn .kval{color:#059669;}
.kpi.amb .kval{color:#d97706;}.kpi.red .kval{color:var(--red);}
.kpi .ksub{font-size:11px;color:var(--muted);margin-top:3px;}
.kpi .kdiff{font-family:'DM Mono',monospace;font-size:11px;margin-top:5px;display:inline-block;padding:2px 8px;border-radius:3px;}
.kdiff.up{background:rgba(16,185,129,.12);color:#059669;}.kdiff.dn{background:rgba(239,68,68,.10);color:var(--red);}

/* Card */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.3rem;box-shadow:0 1px 4px rgba(0,0,0,.05);margin-bottom:1rem;}
.card-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:1rem;}
.chart-wrap canvas{max-height:240px;}
.chart-wrap.h300 canvas{max-height:300px;}

/* Table */
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{text-align:right;color:var(--muted);font-weight:600;padding:7px 10px;border-bottom:2px solid var(--border);font-size:11px;background:#f8fafc;}
.tbl th:first-child{text-align:left;}
.tbl td{padding:7px 10px;text-align:right;font-family:'DM Mono',monospace;font-size:12px;border-bottom:1px solid rgba(0,0,0,.04);}
.tbl td:first-child{text-align:left;font-family:'Noto Sans KR',sans-serif;}
.tbl tr:hover td{background:rgba(99,102,241,.03);}
.tbl .up{color:#059669;}.tbl .dn{color:var(--red);}
.tbl .tr-total td{font-weight:700;border-top:2px solid var(--border);background:#f8fafc;}
.tbl .tr-sub td{font-size:11px;color:var(--muted);}
.tbl .tr-sub td:first-child{padding-left:18px;}
.tbl .tr-hi td{font-weight:700;}

/* Comment */
.comment-area{width:100%;border:1px solid var(--border);border-radius:8px;padding:.9rem 1rem;font-family:'Noto Sans KR',sans-serif;font-size:13px;line-height:1.9;color:var(--text);background:#fff;resize:vertical;min-height:140px;outline:none;transition:border-color .2s;}
.comment-area:focus{border-color:var(--ind);box-shadow:0 0 0 3px rgba(99,102,241,.1);}
.save-bar{display:flex;align-items:center;justify-content:flex-end;gap:.6rem;margin-bottom:1rem;}
.btn-save{display:inline-flex;align-items:center;gap:6px;padding:7px 18px;background:var(--ind);color:#fff;border:none;border-radius:7px;font-size:12px;font-family:'Noto Sans KR',sans-serif;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-save:hover{background:#4f46e5;}
.save-notice{font-size:11px;color:var(--muted);}
.sec-label{font-size:11px;font-weight:700;color:var(--ind);text-transform:uppercase;letter-spacing:.08em;margin:1.5rem 0 .7rem;padding-left:8px;border-left:3px solid var(--ind);}

/* ── Master-detail (Panel 1) ── */
.detail-wrap{display:grid;grid-template-columns:210px 1fr;gap:1rem;min-height:560px;}
.detail-nav{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px;overflow-y:auto;max-height:78vh;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.nav-grp-hd{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding:10px 10px 4px;margin-top:2px;}
.nav-grp-hd:first-child{margin-top:0;padding-top:4px;}
.nav-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:7px;cursor:pointer;transition:all .15s;border:1px solid transparent;margin-bottom:2px;}
.nav-item:hover:not(.active){background:rgba(99,102,241,.06);border-color:rgba(99,102,241,.15);}
.nav-item.active{background:var(--ind);color:#fff;}
.nav-item.active .nav-val{color:rgba(255,255,255,.8);}
.nav-ico{font-size:14px;flex-shrink:0;line-height:1;}
.nav-lbl{font-size:12px;font-weight:500;flex:1;line-height:1.3;}
.nav-val{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);white-space:nowrap;}
.detail-content{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.5rem;overflow-y:auto;max-height:78vh;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.detail-pane{display:none;}.detail-pane.active{display:block;}
.detail-hd{display:flex;align-items:baseline;gap:10px;margin-bottom:1.2rem;padding-bottom:.8rem;border-bottom:1px solid var(--border);}
.detail-hd-title{font-size:14px;font-weight:700;color:var(--text);}
.detail-hd-sub{font-size:11px;color:var(--muted);}
.chart-wrap.h380 canvas{max-height:380px;}
.detail-tbl{width:100%;border-collapse:collapse;font-size:11px;margin-top:1.2rem;}
.detail-tbl th{text-align:right;color:var(--muted);font-weight:600;padding:6px 8px;border-bottom:2px solid var(--border);background:#f8fafc;font-size:10px;}
.detail-tbl th:first-child{text-align:left;}
.detail-tbl td{padding:6px 8px;text-align:right;font-family:'DM Mono',monospace;border-bottom:1px solid rgba(0,0,0,.04);}
.detail-tbl td:first-child{text-align:left;font-family:'Noto Sans KR',sans-serif;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.detail-tbl tr:hover td{background:rgba(99,102,241,.03);}
.detail-tbl .tr-total td{font-weight:700;border-top:2px solid var(--border);background:#f8fafc;}
.detail-tbl .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;flex-shrink:0;}

/* Empty state */
#empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px;color:var(--muted);}
.es-icon{font-size:48px;opacity:.4;}
.es-title{font-size:18px;font-weight:700;color:#475569;}
.es-desc{font-size:13px;text-align:center;line-height:1.8;}
.es-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 22px;background:var(--ind);color:#fff;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px;}
.es-btn:hover{background:#4f46e5;}
.es-btn input{display:none;}
</style>

  taxDetail:[], rentDetail:[], repairDetail:[], insuranceDetail:[],
  vehicleDetail:[], deliveryDetail:[], trainingDetail:[], suppliesDetail:[],
  sfeeDetail:[], leaseDetail:[],
};
const charts = {};
const SAVED = { current:'', compare:'' };

// ─── 포맷 ────────────────────────────────────────────────
const K = v => {
  if(v===null||v===undefined||isNaN(v)) return '-';
  const a=Math.abs(v);
  const r=Math.round(a).toLocaleString('ko-KR');
  return (v<0?'-':'')+r;
};
const pctStr = (v,base) => base?(v/Math.abs(base)*100).toFixed(1)+'%':'-';
Chart.defaults.color='#64748b'; Chart.defaults.font.family="'DM Mono',monospace"; Chart.defaults.font.size=11;
const GRID='rgba(0,0,0,0.06)', TICK='#94a3b8';
const LC=['#6366f1','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#f97316','#ec4899','#84cc16','#14b8a6'];

// ─── 파일 로드 ────────────────────────────────────────────
function loadFile(evt) {
  const file = evt.target.files[0]; if(!file) return;
  document.getElementById('period-badge').textContent = '⏳ 로딩중...';
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, {type:'array', cellDates:true});
      parseWorkbook(wb);
      renderAll();
      document.getElementById('empty-state').style.display = 'none';
      document.getElementById('main-wrap').style.display = 'block';
      document.getElementById('period-badge').textContent = `${G.months.join(' / ')} 기준`;
      document.getElementById('sub-txt').textContent = `주식회사 더라스트 · ${file.name} · ${new Date().toLocaleDateString('ko-KR')} 업데이트`;
    } catch(err) { alert('파싱 오류: '+err.message); }
  };
  reader.readAsArrayBuffer(file);
}

// ─── 파싱 ─────────────────────────────────────────────────
// 광고선전비 광고 항목 키워드 (노란색 셀 = 광고 카테고리)
const AD_KEYWORDS = ['샵라이브','페이스북','카카오','싱커드','아라한','블리츠씰','그마음','씨이시스템','크리마팩토리'];
const isAdItem = name => AD_KEYWORDS.some(k => name.includes(k));

function parseWorkbook(wb) {
  // ── 1. '전체' 시트 파싱 ──
  const ws = wb.Sheets['전체'];
  if(!ws) throw new Error("'전체' 시트 없음");
  const raw = XLSX.utils.sheet_to_json(ws, {header:1, defval:null});

  const hdr = raw[0];
  G.months = [];
  G.monthCols = [];
  for(let c=4; c<(hdr?.length||0); c+=2) {
    const v = hdr[c];
    if(typeof v==='string' && v.includes('년') && v.includes('월')) {
      const m = v.replace('2026년','').replace('년','').replace(/^0/,'');
      G.months.push(m);
      G.monthCols.push(c);
    }
  }

  const getItem = (rowIdx) => {
    const r = raw[rowIdx];
    if(!r) return G.monthCols.map(()=>0);
    return G.monthCols.map(c => typeof r[c]==='number' ? r[c] : 0);
  };
  const getItemRatio = (rowIdx) => {
    const r = raw[rowIdx];
    if(!r) return G.monthCols.map(()=>null);
    return G.monthCols.map(c => typeof r[c+1]==='number' ? r[c+1] : null);
  };

  G.pl = {
    매출액: getItem(1),
    매출원가: getItem(3),
    매출원가율: getItemRatio(3),
    기말재고: getItem(7),
    매출총이익: getItem(8),
    판관비: getItem(9),
    임원급여: getItem(10),
    직원급여: getItem(11),
    상여금: getItem(12),
    잡급: getItem(13),
    퇴직급여: getItem(14),
    복리후생비: getItem(15),
    여비교통비: getItem(16),
    접대비: getItem(17),
    통신비: getItem(18),
    수도광열비: getItem(19),
    전력비: getItem(20),
    세금과공과: getItem(21),
    지급임차료: getItem(22),
    보험료: getItem(23),
    차량유지비: getItem(24),
    운반비: getItem(25),
    소모품비: getItem(26),
    지급수수료: getItem(27),
    광고선전비: getItem(28),
    판매수수료: getItem(29),
    리스료: getItem(30),
    인적용역비: getItem(31),
    견본비: getItem(32),
    판매촉진비: getItem(33),
    영업이익: getItem(34),
    당기순이익: getItem(44),
  };

  // 손익계산서 형식 (전체 월 + 누계)
  const ROMAN = 'ⅠⅡⅢⅣⅤⅥⅦⅧⅨⅩⅪⅫ';
  const stmtRows = [];
  for (let ri = 1; ri < raw.length; ri++) {
    const r = raw[ri];
    if (!r || !r[0] || typeof r[0] !== 'string') continue;
    const name = r[0];
    const isSec = ROMAN.includes(name.trim()[0]);
    const indent = name.length - name.trimStart().length;
    const vals   = G.monthCols.map(c => typeof r[c] === 'number' ? r[c] : 0);
    const ratios = G.monthCols.map(c => typeof r[c+1] === 'number' ? Math.round(r[c+1]*1000)/10 : null);
    const cum    = typeof r[1] === 'number' ? r[1] : 0;
    const cumR   = typeof r[2] === 'number' ? Math.round(r[2]*1000)/10 : null;
    stmtRows.push({ name: name.trim(), sec: isSec, lv: Math.min(Math.floor(indent/4), 1),
                    v: vals, r: ratios, cum, cumR });
  }
  G.statement = { months: G.months, rows: stmtRows };

  const startInv = raw[5] ? (typeof raw[5][4]==='number' ? raw[5][4] : null) : null;
  G.inv = startInv ? [startInv, ...G.pl.기말재고] : G.pl.기말재고;

  // ── 2. '항목별 세부금액' 시트 파싱 ──
  const ws2 = wb.Sheets['항목별 세부금액'];
  G.revDetail=[]; G.matDetail=[];
  G.svfeeDetail=[]; G.adPhotoDetail=[]; G.adAdDetail=[];

  if(ws2) {
    const rd = XLSX.utils.sheet_to_json(ws2, {header:1, defval:null});
    const hdr2 = rd[1] || [];
    const mCols2 = [];
    for(let c=2; c<hdr2.length; c++) {
      if(typeof hdr2[c]==='string' && hdr2[c].includes('년')) mCols2.push(c);
    }

    let section = null;
    for(let i=2; i<rd.length; i++) {
      const r = rd[i]; if(!r) continue;
      const c1 = r[1];
      const c2 = r[2];
      // C열(r[2])에 '년'이 포함된 행 = 섹션 헤더
      if(typeof c2==='string' && c2.includes('년')) {
        if     (c1==='제품매출')   section='rev';
        else if(c1==='원재료 등')  section='mat';
        else if(c1==='지급수수료') section='svfee';
        else if(c1==='광고선전비') section='ad';
        else                       section=null;  // 기타 섹션 무시
        continue;
      }
      if(!section) continue;
      if(!c1 || typeof c1!=='string') continue;
      const firstVal = r[mCols2[0]];
      if(typeof firstVal!=='number' && firstVal!==null) continue;
      const vals = mCols2.map(c => typeof r[c]==='number' ? r[c] : 0);
      const total = vals.reduce((s,v)=>s+v, 0);
      if(total===0) continue;
      const item = {name:c1.replace('（주）','(주)'), vals, total};
      if(section==='rev')   G.revDetail.push(item);
      if(section==='mat')   G.matDetail.push(item);
      if(section==='svfee') G.svfeeDetail.push(item);
      if(section==='ad') {
        if(isAdItem(c1)) G.adAdDetail.push(item);
        else             G.adPhotoDetail.push(item);
      }
    }
    // 합계 내림차순 정렬 (전체 유지, 차트에서만 top5 슬라이스)
    for(const arr of [G.revDetail,G.matDetail,G.svfeeDetail,G.adPhotoDetail,G.adAdDetail]) {
      arr.sort((a,b)=>b.total-a.total);
    }
  }
}

function renderAll() {
  renderKPIs();
  renderMainChart();
  renderInvChart();
  renderStatement();
  renderChannelChart();
  renderMatChart();
  renderPnlDetailCharts();
  renderSgaCharts();
  updateNavVals();
  // 모든 섹션 상세 테이블 렌더링
  SECTIONS.forEach(s => {
    const arr = G[s.dataKey] || [];
    // 차트 상위 5개: 최근 데이터 월 기준 내림차순
    const latestIdx = lastNonZeroIdx(arr);
    const sortedByLatest = [...arr].sort((a, b) => {
      const av = latestIdx >= 0 ? (a.vals?.[latestIdx] ?? 0) : 0;
      const bv = latestIdx >= 0 ? (b.vals?.[latestIdx] ?? 0) : 0;
      return bv - av;
    });
    mkDetailMultiLine(s.chartId, sortedByLatest.slice(0, 5));
    renderDetailTable(s.tableId, arr);
  });
}

function latest(arr) { return arr?.[arr.length-1] ?? 0; }
function prev(arr)   { return arr?.[arr.length-2] ?? 0; }
function diff(arr)   { return latest(arr)-prev(arr); }
function pctDiff(arr){ const p=prev(arr); return p?(diff(arr)/Math.abs(p)*100).toFixed(1):null; }

function renderKPIs() {
  const p = [document.getElementById('kpi-main')];
  const l_rev=latest(G.pl.매출액), d_rev=diff(G.pl.매출액), pd_rev=pctDiff(G.pl.매출액);
  const l_op=latest(G.pl.영업이익), p_op=prev(G.pl.영업이익);
  const l_cost=latest(G.pl.매출원가), l_rate=latest(G.pl.매출원가율);
  const l_sga=latest(G.pl.판관비), l_sga_r=G.pl.매출액?.[G.pl.매출액.length-1]?l_sga/G.pl.매출액[G.pl.매출액.length-1]*100:null;
  const curM = G.months[G.months.length-1] || '최신';
  const html = `
    <div class="kpi ind">
      <div class="klabel">해당월 매출액</div>
      <div class="kval">${K(l_rev)}</div>
      <div class="ksub">전월 ${K(prev(G.pl.매출액))} → ${curM} ${K(l_rev)}</div>
      <span class="kdiff ${pd_rev>=0?'up':'dn'}">${pd_rev!==null?(pd_rev>=0?'▲':'▼')+Math.abs(pd_rev)+'% MoM':''}</span>
    </div>
    <div class="kpi amb">
      <div class="klabel">해당월 원가</div>
      <div class="kval">${K(l_cost)}</div>
      <div class="ksub">원가율 ${l_rate!==null?(l_rate*100).toFixed(1)+'%':'-'}</div>
    </div>
    <div class="kpi red">
      <div class="klabel">해당월 판관비</div>
      <div class="kval">${K(l_sga)}</div>
      <div class="ksub">판관비율 ${l_sga_r!==null?l_sga_r.toFixed(1)+'%':'-'}</div>
    </div>
    <div class="kpi grn">
      <div class="klabel">해당월 영업이익</div>
      <div class="kval">${K(l_op)}</div>
      <div class="ksub">전월 ${K(p_op)}</div>
      <span class="kdiff ${l_op>=p_op?'up':'dn'}">${l_op>=p_op?'▲':'▼'} ${K(Math.abs(l_op-p_op))}</span>
    </div>`;
  p.forEach(el=>{ if(el) el.innerHTML=html; });
}

  });
}

// ─── Panel 1 네비 전환 ────────────────────────────────────
function selectDetail(id) {
  document.querySelectorAll('.detail-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item[data-id]').forEach(n => n.classList.remove('active'));
  document.getElementById(id)?.classList.add('active');
  document.querySelector(`.nav-item[data-id="${id}"]`)?.classList.add('active');
}

// 마지막 비 0 값 인덱스 찾기 (데이터 있는 최근 월)
function lastNonZeroIdx(arr) {
  if(!arr?.length) return -1;
  const nVals = arr[0]?.vals?.length || 0;
  for(let i = nVals - 1; i >= 0; i--) {
    if(arr.some(d => typeof d.vals?.[i] === 'number' && d.vals[i] !== 0)) return i;
  }
  return -1;
}

// 네비 최근 월 합계 표시
function updateNavVals() {
  SECTIONS.forEach(s => {
    const el = document.getElementById(`nv-${s.id}`);
    if(!el) return;
    const arr = G[s.dataKey] || [];
    const idx = lastNonZeroIdx(arr);
    if(idx < 0) { el.textContent = '-'; return; }
    const t = arr.reduce((s, d) => s + (d.vals?.[idx] || 0), 0);
    el.textContent = t ? K(t) : '-';
  });
}

// 상세 테이블 렌더 (전체 거래처 × 월별 금액 / 헤더 고정)
function renderDetailTable(tableId, detailArr) {
  const el = document.getElementById(tableId);
  if(!el || !detailArr?.length) return;

  // vals 길이 기준으로 1월~N월 레이블 생성 (G.months 4개 ≠ detail 12개 불일치 방지)
  const nVals = detailArr[0].vals.length;
  const mLabels = Array.from({length: nVals}, (_, i) => `${i+1}월`);

  const thStyle = `style="min-width:62px;position:sticky;top:0;background:#f8fafc;z-index:2"`;
  const thName  = `style="min-width:200px;position:sticky;top:0;left:0;background:#f8fafc;z-index:3;text-align:left"`;
  const thTotal = `style="min-width:72px;position:sticky;top:0;right:0;background:#f8fafc;z-index:2"`;

  let html = `<div style="overflow:auto;max-height:calc(78vh - 260px);margin-top:1rem">
  <table class="detail-tbl" style="min-width:max-content;width:100%">
    <thead><tr>
      <th ${thName}>업체명</th>
      ${mLabels.map(m=>`<th ${thStyle}>${m}</th>`).join('')}
      <th ${thTotal}>합계</th>
    </tr></thead>
    <tbody>`;

  detailArr.forEach((d, i) => {
    const inChart = i < 5;
    const color   = LC[i % LC.length];
    const dot     = inChart
      ? `<span class="dot" style="background:${color}"></span>`
      : `<span style="display:inline-block;width:14px"></span>`;
    const tdName  = `style="position:sticky;left:0;background:${inChart?'#fdfdff':'#fff'};font-weight:${inChart?600:400}"`;
    const tdTotal = `style="font-weight:700;position:sticky;right:0;background:${inChart?'#fdfdff':'#fff'}"`;
    html += `<tr>`;
    html += `<td ${tdName}>${dot}${d.name}</td>`;
    d.vals.forEach(v => { html += `<td>${v ? K(v) : '-'}</td>`; });
    html += `<td ${tdTotal}>${K(d.total)}</td>`;
    html += `</tr>`;
  });

  html += `</tbody></table></div>`;
  el.innerHTML = html;
}

// ─── 손익계산서 ──────────────────────────────────────────
function renderStatement() {
  const el = document.getElementById('t-stmt');
  const periEl = document.getElementById('stmt-period');
  if (!el) return;

  const stmt = G.statement;
  if (!stmt || !stmt.rows || !stmt.months || !stmt.months.length) {
    el.innerHTML = '<tr><td colspan="7" style="padding:24px;text-align:center;color:var(--muted)">데이터 없음</td></tr>';
    return;
  }

  // 당월→전전월 역순 + 누계 맨 앞
  const ms = [...stmt.months].reverse();  // 5월→4월→...→1월
  const n  = ms.length;
  const labels = ms.map((m, i) => {
    if (i === 0) return `${m}<br><small style="font-weight:400;color:var(--muted)">(당월)</small>`;
    if (i === 1) return `${m}<br><small style="font-weight:400;color:var(--muted)">(전월)</small>`;
    if (i === 2) return `${m}<br><small style="font-weight:400;color:var(--muted)">(전전월)</small>`;
    return `${m}`;
  });
  if (periEl) periEl.textContent = `${stmt.months[0]} ~ ${stmt.months[n-1]}`;

  const fw = v => {
    if (v === null || v === undefined || v === 0) return '<span style="color:#cbd5e1">-</span>';
    const abs = Math.abs(Math.round(v));
    const s = abs.toLocaleString('ko-KR');
    return `<span style="color:${v<0?'#ef4444':'inherit'}">${v<0?'-':''}${s}</span>`;
  };
  const fr = v => v == null ? '' : `<span style="font-size:10px;color:${v<0?'#ef4444':'#94a3b8'}">${v.toFixed(1)}%</span>`;

  // 섹션 색상 매핑
  const PROFIT_ROWS = ['Ⅲ','Ⅴ','Ⅹ'];
  const LOSS_ROWS   = ['Ⅵ','Ⅶ','Ⅷ'];
  const COST_ROWS   = ['Ⅱ','Ⅳ'];

  // 섹션별 테마 색상
  const SEC_THEME = {
    'Ⅰ': { bg:'#eff6ff', border:'#3b82f6', text:'#1d4ed8' },  // 매출 - 파랑
    'Ⅱ': { bg:'#fff7ed', border:'#f97316', text:'#c2410c' },  // 매출원가 - 주황
    'Ⅲ': { bg:'#f0fdf4', border:'#22c55e', text:'#15803d' },  // 매출총이익 - 초록
    'Ⅳ': { bg:'#faf5ff', border:'#a855f7', text:'#7e22ce' },  // 판관비 - 보라
    'Ⅴ': { bg:'#f0fdf4', border:'#22c55e', text:'#15803d' },  // 영업이익 - 초록
    'Ⅵ': { bg:'#fef2f2', border:'#ef4444', text:'#b91c1c' },  // 영업외
    'Ⅶ': { bg:'#fef2f2', border:'#ef4444', text:'#b91c1c' },
    'Ⅷ': { bg:'#fff7ed', border:'#f97316', text:'#c2410c' },
    'Ⅸ': { bg:'#f8fafc', border:'#64748b', text:'#334155' },
    'Ⅹ': { bg:'#f0fdf4', border:'#22c55e', text:'#15803d' },  // 당기순이익 - 초록
  };
  const getTheme = name => {
    for (const [k, v] of Object.entries(SEC_THEME)) {
      if (name.startsWith(k)) return v;
    }
    return { bg:'#f8fafc', border:'#94a3b8', text:'#334155' };
  };

  const stickyTh = `position:sticky;top:0;z-index:3;`;
  const stickyThL = `position:sticky;top:0;left:0;z-index:4;`;  // 좌상단 교차점

  const COL_DIV  = 'border-left:2px solid #1e293b;';   // 월 구분선 — 진한 검정
  const HEAD_BG  = '#f8fafc';                            // 헤더 배경 (연한 흰색)
  const HEAD_CLR = '#1e293b';                            // 헤더 글자 (진한 검정)

  const CUM_BG  = '#eff6ff';
  const CUM_CLR = '#1d4ed8';

  let html = `<thead><tr>
    <th style="${stickyThL}text-align:left;width:220px;padding:10px 16px;font-size:11px;font-weight:700;color:${HEAD_CLR};border-bottom:2px solid #1e293b;background:${HEAD_BG};box-shadow:2px 0 6px rgba(0,0,0,0.08)">과 목</th>
    <th colspan="2" style="${stickyTh}padding:8px;text-align:center;font-size:11px;font-weight:700;color:${CUM_CLR};border-bottom:2px solid #1e293b;background:${CUM_BG};${COL_DIV}">누계</th>
    ${labels.map(m =>
      `<th colspan="2" style="${stickyTh}padding:8px;text-align:center;font-size:11px;font-weight:700;color:${HEAD_CLR};border-bottom:2px solid #1e293b;background:${HEAD_BG};${COL_DIV}">${m}</th>`
    ).join('')}
  </tr>
  <tr>
    <th style="${stickyThL}border-bottom:2px solid #1e293b;background:${HEAD_BG};box-shadow:2px 0 6px rgba(0,0,0,0.08);top:38px"></th>
    <th style="${stickyTh}top:38px;padding:5px 10px;text-align:right;font-size:10px;color:#64748b;border-bottom:2px solid #1e293b;background:${CUM_BG};${COL_DIV}">금액</th>
    <th style="${stickyTh}top:38px;padding:5px 6px;text-align:right;font-size:10px;color:#64748b;width:52px;border-bottom:2px solid #1e293b;background:${CUM_BG}">비율</th>
    ${ms.map(() => `
      <th style="${stickyTh}top:38px;padding:5px 10px;text-align:right;font-size:10px;color:#64748b;border-bottom:2px solid #1e293b;background:${HEAD_BG};${COL_DIV}">금액</th>
      <th style="${stickyTh}top:38px;padding:5px 6px;text-align:right;font-size:10px;color:#64748b;width:52px;border-bottom:2px solid #1e293b;background:${HEAD_BG}">비율</th>`
    ).join('')}
  </tr></thead><tbody>`;

  for (const row of stmt.rows) {
    const isSec = row.sec;
    const theme = getTheme(row.name);

    const topBorder = `border-top:3px solid ${theme.border}`;
    const colCount = ms.length * 2 + 1;

    // 데이터도 역순 (당월이 첫 번째)
    // 당월→1월 역순, 누계는 row.cum / row.cumR
    const vals = [...row.v].reverse();
    const rats = [...row.r].reverse();
    const cumV = row.cum  ?? 0;
    const cumR = row.cumR ?? null;

    if (isSec) {
      html += `<tr>
        <td style="position:sticky;left:0;z-index:1;padding:11px 14px 11px 12px;font-weight:700;font-size:13px;color:${theme.text};background:${theme.bg};${topBorder};border-left:5px solid ${theme.border};box-shadow:2px 0 4px rgba(0,0,0,0.06)">${row.name}</td>
        <td style="text-align:right;padding:11px 10px;font-size:13px;font-weight:800;color:${CUM_CLR};background:${CUM_BG};${topBorder}${COL_DIV}">${fw(cumV)}</td>
        <td style="text-align:right;padding:11px 6px;background:${CUM_BG};${topBorder}">${fr(cumR)}</td>
        ${vals.map((v, i) => `
          <td style="text-align:right;padding:11px 10px;font-size:13px;font-weight:700;color:${theme.text};background:${theme.bg};${topBorder}${COL_DIV}">${fw(v)}</td>
          <td style="text-align:right;padding:11px 6px;background:${theme.bg};${topBorder}">${fr(rats[i])}</td>`
        ).join('')}
      </tr>`;
    } else {
      html += `<tr style="border-bottom:1px solid #f1f5f9" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background=''">
        <td style="position:sticky;left:0;z-index:1;padding:6px 14px 6px ${12 + row.lv*16}px;color:#4b5563;font-size:11.5px;border-left:5px solid transparent;background:#fff;box-shadow:2px 0 6px rgba(0,0,0,0.08)">${row.name}</td>
        <td style="text-align:right;padding:6px 10px;font-size:11.5px;background:rgba(219,234,254,0.3);${COL_DIV}">${fw(cumV)}</td>
        <td style="text-align:right;padding:6px 6px;background:rgba(219,234,254,0.3)">${fr(cumR)}</td>
        ${vals.map((v, i) => `
          <td style="text-align:right;padding:6px 10px;font-size:11.5px;${COL_DIV}">${fw(v)}</td>
          <td style="text-align:right;padding:6px 6px">${fr(rats[i])}</td>`
        ).join('')}
      </tr>`;
    }
  }

  html += '</tbody>';
  el.innerHTML = html;
}

// ─── 탭 전환 ──────────────────────────────────────────────
const panels=document.querySelectorAll('.panel');
const tabs=document.querySelectorAll('.tab');
function switchTab(i){
  panels.forEach((p,j)=>p.classList.toggle('active',j===i));
  tabs.forEach((t,j)=>t.classList.toggle('active',j===i));
}

// ─── 자동 렌더 (배포 환경) ──────────────────────────
if (window.__PD__) {
  Object.assign(G, window.__PD__);
  renderAll();
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('main-wrap').style.display = 'block';
  document.getElementById('period-badge').textContent = G.months.join(' / ') + ' 기준';
  document.getElementById('sub-txt').textContent = '주식회사 더라스트 · 자동 업데이트됨';
}
</script>
</body>
</html>
