<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');
:root{--bg:#f8fafc;--card:#fff;--border:rgba(0,0,0,0.08);--text:#1e293b;--muted:#64748b;
  --ind:#6366f1;--grn:#10b981;--amb:#f59e0b;--red:#ef4444;--pur:#8b5cf6;--cyn:#06b6d4;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;line-height:1.6;min-height:100vh;}

/* Header */
.hd{background:var(--card);border-bottom:2px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;}
.hd-title{font-size:1rem;font-weight:700;letter-spacing:-.02em;}
.hd-right{display:flex;align-items:center;gap:10px;}
.load-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;background:var(--ind);color:#fff;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
.load-btn:hover{background:#4f46e5;}
.load-btn input{display:none;}
.nav-period{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);background:rgba(99,102,241,0.08);border:1px solid rgba(99,102,241,0.2);padding:3px 10px;border-radius:4px;}

/* Tabs */
.tabs{display:flex;gap:4px;padding:12px 24px;background:var(--card);border-bottom:1px solid var(--border);}
.tab{padding:7px 18px;font-size:12px;font-family:'Noto Sans KR',sans-serif;border-radius:6px;cursor:pointer;border:1px solid var(--border);color:var(--muted);background:#fff;transition:all .2s;white-space:nowrap;font-weight:500;}
.tab.active{background:var(--ind);border-color:var(--ind);color:#fff;}
.tab:hover:not(.active){border-color:rgba(99,102,241,.35);color:var(--ind);}
.panel{display:none;padding:1.5rem 1.5rem;}.panel.active{display:block;}

/* KPI */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1rem;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1rem;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.2rem 1.4rem;position:relative;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.kpi.ind::before{background:var(--ind);}.kpi.grn::before{background:var(--grn);}
.kpi.amb::before{background:var(--amb);}.kpi.red::before{background:var(--red);}
.kpi .klabel{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;}
.kpi .kval{font-family:'DM Mono',monospace;font-size:1.4rem;font-weight:500;}
.kpi.ind .kval{color:var(--ind);}.kpi.grn .kval{color:#059669;}
.kpi.amb .kval{color:#d97706;}.kpi.red .kval{color:var(--red);}
.kpi .ksub{font-size:11px;color:var(--muted);margin-top:3px;}
.kpi .kdiff{font-family:'DM Mono',monospace;font-size:11px;margin-top:5px;display:inline-block;padding:2px 8px;border-radius:3px;}
.kdiff.up{background:rgba(16,185,129,.12);color:#059669;}.kdiff.dn{background:rgba(239,68,68,.10);color:var(--red);}

/* Card */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.3rem;box-shadow:0 1px 4px rgba(0,0,0,.05);margin-bottom:1rem;}
.card-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:1rem;}
.chart-wrap canvas{max-height:240px;}
.chart-wrap.h300 canvas{max-height:300px;}

/* Table */
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{text-align:right;color:var(--muted);font-weight:600;padding:7px 10px;border-bottom:2px solid var(--border);font-size:11px;background:#f8fafc;}
.tbl th:first-child{text-align:left;}
.tbl td{padding:7px 10px;text-align:right;font-family:'DM Mono',monospace;font-size:12px;border-bottom:1px solid rgba(0,0,0,.04);}
.tbl td:first-child{text-align:left;font-family:'Noto Sans KR',sans-serif;}
.tbl tr:hover td{background:rgba(99,102,241,.03);}
.tbl .up{color:#059669;}.tbl .dn{color:var(--red);}
.tbl .tr-total td{font-weight:700;border-top:2px solid var(--border);background:#f8fafc;}
.tbl .tr-sub td{font-size:11px;color:var(--muted);}
.tbl .tr-sub td:first-child{padding-left:18px;}
.tbl .tr-hi td{font-weight:700;}

/* Comment */
.comment-area{width:100%;border:1px solid var(--border);border-radius:8px;padding:.9rem 1rem;font-family:'Noto Sans KR',sans-serif;font-size:13px;line-height:1.9;color:var(--text);background:#fff;resize:vertical;min-height:140px;outline:none;transition:border-color .2s;}
.comment-area:focus{border-color:var(--ind);box-shadow:0 0 0 3px rgba(99,102,241,.1);}
.save-bar{display:flex;align-items:center;justify-content:flex-end;gap:.6rem;margin-bottom:1rem;}
.btn-save{display:inline-flex;align-items:center;gap:6px;padding:7px 18px;background:var(--ind);color:#fff;border:none;border-radius:7px;font-size:12px;font-family:'Noto Sans KR',sans-serif;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-save:hover{background:#4f46e5;}
.save-notice{font-size:11px;color:var(--muted);}
.sec-label{font-size:11px;font-weight:700;color:var(--ind);text-transform:uppercase;letter-spacing:.08em;margin:1.5rem 0 .7rem;padding-left:8px;border-left:3px solid var(--ind);}

/* Empty state */
#empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px;color:var(--muted);}
.es-icon{font-size:48px;opacity:.4;}
.es-title{font-size:18px;font-weight:700;color:#475569;}
.es-desc{font-size:13px;text-align:center;line-height:1.8;}
.es-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 22px;background:var(--ind);color:#fff;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px;}
.es-btn:hover{background:#4f46e5;}
.es-btn input{display:none;}
</style>

const LC=['#6366f1','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#f97316','#ec4899','#84cc16','#14b8a6'];

// ─── 파일 로드 ────────────────────────────────────────────
function loadFile(evt) {
  const file = evt.target.files[0]; if(!file) return;
  document.getElementById('period-badge').textContent = '⏳ 로딩중...';
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, {type:'array', cellDates:true});
      parseWorkbook(wb);
      renderAll();
      document.getElementById('empty-state').style.display = 'none';
      document.getElementById('main-wrap').style.display = 'block';
      document.getElementById('period-badge').textContent = `${G.months.join(' / ')} 기준`;
      document.getElementById('sub-txt').textContent = `주식회사 더라스트 · ${file.name} · ${new Date().toLocaleDateString('ko-KR')} 업데이트`;
      restoreComments();
    } catch(err) { alert('파싱 오류: '+err.message); }
  };
  reader.readAsArrayBuffer(file);
}

// ─── 파싱 ─────────────────────────────────────────────────
function parseWorkbook(wb) {
  // ── 1. '전체' 시트 파싱 ──
  const ws = wb.Sheets['전체'];
  if(!ws) throw new Error("'전체' 시트 없음");
  const raw = XLSX.utils.sheet_to_json(ws, {header:1, defval:null});

  // 헤더 행(row 0)에서 월 컬럼 찾기: col4부터 2칸 간격으로 금액
  const hdr = raw[0];
  G.months = [];
  G.monthCols = []; // [col_idx, ...]
  for(let c=4; c<(hdr?.length||0); c+=2) {
    const v = hdr[c];
    if(typeof v==='string' && v.includes('년') && v.includes('월')) {
      const m = v.replace('2026년','').replace('년','').replace(/^0/,'');
      G.months.push(m);
      G.monthCols.push(c);
    }
  }

  // 각 과목 행에서 월별 금액 추출
  const getItem = (rowIdx) => {
    const r = raw[rowIdx];
    if(!r) return G.monthCols.map(()=>0);
    return G.monthCols.map(c => typeof r[c]==='number' ? r[c] : 0);
  };
  const getItemRatio = (rowIdx) => {
    const r = raw[rowIdx];
    if(!r) return G.monthCols.map(()=>null);
    return G.monthCols.map(c => typeof r[c+1]==='number' ? r[c+1] : null);
  };

  // P&L 과목 (0-indexed 행 번호)
  G.pl = {
    매출액: getItem(1),
    매출원가: getItem(3),
    매출원가율: getItemRatio(3),
    기말재고: getItem(7),
    매출총이익: getItem(8),
    판관비: getItem(9),
    임원급여: getItem(10),
    직원급여: getItem(11),
    상여금: getItem(12),
    잡급: getItem(13),
    퇴직급여: getItem(14),
    복리후생비: getItem(15),
    여비교통비: getItem(16),
    접대비: getItem(17),
    통신비: getItem(18),
    수도광열비: getItem(19),
    전력비: getItem(20),
    세금과공과: getItem(21),
    지급임차료: getItem(22),
    보험료: getItem(23),
    차량유지비: getItem(24),
    운반비: getItem(25),
    소모품비: getItem(26),
    지급수수료: getItem(27),
    광고선전비: getItem(28),
    판매수수료: getItem(29),
    리스료: getItem(30),
    인적용역비: getItem(31),
    견본비: getItem(32),
    판매촉진비: getItem(33),
    영업이익: getItem(34),
    당기순이익: getItem(44),
  };

  // 재고 시작금액(기초) - 25.12월말 → 26.1월 기초 재고 (row 5 = 기초 제품 재고액)
  const startInv = raw[5] ? (typeof raw[5][4]==='number' ? raw[5][4] : null) : null;
  G.inv = startInv ? [startInv, ...G.pl.기말재고] : G.pl.기말재고;

  // ── 2. '항목별 세부금액' 시트 파싱 ──
  const ws2 = wb.Sheets['항목별 세부금액'];
  G.revDetail = []; G.matDetail = [];
  if(ws2) {
    const rd = XLSX.utils.sheet_to_json(ws2, {header:1, defval:null});
    // 헤더 행(i=1): col2~부터 '2026년01월' 등
    const hdr2 = rd[1] || [];
    const mCols2 = [];
    for(let c=2; c<hdr2.length; c++) {
      if(typeof hdr2[c]==='string' && hdr2[c].includes('년')) mCols2.push(c);
    }

    let section = null; // 'rev' | 'mat'
    for(let i=2; i<rd.length; i++) {
      const r = rd[i]; if(!r) continue;
      const c1 = r[1];
      // 섹션 구분
      if(c1==='제품매출') { section='rev'; continue; }
      if(c1==='원재료 등') { section='mat'; continue; }
      // 소계 행 무시 (c1이 null 또는 공백)
      if(!c1 || typeof c1!=='string') continue;
      // 데이터 행: c1이 거래처명, c2가 숫자
      const firstVal = r[mCols2[0]];
      if(typeof firstVal!=='number' && firstVal!==null) continue;
      const vals = mCols2.map(c => typeof r[c]==='number' ? r[c] : 0);
      const total = vals.reduce((s,v)=>s+v, 0);
      if(total===0) continue;
      if(section==='rev') G.revDetail.push({name:c1.replace('（주）','(주)'), vals, total});
      if(section==='mat') G.matDetail.push({name:c1, vals, total});
    }
    // 합계 내림차순 정렬
    G.revDetail.sort((a,b)=>b.total-a.total);
    G.matDetail.sort((a,b)=>b.total-a.total);
  }
}

// ─── 렌더링 ───────────────────────────────────────────────
function renderAll() {
  renderKPIs();
  renderMainChart();
  renderInvChart();
  renderChannelChart();
  renderMatChart();
  renderSgaCharts();
  renderMgmtTable();
}

function latest(arr) { return arr?.[arr.length-1] ?? 0; }
function prev(arr)   { return arr?.[arr.length-2] ?? 0; }
function diff(arr)   { return latest(arr)-prev(arr); }
function pctDiff(arr){ const p=prev(arr); return p?(diff(arr)/Math.abs(p)*100).toFixed(1):null; }

function renderKPIs() {
  const p = ['kpi-main','kpi-mgmt'].map(id=>document.getElementById(id));
  const l_rev=latest(G.pl.매출액), d_rev=diff(G.pl.매출액), pd_rev=pctDiff(G.pl.매출액);
  const l_op=latest(G.pl.영업이익), p_op=prev(G.pl.영업이익);
  const l_cost=latest(G.pl.매출원가), l_rate=latest(G.pl.매출원가율);
  const l_sga=latest(G.pl.판관비), l_sga_r=G.pl.매출액?.[G.pl.매출액.length-1]?l_sga/G.pl.매출액[G.pl.매출액.length-1]*100:null;
  const curM = G.months[G.months.length-1] || '최신';
  const html = `
    <div class="kpi ind">
      <div class="klabel">해당월 매출액</div>
      <div class="kval">${K(l_rev)}</div>
      <div class="ksub">전월 ${K(prev(G.pl.매출액))} → ${curM} ${K(l_rev)}</div>
      <span class="kdiff ${pd_rev>=0?'up':'dn'}">${pd_rev!==null?(pd_rev>=0?'▲':'▼')+Math.abs(pd_rev)+'% MoM':''}</span>
    </div>
    <div class="kpi amb">
      <div class="klabel">해당월 원가</div>
      <div class="kval">${K(l_cost)}</div>
      <div class="ksub">원가율 ${l_rate!==null?(l_rate*100).toFixed(1)+'%':'-'}</div>
    </div>
    <div class="kpi red">
      <div class="klabel">해당월 판관비</div>
      <div class="kval">${K(l_sga)}</div>
      <div class="ksub">판관비율 ${l_sga_r!==null?l_sga_r.toFixed(1)+'%':'-'}</div>
    </div>
    <div class="kpi grn">
      <div class="klabel">해당월 영업이익</div>
      <div class="kval">${K(l_op)}</div>
      <div class="ksub">전월 ${K(p_op)}</div>
      <span class="kdiff ${l_op>=p_op?'up':'dn'}">${l_op>=p_op?'▲':'▼'} ${K(Math.abs(l_op-p_op))}</span>
    </div>`;
  p.forEach(el=>{ if(el) el.innerHTML=html; });
}

function mkLine(id, datasets, opts={}) {
  if(charts[id]) charts[id].destroy();
  const ctx = document.getElementById(id)?.getContext('2d'); if(!ctx) return;
  charts[id] = new Chart(ctx, {
    type:'line', data:{ labels:G.months, datasets },
    options:{ plugins:{ legend:{labels:{color:'#475569',boxWidth:10,padding:10}}, tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${K(c.raw)}`}} }, scales:{ x:{grid:{display:false},ticks:{color:TICK}}, y:{grid:{color:GRID},ticks:{callback:v=>K(v),color:TICK}} }, ...opts }
  });
}

function renderMainChart() {
  mkLine('c-main', [
    {label:'매출액',  data:G.pl.매출액,  borderColor:LC[0],fill:false,tension:0.3,pointRadius:6,pointHoverRadius:8,pointBorderColor:'#fff',pointBorderWidth:2,borderWidth:2.5},
    {label:'원가',    data:G.pl.매출원가,borderColor:LC[2],fill:false,tension:0.3,pointRadius:6,pointHoverRadius:8,pointBorderColor:'#fff',pointBorderWidth:2,borderWidth:2.5},
    {label:'판관비',  data:G.pl.판관비,  borderColor:LC[3],fill:false,tension:0.3,pointRadius:6,pointHoverRadius:8,pointBorderColor:'#fff',pointBorderWidth:2,borderWidth:2.5},
    {label:'영업이익',data:G.pl.영업이익,borderColor:LC[1],fill:false,tension:0.3,pointRadius:6,pointHoverRadius:8,pointBorderColor:'#fff',pointBorderWidth:2,borderWidth:2.5},
  ]);
}

function renderInvChart() {
  if(charts['c-inv']) charts['c-inv'].destroy();
  const ctx = document.getElementById('c-inv')?.getContext('2d'); if(!ctx) return;
  const startInvLabel = G.inv.length > G.months.length ? ['25.12월말(기초)', ...G.months] : G.months;
  charts['c-inv'] = new Chart(ctx, {
    type:'line', data:{ labels:startInvLabel, datasets:[{
      label:'제품 재고금액', data:G.inv, borderColor:'#10b981', backgroundColor:'rgba(16,185,129,0.07)',
      fill:true, tension:0.4, pointBackgroundColor:'#10b981', pointBorderColor:'#fff', pointBorderWidth:2, pointRadius:6, pointHoverRadius:8
    }]},
    options:{ plugins:{ legend:{labels:{color:'#475569',boxWidth:12}}, tooltip:{callbacks:{label:c=>` ${K(c.raw)}`}} }, scales:{ x:{grid:{display:false},ticks:{color:TICK}}, y:{grid:{color:GRID},ticks:{callback:v=>K(v),color:TICK}} } }
  });
}

function renderChannelChart() {
  const top = G.revDetail.slice(0,8);
  if(!top.length) return;
  mkLine('c-ch', top.map((d,i)=>({
    label:d.name.length>10?d.name.slice(0,10)+'…':d.name, data:d.vals,
    borderColor:LC[i%LC.length], backgroundColor:LC[i%LC.length]+'18',
    fill:false, tension:0.3, pointRadius:5, pointHoverRadius:7, pointBorderColor:'#fff', pointBorderWidth:2, borderWidth:2
  })));
}

function renderMatChart() {
  const top = G.matDetail.slice(0,8);
  if(!top.length) return;
  mkLine('c-mat', top.map((d,i)=>({
    label:d.name.length>10?d.name.slice(0,10)+'…':d.name, data:d.vals,
    borderColor:LC[i%LC.length], backgroundColor:LC[i%LC.length]+'18',
    fill:false, tension:0.3, pointRadius:5, pointHoverRadius:7, pointBorderColor:'#fff', pointBorderWidth:2, borderWidth:2
  })));
}

function mkSimple(id, data, color) {
  if(charts[id]) charts[id].destroy();
  const ctx=document.getElementById(id)?.getContext('2d'); if(!ctx) return;
  charts[id]=new Chart(ctx,{type:'line',data:{labels:G.months,datasets:[{label:'금액',data,borderColor:color,backgroundColor:color+'18',fill:true,tension:0.3,pointBackgroundColor:color,pointBorderColor:'#fff',pointBorderWidth:2,pointRadius:6,pointHoverRadius:8,borderWidth:2}]},options:{plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${K(c.raw)}`}}},scales:{x:{grid:{display:false},ticks:{color:TICK}},y:{grid:{color:GRID},ticks:{callback:v=>K(v),color:TICK}}}}});
}

function renderSgaCharts() {
  mkSimple('c-svfee',G.pl.지급수수료,LC[5]);
  mkSimple('c-ad',   G.pl.광고선전비,LC[4]);
  mkSimple('c-sample',G.pl.견본비,   LC[3]);
  mkSimple('c-del',  G.pl.운반비,    LC[6]);
  mkSimple('c-sfee', G.pl.판매수수료,LC[1]);
  mkSimple('c-rent', G.pl.지급임차료,LC[0]);
}

function renderMgmtTable() {
  const N=G.months.length;
  const ROWS=[
    {label:'매출액',     key:'매출액',      hi:true},
    {label:'매출원가',   key:'매출원가'},
    {label:'  원가율',   key:'매출원가율',  pct:true},
    {label:'매출총이익', key:'매출총이익',  hi:true},
    {label:'판관비',     key:'판관비'},
    {label:'영업이익',   key:'영업이익',    hi:true},
  ];
  let html=`<thead><tr><th>항목</th>${G.months.map(m=>`<th>${m}</th>`).join('')}<th>MoM 증감</th></tr></thead><tbody>`;
  ROWS.forEach(r=>{
    const arr = G.pl[r.key]||[];
    const rowCls = r.hi?' class="tr-hi"':r.pct?' class="tr-sub"':'';
    if(r.pct) {
      html+=`<tr${rowCls}><td>${r.label}</td>${arr.map(v=>`<td>${v!==null?(v*100).toFixed(1)+'%':'-'}</td>`).join('')}<td>-</td></tr>`;
    } else {
      const d=arr.length>=2?arr[arr.length-1]-arr[arr.length-2]:null;
      html+=`<tr${rowCls}><td>${r.label}</td>${arr.map(v=>`<td>${K(v)}</td>`).join('')}<td>${d!==null?`<span class="${d>=0?'up':'dn'}">${d>=0?'+':''}${K(d)}</span>`:'-'}</td></tr>`;
    }
  });
  html+='</tbody>';
  document.getElementById('t-mgmt').innerHTML=html;
}

// ─── 탭 전환 ──────────────────────────────────────────────
const panels=document.querySelectorAll('.panel');
const tabs=document.querySelectorAll('.tab');
function switchTab(i){
  panels.forEach((p,j)=>p.classList.toggle('active',j===i));
  tabs.forEach((t,j)=>t.classList.toggle('active',j===i));
}

// ─── 코멘트 저장 ──────────────────────────────────────────
function restoreComments(){
  const c=document.getElementById('txt-current');
  const p=document.getElementById('txt-compare');
  if(c){
    c.value=SAVED.current||localStorage.getItem('pnl_comment_cur')||'';
    c.addEventListener('input',()=>localStorage.setItem('pnl_comment_cur',c.value));
  }
  if(p){
    p.value=SAVED.compare||localStorage.getItem('pnl_comment_cmp')||'';
    p.addEventListener('input',()=>localStorage.setItem('pnl_comment_cmp',p.value));
  }
}

function saveComments(){
  const cur=document.getElementById('txt-current').value;
  const cmp=document.getElementById('txt-compare').value;
  const html=document.documentElement.outerHTML;
  const updated=html.replace(/const SAVED=\{current:.*?,compare:.*?\};/,
    `const SAVED={current:${JSON.stringify(cur)},compare:${JSON.stringify(cmp)}};`);
  const blob=new Blob([updated],{type:'text/html;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='손익보고_동적.html';document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(a.href);
  const n=document.getElementById('save-notice');
  if(n){n.textContent='✓ 저장 완료 — 다운로드된 파일로 교체하세요';n.style.color='#059669';setTimeout(()=>n.textContent='',4000);}
}

// ─── 자동 렌더 (Netlify 배포 환경) ──────────────────────────
if (window.__PD__) {
  Object.assign(G, window.__PD__);
  renderAll();
  restoreComments();
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('main-wrap').style.display = 'block';
  document.getElementById('period-badge').textContent = G.months.join(' / ') + ' 기준';
  document.getElementById('sub-txt').textContent = '주식회사 더라스트 · 자동 업데이트됨';
}
