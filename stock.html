<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'맑은 고딕',Malgun Gothic,'Noto Sans KR',sans-serif;background:#f0f2f7;color:#1a202c;font-size:13px;}
.topbar{background:#fff;border-bottom:1px solid #dde1f0;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.topbar h1{font-size:16px;font-weight:800;}
.topbar .sub{font-size:11px;color:#64748b;margin-top:2px;}
.badge{background:#2563eb;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;margin-left:8px;}
.badge.wait{background:#e2e8f0;color:#94a3b8;}
.load-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;background:#2563eb;color:#fff;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.load-btn:hover{background:#1d4ed8;}
.load-btn input{display:none;}
/* Tabs */
.tabnav{background:#fff;border-bottom:2px solid #dde1f0;padding:0 20px;display:flex;}
.tnav-btn{padding:12px 18px;font-size:13px;font-weight:700;color:#94a3b8;background:none;border:none;cursor:pointer;font-family:inherit;border-bottom:3px solid transparent;margin-bottom:-2px;}
.tnav-btn.on{color:#2563eb;border-bottom-color:#2563eb;}
/* Panels */
.tab-panel{display:none;padding:16px 20px;flex-direction:column;gap:14px;}
.tab-panel.on{display:flex;}
.card{background:#fff;border:1px solid #dde1f0;border-radius:12px;padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.sec{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #e2e8f0;}
/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
.kpi{padding:14px 16px;}
.kpi .label{font-size:10px;color:#64748b;font-weight:700;letter-spacing:.4px;text-transform:uppercase;}
.kpi .val{font-size:20px;font-weight:800;margin:5px 0 3px;letter-spacing:-1px;}
.kpi .hint{font-size:11px;color:#64748b;}
.blue{color:#2563eb}.green{color:#059669}.red{color:#dc2626}.amber{color:#d97706}.purple{color:#7c3aed}
/* Table */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.rt{width:100%;border-collapse:collapse;font-size:12px;}
.rt th{padding:7px 8px;text-align:left;font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;border-bottom:2px solid #e2e8f0;background:#f8fafc;white-space:nowrap;position:sticky;top:0;z-index:1;}
.rt th.r,.rt td.r{text-align:right;}
.rt td{padding:6px 8px;border-bottom:1px solid #f1f5f9;white-space:nowrap;color:#374151;}
.rt tr:hover td{background:#f8fafc;}
.up{color:#059669;font-weight:700}.dn{color:#dc2626;font-weight:700}
/* Month group header */
.rt th.mgrp{background:#eff6ff;color:#2563eb;text-align:center;border-left:2px solid #bfdbfe;}
.rt td.mgrp-l{border-left:2px solid #bfdbfe;}
/* Toolbar */
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px;}
.ftabs{display:flex;gap:5px;}
.ftab{padding:4px 10px;border-radius:5px;border:1px solid #dde1f0;cursor:pointer;font-size:11px;font-family:inherit;background:#fff;color:#64748b;font-weight:600;}
.ftab.on{background:#2563eb;color:#fff;border-color:#2563eb;}
input.srch{padding:5px 10px;border-radius:6px;border:1px solid #dde1f0;background:#fff;color:#1a202c;font-size:12px;font-family:inherit;width:180px;outline:none;}
.pager{display:flex;align-items:center;justify-content:space-between;margin-top:10px;font-size:11px;color:#64748b;}
.pager button{padding:3px 10px;border-radius:4px;border:1px solid #dde1f0;background:#fff;color:#475569;cursor:pointer;font-size:11px;font-family:inherit;}
.chip{display:inline-block;padding:1px 5px;border-radius:4px;font-size:10px;font-weight:700;}
.chip-new{background:rgba(37,99,235,.1);color:#2563eb;}
.chip-up{background:rgba(5,150,105,.1);color:#059669;}
.chip-dn{background:rgba(220,38,38,.08);color:#dc2626;}
.stat{display:inline-block;padding:1px 7px;border-radius:99px;font-size:10px;font-weight:700;}
.stat-ok{background:#d1fae5;color:#065f46;}
.stat-wait{background:#f1f5f9;color:#94a3b8;}
/* 월별재고 Month buttons */
.mbtn-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.mbtn{padding:5px 14px;border-radius:6px;border:1px solid #dde1f0;cursor:pointer;font-size:12px;font-family:inherit;background:#fff;color:#475569;font-weight:600;}
.mbtn.on{background:#2563eb;color:#fff;border-color:#2563eb;}
/* Empty */
#empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px;color:#94a3b8;}
.es-icon{font-size:48px;opacity:.4;}
.es-title{font-size:18px;font-weight:700;color:#475569;}
.es-desc{font-size:13px;text-align:center;line-height:1.8;}
.es-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 22px;background:#2563eb;color:#fff;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;margin-top:8px;font-family:inherit;}
.es-btn input{display:none;}
</style>

<script>
const G = {
  summary:[], supByMonth:{}, divByMonth:{}, monthCols:[],
  itemsAll:[], itemsMonths:[], stockByMonth:{}, months:[], mRange:''
};
const fmt = v => (v===null||v===undefined)?'-':Number(v).toLocaleString();
const K   = v => { if(!v&&v!==0)return '-'; const a=Math.abs(v); const s=a>=1e8?(a/1e8).toFixed(1)+'억':a>=1e4?Math.round(a/1e4)+'만':String(a.toLocaleString()); return (v<0?'-':'')+s; };
const PAGE = 50;

// ─── 파일 로드 ────────────────────────────────────────────
function loadFile(evt){
  const file=evt.target.files[0]; if(!file)return;
  document.getElementById('badge').textContent='⏳ 로딩중...';
  document.getElementById('badge').className='badge wait';
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      parseWorkbook(wb);
      init();
      document.getElementById('badge').textContent=G.mRange+' 기준';
      document.getElementById('badge').className='badge';
      document.getElementById('sub-txt').textContent=`더라스트 · ${file.name} · ${new Date().toLocaleDateString('ko-KR')} 업데이트`;
    }catch(err){ alert('파싱 오류: '+err.message); console.error(err); }
  };
  reader.readAsArrayBuffer(file);
}

// ─── 파싱 ─────────────────────────────────────────────────
function parseWorkbook(wb){
  // ── 요약 시트
  const wsSu=wb.Sheets['요약'];
  if(!wsSu) throw new Error("'요약' 시트 없음");
  const su=XLSX.utils.sheet_to_json(wsSu,{header:1,defval:null});
  G.summary=[]; G.supByMonth={}; G.divByMonth={}; G.monthCols=[];
  let sec='', supM=[], divM=[];
  su.forEach(r=>{
    if(!r||!r.some(v=>v!=null))return;
    const b=r[1]; const bs=String(b||'');
    if(bs.includes('월별 재고 요약')){sec='monthly';return;}
    if(bs.includes('공급처별 월별')){sec='supplier';return;}
    if(bs.includes('구분별 월별')){sec='div';return;}
    if(sec==='monthly'){
      if(bs==='월')return;
      if(b&&typeof b==='string'&&b.endsWith('월')&&!bs.includes('평균')){
        const qty=r[2],amt=r[3],mom=r[4],st=r[5];
        if(qty!=='-'&&qty!=null&&amt!=='-'&&amt!=null)
          G.summary.push({month:b,qty:qty||0,amount:amt||0,momChange:mom,status:st||'대기중'});
      }
    } else if(sec==='supplier'){
      if(bs==='공급처'){supM=r.slice(2).filter(v=>v&&String(v).endsWith('월'));G.monthCols=supM;return;}
      if(b&&typeof b==='string'&&bs!=='합계'){
        const d={};supM.forEach((m,i)=>{const v=r[2+i];if(typeof v==='number')d[m]=v;});
        if(Object.keys(d).length)G.supByMonth[b]=d;
      }
    } else if(sec==='div'){
      if(bs==='구분'){divM=r.slice(2).filter(v=>v&&String(v).endsWith('월'));return;}
      if(b&&typeof b==='string'&&bs!=='합계'){
        const d={};divM.forEach((m,i)=>{const v=r[2+i];if(typeof v==='number')d[m]=v;});
        if(Object.keys(d).length)G.divByMonth[b]=d;
      }
    }
  });

  // ── 상품별_수량추이에서 months 추출
  G.months=[];
  const wsP=wb.Sheets['상품별_수량추이'];
  if(wsP){
    const pd=XLSX.utils.sheet_to_json(wsP,{header:1,defval:null});
    const hi=pd.findIndex(r=>r&&r.some(v=>v==='상품명'));
    if(hi>=0){
      pd[hi].forEach(v=>{ if(typeof v==='string'&&v.includes('월')&&v.includes('수량')) G.months.push(v.replace(/\s*수량/,'').replace('\n수량','')); });
      G.mRange=G.months.length?`${G.months[0]}~${G.months[G.months.length-1]}`:'';
    }
  }

  // ── 품목별_월별재고 시트 → 전체 × 월별 통합
  G.itemsAll=[]; G.itemsMonths=[];
  const wsPM=wb.Sheets['품목별_월별재고'];
  if(wsPM){
    const pm=XLSX.utils.sheet_to_json(wsPM,{header:1,defval:null});
    const hi=pm.findIndex(r=>r&&r.some(v=>v==='상품명'));
    if(hi>=0){
      const mDesc=[...G.months].reverse();
      G.itemsMonths=mDesc;
      pm.slice(hi+1).forEach(r=>{
        if(!r||!r[2])return;
        const row={sup:String(r[0]||''),code:String(r[1]||''),name:String(r[2]||''),opt:String(r[3]||'')};
        let hasQty=false;
        mDesc.forEach((m,mi)=>{
          const q=r[4+mi*2], a=r[5+mi*2];
          row[`q${mi}`]=typeof q==='number'&&q?q:0;
          row[`a${mi}`]=typeof a==='number'&&a?a:0;
          if(row[`q${mi}`])hasQty=true;
        });
        if(hasQty)G.itemsAll.push(row);
      });
    }
  }

  // ── 월별 시트 (1월~6월)
  G.stockByMonth={};
  ['1월','2월','3월','4월','5월','6월'].forEach(m=>{
    const ws=wb.Sheets[m]; if(!ws)return;
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
    if(rows.length<3)return;
    const hdr=rows[1]||[]; const col={};
    hdr.forEach((v,i)=>{ const s=String(v||'').trim(); col[s]=i; });
    const data=[];
    rows.slice(2).forEach(r=>{
      if(!r||!r.some(v=>v!=null))return;
      const qty=r[col['현재재고']];
      if(typeof qty!=='number'||qty===0)return;
      data.push({sup:String(r[col['공급처']]||''),code:String(r[col['상품코드']]||''),
                 name:String(r[col['상품명']]||''),opt:String(r[col['옵션명']]||''),
                 qty,amt:typeof r[col['재고금액']]==='number'?r[col['재고금액']]:0,
                 div:String(r[col['구분']]||'')});
    });
    data.sort((a,b)=>b.qty-a.qty);
    G.stockByMonth[m]=data;
  });
}

// ─── 초기화 ───────────────────────────────────────────────
function init(){
  document.getElementById('empty-state').style.display='none';
  document.getElementById('main-wrap').style.display='block';
  renderSummary();
  initItemsTab();
  initStockTab();
}

// ─── TAB1: 요약 ───────────────────────────────────────────
function renderSummary(){
  const active=G.summary.filter(s=>s.status==='입력됨');
  const latest=active[active.length-1]; const prev=active.length>=2?active[active.length-2]:null;
  document.getElementById('kpi-row').innerHTML=`
    <div class="card kpi"><div class="label">${latest?.month||'-'} 총 재고수량</div><div class="val blue">${fmt(latest?.qty)}<span style="font-size:13px"> 개</span></div><div class="hint">전월 ${fmt(prev?.qty)} 개</div></div>
    <div class="card kpi"><div class="label">최근월 재고금액</div><div class="val purple">${K(latest?.amount)}</div><div class="hint">전월比 ${latest?.momChange!=null&&latest.momChange!=='-'?(latest.momChange>=0?'▲ +':'▼ ')+K(latest.momChange):'-'}</div></div>
    <div class="card kpi"><div class="label">입력된 월</div><div class="val green">${active.length}<span style="font-size:13px"> 개월</span></div><div class="hint">${G.mRange}</div></div>
    <div class="card kpi"><div class="label">총 공급처</div><div class="val amber">${Object.keys(G.supByMonth).length}<span style="font-size:13px"> 개</span></div><div class="hint">재고보유 기준</div></div>
    <div class="card kpi"><div class="label">품목별재고 SKU</div><div class="val" style="color:#94a3b8">${fmt(G.itemsAll.length)}</div><div class="hint">옵션 기준</div></div>`;

  // 월별 요약
  let h='<thead><tr><th>월</th><th class="r">총 수량</th><th class="r">총 재고금액</th><th class="r">전월대비</th><th>상태</th></tr></thead><tbody>';
  G.summary.forEach(s=>{
    const mom=s.momChange;
    const momTxt=mom===null||mom===undefined||mom==='-'?'-':(mom>=0?'▲ +':'▼ ')+K(mom);
    const momCls=typeof mom==='number'?(mom>=0?'up':'dn'):'';
    const stHtml=s.status==='입력됨'?'<span class="stat stat-ok">입력됨</span>':'<span class="stat stat-wait">'+s.status+'</span>';
    h+=`<tr><td style="font-weight:700">${s.month}</td><td class="r">${fmt(s.qty)}</td><td class="r" style="font-weight:600">${K(s.amount)}원</td><td class="r ${momCls}">${momTxt}</td><td>${stHtml}</td></tr>`;
  });
  document.getElementById('sum-monthly').innerHTML=h+'</tbody>';

  // 구분별 × 월별
  const mCols=G.monthCols.length?G.monthCols:[...G.months].reverse();
  const divKeys=Object.keys(G.divByMonth);
  if(divKeys.length&&mCols.length){
    let dh=`<thead><tr><th>구분</th>${mCols.map(m=>`<th class="r">${m}</th>`).join('')}<th class="r">합계</th></tr></thead><tbody>`;
    divKeys.forEach(dv=>{
      const d=G.divByMonth[dv];
      const tot=Object.values(d).reduce((a,b)=>a+b,0);
      dh+=`<tr><td style="font-weight:700">${dv}</td>${mCols.map(m=>`<td class="r">${d[m]?K(d[m]):'-'}</td>`).join('')}<td class="r" style="font-weight:700">${K(tot)}</td></tr>`;
    });
    const totRow={}; mCols.forEach(m=>{totRow[m]=divKeys.reduce((s,dv)=>s+(G.divByMonth[dv][m]||0),0);});
    dh+=`<tr style="font-weight:700;border-top:2px solid #e2e8f0"><td>합계</td>${mCols.map(m=>`<td class="r">${K(totRow[m])}</td>`).join('')}<td class="r">${K(Object.values(totRow).reduce((a,b)=>a+b,0))}</td></tr>`;
    document.getElementById('sum-div').innerHTML=dh+'</tbody>';
  }

  // 공급처별 × 월별
  const supKeys=Object.keys(G.supByMonth);
  if(supKeys.length&&mCols.length){
    const grandTot=supKeys.reduce((s,k)=>s+Object.values(G.supByMonth[k]).reduce((a,b)=>a+b,0),0);
    let sh=`<thead><tr><th>공급처</th>${mCols.map(m=>`<th class="r">${m}</th>`).join('')}<th class="r">합계</th><th class="r">비중</th></tr></thead><tbody>`;
    supKeys.forEach(sp=>{
      const d=G.supByMonth[sp]; const tot=Object.values(d).reduce((a,b)=>a+b,0);
      sh+=`<tr><td style="font-weight:600">${sp}</td>${mCols.map(m=>`<td class="r">${d[m]?K(d[m]):'-'}</td>`).join('')}<td class="r" style="font-weight:700">${K(tot)}</td><td class="r" style="color:#94a3b8">${grandTot?((tot/grandTot)*100).toFixed(1)+'%':'-'}</td></tr>`;
    });
    document.getElementById('sum-sup').innerHTML=sh+'</tbody>';
  }
}

// ─── TAB2: 품목별 월별재고 (전체 × 월 통합) ─────────────
let itemsFltVal='all', itemsSearchQ='', itemsPage=0, itemsFiltered=[];
function initItemsTab(){
  // 헤더 생성
  const mDesc=G.itemsMonths.length?G.itemsMonths:[...G.months].reverse();
  const fixedTh='<th>#</th><th>공급처</th><th>상품코드</th><th>상품명</th><th>옵션명</th>';
  const mThs=mDesc.map(m=>`<th class="r mgrp">${m}<br><span style="font-weight:400;font-size:9px">수량</span></th><th class="r">${m}<br><span style="font-weight:400;font-size:9px">금액</span></th>`).join('');
  document.getElementById('items-thead').innerHTML=`<tr>${fixedTh}${mThs}</tr>`;
  applyItemsFilter(); renderItemsTable();
}
function applyItemsFilter(){
  const q=itemsSearchQ.toLowerCase();
  itemsFiltered=G.itemsAll.filter(d=>{
    if(itemsFltVal==='up'&&(d.q0||0)<=(d.q1||0))return false;
    if(itemsFltVal==='dn'&&(d.q0||0)>=(d.q1||0))return false;
    if(q&&!d.name.toLowerCase().includes(q)&&!d.sup.toLowerCase().includes(q)&&!d.opt.toLowerCase().includes(q))return false;
    return true;
  });
}
function itemsFlt(f,btn){ itemsFltVal=f; itemsPage=0; document.querySelectorAll('#t2 .ftab').forEach(b=>b.classList.remove('on')); btn.classList.add('on'); applyItemsFilter(); renderItemsTable(); }
function itemsSearch(){ itemsSearchQ=document.getElementById('items-srch').value; itemsPage=0; applyItemsFilter(); renderItemsTable(); }
function itemsPg(d){ const max=Math.ceil(itemsFiltered.length/PAGE)-1; itemsPage=Math.max(0,Math.min(max,itemsPage+d)); renderItemsTable(); }
function renderItemsTable(){
  const mDesc=G.itemsMonths.length?G.itemsMonths:[...G.months].reverse();
  const total=itemsFiltered.length;
  const s=itemsPage*PAGE, e=Math.min(s+PAGE,total);
  document.getElementById('items-count').textContent=`전체 ${total.toLocaleString()}건`;
  document.getElementById('items-tb').innerHTML=itemsFiltered.slice(s,e).map((d,i)=>{
    const mCells=mDesc.map((m,mi)=>{
      const q=d[`q${mi}`]||0; const a=d[`a${mi}`]||0;
      const isLatest=mi===0;
      return `<td class="r mgrp-l" style="${isLatest?'font-weight:700;color:#2563eb':''}">${q?fmt(q):'-'}</td><td class="r" style="color:#94a3b8;font-size:10px">${a?K(a):'-'}</td>`;
    }).join('');
    return `<tr><td style="color:#94a3b8">${s+i+1}</td><td style="color:#64748b">${d.sup}</td><td style="color:#94a3b8;font-size:10px">${d.code}</td><td>${d.name}</td><td style="color:#94a3b8">${d.opt}</td>${mCells}</tr>`;
  }).join('');
  document.getElementById('items-pg-info').textContent=`${s+1}–${e} / ${total.toLocaleString()}건`;
}

// ─── TAB3: 월별 재고리스트 ───────────────────────────────
let stockCurMonth='', stockSearchQ='', stockFltDiv='all', stockPage=0, stockFiltered=[];
function initStockTab(){
  const months=Object.keys(G.stockByMonth);
  if(!months.length){ document.getElementById('stock-month-btns').innerHTML='<span style="color:#94a3b8">데이터 없음</span>'; return; }
  const ordered=months.sort((a,b)=>parseInt(b)-parseInt(a));
  document.getElementById('stock-month-btns').innerHTML=ordered.map((m,i)=>`<button class="mbtn${i===0?' on':''}" onclick="stockSelectMonth('${m}',this)">${m}</button>`).join('');
  stockSelectMonth(ordered[0], document.querySelector('#stock-month-btns .mbtn'));
}
function stockSelectMonth(m,btn){
  stockCurMonth=m; stockPage=0;
  document.querySelectorAll('#stock-month-btns .mbtn').forEach(b=>b.classList.remove('on'));
  if(btn) btn.classList.add('on');
  applyStockFilter(); renderStockTable();
}
function applyStockFilter(){
  const q=stockSearchQ.toLowerCase();
  stockFiltered=(G.stockByMonth[stockCurMonth]||[]).filter(d=>{
    if(stockFltDiv!=='all'&&d.div!==stockFltDiv)return false;
    if(q&&!d.name.toLowerCase().includes(q)&&!d.sup.toLowerCase().includes(q)&&!d.opt.toLowerCase().includes(q))return false;
    return true;
  });
}
function stockFlt(f,btn){ stockFltDiv=f; stockPage=0; document.querySelectorAll('#t3 .ftab').forEach(b=>b.classList.remove('on')); btn.classList.add('on'); applyStockFilter(); renderStockTable(); }
function stockSearch(){ stockSearchQ=document.getElementById('stock-srch').value; stockPage=0; applyStockFilter(); renderStockTable(); }
function stockPg(d){ const max=Math.ceil(stockFiltered.length/PAGE)-1; stockPage=Math.max(0,Math.min(max,stockPage+d)); renderStockTable(); }
function renderStockTable(){
  const total=stockFiltered.length, s=stockPage*PAGE, e=Math.min(s+PAGE,total);
  document.getElementById('stock-count').textContent=`${stockCurMonth} · ${total.toLocaleString()}건`;
  document.getElementById('stock-tb').innerHTML=stockFiltered.slice(s,e).map((d,i)=>`<tr>
    <td style="color:#94a3b8">${s+i+1}</td>
    <td><span class="chip ${d.div==='제품'?'chip-new':'chip-up'}">${d.div||'-'}</span></td>
    <td style="color:#64748b">${d.sup}</td>
    <td style="color:#94a3b8;font-size:10px">${d.code}</td>
    <td>${d.name}</td>
    <td style="color:#94a3b8">${d.opt}</td>
    <td class="r" style="font-weight:700;color:#2563eb">${fmt(d.qty)}</td>
    <td class="r">${K(d.amt)}원</td>
  </tr>`).join('');
  document.getElementById('stock-pg-info').textContent=`${s+1}–${e} / ${total.toLocaleString()}건`;
}

// ─── 탭 전환 ──────────────────────────────────────────────
function showTab(id,btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tnav-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById(id).classList.add('on'); btn.classList.add('on');
}

// ─── 배포 자동 주입 ───────────────────────────────────────
if(window.__PD__){
  Object.assign(G, window.__PD__);
  document.getElementById('empty-state').style.display='none';
  document.getElementById('main-wrap').style.display='block';
  init();
  document.getElementById('badge').textContent=G.mRange+' 기준';
  document.getElementById('badge').className='badge';
  document.getElementById('sub-txt').textContent='더라스트 · 자동 업데이트됨';
}
</script>
</body></html>
