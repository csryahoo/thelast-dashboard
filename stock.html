<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'맑은 고딕',Malgun Gothic,'Noto Sans KR',sans-serif;background:#f0f2f7;color:#1a202c;font-size:13px;min-height:100vh;}

/* Header */
.topbar{background:#ffffff;border-bottom:1px solid #dde1f0;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.topbar h1{font-size:16px;font-weight:800;color:#1a202c;}
.topbar .sub{font-size:11px;color:#64748b;margin-top:2px;}
.badge{background:#2563eb;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;margin-left:8px;}
.badge.wait{background:#e2e8f0;color:#94a3b8;}
.load-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;background:#2563eb;color:#fff;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit;}
.load-btn:hover{background:#1d4ed8;box-shadow:0 2px 8px rgba(37,99,235,.3);}
.load-btn input{display:none;}

/* Tabs */
.tabnav{background:#ffffff;border-bottom:2px solid #dde1f0;padding:0 20px;display:flex;}
.tnav-btn{padding:12px 20px;font-size:13px;font-weight:700;color:#94a3b8;background:none;border:none;cursor:pointer;font-family:inherit;border-bottom:3px solid transparent;margin-bottom:-2px;transition:color .15s,border-color .15s;}
.tnav-btn:hover{color:#475569;}
.tnav-btn.on{color:#2563eb;border-bottom-color:#2563eb;}

/* Panels */
.tab-panel{display:none;padding:18px 20px;flex-direction:column;gap:14px;}
.tab-panel.on{display:flex;}
.card{background:#ffffff;border:1px solid #dde1f0;border-radius:12px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.sec{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #e2e8f0;}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
.kpi{padding:16px 18px;}
.kpi .label{font-size:10px;color:#64748b;font-weight:700;letter-spacing:.4px;text-transform:uppercase;}
.kpi .val{font-size:22px;font-weight:800;margin:6px 0 3px;letter-spacing:-1px;}
.kpi .hint{font-size:11px;color:#64748b;}
.blue{color:#2563eb}.green{color:#059669}.red{color:#dc2626}.yellow{color:#d97706}.purple{color:#7c3aed}

/* Tables */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.rt{width:100%;border-collapse:collapse;font-size:12px;}
.rt th{padding:7px 8px;text-align:left;font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;border-bottom:2px solid #e2e8f0;background:#f8fafc;}
.rt th.r{text-align:right;}.rt td.r{text-align:right;}
.rt td{padding:7px 8px;border-bottom:1px solid #f1f5f9;white-space:nowrap;color:#374151;}
.rt tr:hover td{background:#f8fafc;}
.up{color:#059669;font-weight:700}.dn{color:#dc2626;font-weight:700}
.chip{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;}
.chip-new{background:rgba(37,99,235,.1);color:#2563eb;}
.chip-out{background:rgba(220,38,38,.08);color:#dc2626;}
.chip-up{background:rgba(5,150,105,.1);color:#059669;}
.chip-dn{background:rgba(220,38,38,.08);color:#dc2626;}

/* Search / filter */
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.ftabs{display:flex;gap:6px;}
.ftab{padding:5px 12px;border-radius:6px;border:1px solid #dde1f0;cursor:pointer;font-size:11px;font-family:inherit;background:#ffffff;color:#64748b;font-weight:600;}
.ftab.on{background:#2563eb;color:#fff;border-color:#2563eb;}
input.srch{padding:5px 10px;border-radius:6px;border:1px solid #dde1f0;background:#ffffff;color:#1a202c;font-size:12px;font-family:inherit;width:160px;outline:none;}
.pager{display:flex;align-items:center;justify-content:space-between;margin-top:10px;font-size:11px;color:#64748b;}
.pager button{padding:3px 10px;border-radius:4px;border:1px solid #dde1f0;background:#ffffff;color:#475569;cursor:pointer;font-size:11px;font-family:inherit;}

/* Chart */
.chart-box{width:100%;overflow:hidden;}

/* Empty state */
#empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px;color:#94a3b8;}
.es-icon{font-size:48px;opacity:.4;}
.es-title{font-size:18px;font-weight:700;color:#475569;}
.es-desc{font-size:13px;text-align:center;line-height:1.8;color:#94a3b8;}
.es-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 22px;background:#2563eb;color:#fff;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;margin-top:8px;font-family:inherit;}
.es-btn:hover{background:#1d4ed8;}
.es-btn input{display:none;}
</style>

<script>
// ─── 전역 상태 ───────────────────────────────────────────
const G = { summary:[], topInc:[], topDec:[], products:[], suppliers:[], months:[], mRange:'' };
let prodFilter='all', prodSearch='', prodPage=0; const PAGE=30;

// ─── 유틸 ────────────────────────────────────────────────
const fmt = v => { if(v===null||v===undefined) return '-'; return Number(v).toLocaleString(); };
const K = v => { if(!v&&v!==0) return '-'; const a=Math.abs(v); const r=a>=1e8?(a/1e8).toFixed(1)+'억':a>=1e4?Math.round(a/1e4)+'만':a.toLocaleString(); return (v<0?'-':'')+r; };

// ─── 파일 로드 ────────────────────────────────────────────
function loadFile(evt) {
  const file=evt.target.files[0]; if(!file) return;
  document.getElementById('badge').textContent='⏳ 로딩중...';
  document.getElementById('badge').className='badge wait';
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      parseWorkbook(wb);
      renderAll();
      document.getElementById('empty-state').style.display='none';
      document.getElementById('main-wrap').style.display='block';
      document.getElementById('badge').textContent=G.mRange+' 기준';
      document.getElementById('badge').className='badge';
      document.getElementById('sub-txt').textContent=`더라스트 · ${file.name} · ${new Date().toLocaleDateString('ko-KR')} 업데이트`;
    }catch(err){ alert('파싱 오류: '+err.message); }
  };
  reader.readAsArrayBuffer(file);
}

// ─── 파싱 ─────────────────────────────────────────────────
function parseWorkbook(wb) {
  // ── 요약 시트
  const wsSu=wb.Sheets['요약'];
  if(!wsSu) throw new Error("'요약' 시트 없음");
  const su=XLSX.utils.sheet_to_json(wsSu,{header:1,defval:null});
  G.summary=[];
  // 헤더행: '월','총 SKU수','총 수량','총 재고금액','전월대비 증감','상태' 찾기
  const hIdx=su.findIndex(r=>r&&r.some(v=>v==='총 수량'));
  if(hIdx>=0){
    for(let i=hIdx+1;i<su.length;i++){
      const r=su[i]; if(!r) continue;
      const m=r[1]; if(!m||typeof m!=='string') continue;
      if(m==='월 평균'||m==='월') continue;
      const sku=r[2], qty=r[3], amt=r[4], mom=r[5], status=r[6];
      if(sku!=='-'&&qty!=='-'&&amt!=='-') G.summary.push({month:m,sku:sku||0,qty:qty||0,amount:amt||0,momChange:mom,status:status||'대기중'});
    }
  }

  // ── Top10 시트
  const wsT=wb.Sheets['Top10_수량추이'];
  G.topInc=[]; G.topDec=[];
  if(wsT){
    const td=XLSX.utils.sheet_to_json(wsT,{header:1,defval:null});
    let section='';
    td.forEach(r=>{
      if(!r) return;
      const c0=r[0];
      if(typeof c0==='string'&&c0.includes('증가')) { section='inc'; return; }
      if(typeof c0==='string'&&c0.includes('감소')) { section='dec'; return; }
      if(!c0||c0==='순위'||c0==='합계') return;
      if(typeof c0==='string'&&(c0.includes('위')||c0.includes('🥇')||c0.includes('🥈')||c0.includes('🥉'))) {
        const item={rank:c0.replace(/[🥇🥈🥉\s]/g,''),supplier:r[1]||'',name:r[2]||'',q1:r[3]||0,q2:r[4]||0,q3:r[5]||0,chg:r[6]||0};
        if(section==='inc') G.topInc.push(item);
        if(section==='dec') G.topDec.push(item);
      }
    });
  }

  // ── 상품별_수량추이 시트
  const wsP=wb.Sheets['상품별_수량추이'];
  G.products=[]; G.months=[];
  if(wsP){
    const pd=XLSX.utils.sheet_to_json(wsP,{header:1,defval:null});
    // 헤더행 찾기
    const hi=pd.findIndex(r=>r&&r.some(v=>v==='상품명'));
    if(hi>=0){
      const hdr=pd[hi];
      // 월 컬럼 감지: 'X월 수량' 패턴
      const mCols=[];
      hdr.forEach((v,i)=>{ if(typeof v==='string'&&v.includes('월')&&v.includes('수량')) mCols.push({label:v.replace(' 수량','').replace('\n수량',''),idx:i}); });
      G.months=mCols.map(c=>c.label);
      G.mRange=G.months.length>0?`${G.months[0]}~${G.months[G.months.length-1]}`:'';
      const lastChgCol=hdr.findIndex(v=>typeof v==='string'&&v.includes('증감'));
      for(let i=hi+1;i<pd.length;i++){
        const r=pd[i]; if(!r) continue;
        const name=r[2]; if(!name||typeof name!=='string') continue;
        const vals=mCols.map(c=>typeof r[c.idx]==='number'?r[c.idx]:null);
        const lastVals=vals.filter(v=>v!==null);
        if(lastVals.length===0) continue;
        const latestQty=lastVals[lastVals.length-1];
        const chg=lastChgCol>0&&typeof r[lastChgCol]==='number'?r[lastChgCol]:null;
        const status=vals[0]===null&&latestQty>0?'NEW':latestQty===0?'OUT':chg>0?'up':chg<0?'dn':'flat';
        G.products.push({rank:r[0]||i,supplier:r[1]||'',name,vals,latest:latestQty,chg,status});
      }
    }
  }

  // ── 공급처별_수량추이 시트
  const wsS=wb.Sheets['공급처별_수량추이'];
  G.suppliers=[];
  if(wsS){
    const sd=XLSX.utils.sheet_to_json(wsS,{header:1,defval:null});
    const si=sd.findIndex(r=>r&&r.some(v=>v==='공급처'));
    if(si>=0){
      const hdr=sd[si];
      // '수량' 컬럼 찾기
      const qCols=[], aCols=[];
      hdr.forEach((v,i)=>{ if(typeof v==='string'&&v.includes('수량')&&!v.includes('증감')) qCols.push(i); if(typeof v==='string'&&v.includes('금액')) aCols.push(i); });
      for(let i=si+1;i<sd.length;i++){
        const r=sd[i]; if(!r) continue;
        const name=r[1]; if(!name||typeof name!=='string') continue;
        const qvals=qCols.map(c=>typeof r[c]==='number'?r[c]:0);
        const avals=aCols.map(c=>typeof r[c]==='number'?r[c]:0);
        const chg=typeof r[hdr.findIndex(v=>typeof v==='string'&&v.includes('증감'))]=='number'?r[hdr.findIndex(v=>typeof v==='string'&&v.includes('증감'))]:null;
        G.suppliers.push({rank:r[0]||i,name,qvals,avals,chg,latest:qvals[qvals.length-1]||0});
      }
    }
  }
}

// ─── 렌더링 ───────────────────────────────────────────────
function renderAll() {
  renderKPIs();
  renderTop10();
  renderProdChart();
  renderProdTable();
  renderSupplierTable();
  renderSupplierPie();
}

function renderKPIs() {
  const active=G.summary.filter(s=>s.status==='입력됨');
  const latest=active[active.length-1];
  const prev=active.length>=2?active[active.length-2]:null;
  const newItems=G.products.filter(p=>p.status==='NEW').length;
  const outItems=G.products.filter(p=>p.status==='OUT').length;
  document.getElementById('kpi-row').innerHTML=`
    <div class="card kpi"><div class="label">${latest?.month||'-'} 총 재고수량</div><div class="val blue">${fmt(latest?.qty)}<span style="font-size:13px"> 개</span></div><div class="hint">전월 ${fmt(prev?.qty)} 개</div></div>
    <div class="card kpi"><div class="label">최근월 재고금액</div><div class="val purple">${K(latest?.amount)}</div><div class="hint">원가 기준</div></div>
    <div class="card kpi"><div class="label">총 상품수 (SKU)</div><div class="val" style="color:#E2E8F0">${fmt(latest?.sku)}</div><div class="hint">상품명 기준</div></div>
    <div class="card kpi"><div class="label">신규 입고 (NEW)</div><div class="val yellow">${fmt(newItems)}</div><div class="hint">이전월 미존재 → 신규입고</div></div>
    <div class="card kpi"><div class="label">소진 상품 (OUT)</div><div class="val red">${fmt(outItems)}</div><div class="hint">이전월 재고 → 0</div></div>`;
}

function renderTop10() {
  const mArr=G.months;
  const m1=mArr[mArr.length-3]||'-', m2=mArr[mArr.length-2]||'-', m3=mArr[mArr.length-1]||'-';
  document.getElementById('inc-title').textContent=`▲ 수량 증가 Top 10 (${m2}→${m3})`;
  document.getElementById('dec-title').textContent=`▼ 수량 감소 Top 10 (${m2}→${m3})`;
  const mkRow=d=>`<tr><td><b>${d.rank}</b></td><td style="font-size:11px;color:#94A3B8">${d.supplier}</td><td>${d.name.length>25?d.name.slice(0,25)+'…':d.name}</td><td class="r">${d.q1||d.q1===0?fmt(d.q1):'-'}</td><td class="r">${d.q2||d.q2===0?fmt(d.q2):'-'}</td><td class="r" style="font-weight:700;color:#60A5FA">${fmt(d.q3)}</td><td class="r ${d.chg>=0?'up':'dn'}">${d.chg>=0?'+':''}${fmt(d.chg)}</td></tr>`;
  document.getElementById('inc-tb').innerHTML=G.topInc.map(mkRow).join('');
  document.getElementById('dec-tb').innerHTML=G.topDec.map(mkRow).join('');
}

function renderProdChart() {
  const top15=G.products.slice(0,15);
  const mArr=G.months;
  const H=40+top15.length*40, W=document.getElementById('prod-chart').offsetWidth||600;
  const PAD={l:180,r:30,t:30,b:10};
  const COLS=['#60A5FA','#34D399','#FBBF24'];
  const cW=W-PAD.l-PAD.r;
  const GRP=mArr.length, BAR_H=10, GAP=4;
  const maxV=Math.max(...top15.flatMap(d=>d.vals.filter(v=>v!==null)),1);
  let svg=`<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg" style="overflow:visible">`;
  // 그리드
  for(let g=1;g<=4;g++){
    const x=PAD.l+cW*g/4;
    svg+=`<line x1="${x}" y1="${PAD.t}" x2="${x}" y2="${H-PAD.b}" stroke="#334155" stroke-width="1"/>`;
    svg+=`<text x="${x}" y="${PAD.t-6}" text-anchor="middle" fill="#475569" font-size="9">${fmt(Math.round(maxV*g/4))}</text>`;
  }
  top15.forEach((d,i)=>{
    const grpH=BAR_H*GRP+GAP*(GRP+1);
    const gy=PAD.t+i*(grpH+6);
    const nm=d.name.length>22?d.name.slice(0,22)+'…':d.name;
    svg+=`<text x="${PAD.l-6}" y="${gy+grpH/2+4}" text-anchor="end" fill="#94A3B8" font-size="10">${nm}</text>`;
    d.vals.forEach((q,j)=>{
      if(q===null) return;
      const by=gy+GAP*(j+1)+BAR_H*j;
      const bw=Math.max(2,q/maxV*cW);
      svg+=`<rect x="${PAD.l}" y="${by}" width="${bw}" height="${BAR_H}" fill="${COLS[j%COLS.length]}" rx="2" opacity="0.85"/>`;
      if(q>0) svg+=`<text x="${PAD.l+bw+3}" y="${by+BAR_H-2}" fill="#64748B" font-size="9">${fmt(q)}</text>`;
    });
  });
  // 범례
  mArr.forEach((m,i)=>{ svg+=`<rect x="${PAD.l+i*70}" y="6" width="10" height="10" fill="${COLS[i%COLS.length]}" rx="2"/><text x="${PAD.l+i*70+14}" y="15" fill="#94A3B8" font-size="10">${m}</text>`; });
  svg+='</svg>';
  document.getElementById('prod-chart').innerHTML=svg;
}

// 상품 테이블 필터/검색/페이지
let filteredProds=[];
function applyFilter() {
  const q=prodSearch.toLowerCase();
  filteredProds=G.products.filter(p=>{
    if(prodFilter==='up'&&p.chg<=0) return false;
    if(prodFilter==='dn'&&(p.chg===null||p.chg>=0)) return false;
    if(prodFilter==='NEW'&&p.status!=='NEW') return false;
    if(prodFilter==='OUT'&&p.status!=='OUT') return false;
    if(q&&!p.name.toLowerCase().includes(q)&&!p.supplier.toLowerCase().includes(q)) return false;
    return true;
  });
}

function renderProdTable() {
  applyFilter();
  // 헤더
  const mArr=G.months;
  document.getElementById('prod-thead').innerHTML=`<tr><th>#</th><th>공급처</th><th>상품명</th>${mArr.map(m=>`<th class="r">${m}</th>`).join('')}<th class="r">증감</th><th class="r">상태</th></tr>`;
  const total=filteredProds.length;
  const start=prodPage*PAGE, end=Math.min(start+PAGE,total);
  const rows=filteredProds.slice(start,end);
  document.getElementById('all-tb').innerHTML=rows.map(p=>{
    const chipHtml=p.status==='NEW'?'<span class="chip chip-new">NEW</span>':p.status==='OUT'?'<span class="chip chip-out">OUT</span>':p.chg>0?'<span class="chip chip-up">↑</span>':p.chg<0?'<span class="chip chip-dn">↓</span>':'—';
    return `<tr><td style="color:#475569">${p.rank}</td><td style="font-size:11px;color:#64748B">${p.supplier}</td><td>${p.name}</td>${p.vals.map(v=>`<td class="r">${v!==null?fmt(v):'-'}</td>`).join('')}<td class="r ${p.chg>0?'up':p.chg<0?'dn':''}">${p.chg!==null?(p.chg>=0?'+':'')+fmt(p.chg):'-'}</td><td>${chipHtml}</td></tr>`;
  }).join('');
  document.getElementById('pg-info').textContent=`${start+1}–${end} / ${total}건`;
}

function flt(f,btn) {
  prodFilter=f; prodPage=0;
  document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderProdTable();
}
function doSearch() { prodSearch=document.getElementById('srch').value; prodPage=0; renderProdTable(); }
function pg(d) {
  const max=Math.ceil(filteredProds.length/PAGE)-1;
  prodPage=Math.max(0,Math.min(max,prodPage+d));
  renderProdTable();
}

function renderSupplierTable() {
  const mArr=G.months;
  let html=`<thead><tr><th>#</th><th>공급처</th>${mArr.map(m=>`<th class="r">${m} 수량</th>`).join('')}<th class="r">증감</th></tr></thead><tbody>`;
  G.suppliers.slice(0,20).forEach(s=>{
    html+=`<tr><td style="color:#475569">${s.rank}</td><td style="font-weight:600">${s.name}</td>${s.qvals.map(v=>`<td class="r">${fmt(v)}</td>`).join('')}<td class="r ${s.chg>0?'up':s.chg<0?'dn':''}">${s.chg!==null?(s.chg>=0?'+':'')+fmt(s.chg):'-'}</td></tr>`;
  });
  html+='</tbody>';
  document.getElementById('sup-tb').innerHTML=html;
}

function renderSupplierPie() {
  const top=G.suppliers.slice(0,10);
  const W=document.getElementById('sup-pie').offsetWidth||400, H=260;
  const cx=W/2, cy=H/2-10, R=Math.min(cx,cy)-30;
  const total=top.reduce((s,d)=>s+d.latest,0);
  const COLS=['#60A5FA','#34D399','#FBBF24','#F87171','#A78BFA','#06B6D4','#F97316','#EC4899','#84CC16','#14B8A6'];
  let svg=`<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">`;
  let angle=-Math.PI/2;
  top.forEach((d,i)=>{
    const slice=(d.latest/total)*Math.PI*2;
    const x1=cx+R*Math.cos(angle), y1=cy+R*Math.sin(angle);
    const x2=cx+R*Math.cos(angle+slice), y2=cy+R*Math.sin(angle+slice);
    const lf=slice>Math.PI?1:0;
    svg+=`<path d="M${cx},${cy} L${x1},${y1} A${R},${R} 0 ${lf} 1 ${x2},${y2} Z" fill="${COLS[i]}" opacity="0.85" stroke="#ffffff" stroke-width="1.5"/>`;
    const mid=angle+slice/2;
    if(slice>0.2) svg+=`<text x="${cx+R*0.65*Math.cos(mid)}" y="${cy+R*0.65*Math.sin(mid)+4}" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">${(d.latest/total*100).toFixed(0)}%</text>`;
    angle+=slice;
  });
  // 범례
  top.forEach((d,i)=>{
    const lx=10, ly=10+i*22;
    svg+=`<rect x="${lx}" y="${ly}" width="12" height="12" fill="${COLS[i]}" rx="2"/><text x="${lx+16}" y="${ly+10}" fill="#94A3B8" font-size="10">${d.name.slice(0,14)} ${fmt(d.latest)}개</text>`;
  });
  svg+='</svg>';
  document.getElementById('sup-pie').innerHTML=svg;
}

// ─── 탭 전환 ──────────────────────────────────────────────
function showTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tnav-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  btn.classList.add('on');
  // 탭 전환 시 SVG 차트 재렌더
  if(id==='t2'&&G.products.length) { setTimeout(()=>{renderProdChart();renderProdTable();},50); }
  if(id==='t3'&&G.suppliers.length) { setTimeout(()=>{renderSupplierTable();renderSupplierPie();},50); }
}

// ─── 자동 렌더 (Netlify 배포 환경) ──────────────────────────
if (window.__PD__) {
  Object.assign(G, window.__PD__);
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('main-wrap').style.display = 'block';
  renderAll();
  document.getElementById('badge').textContent = G.mRange + ' 기준';
  document.getElementById('badge').className = 'badge';
  document.getElementById('sub-txt').textContent = '더라스트 · 자동 업데이트됨';
}
</script>
